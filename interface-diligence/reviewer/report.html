<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interface Diligence Report</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0b0d12; color: #f5f7fb; }
    main { max-width: 1040px; margin: 0 auto; padding: 44px 20px; }
    h1 { margin: 0 0 8px; }
    h2 { margin-top: 32px; }
    p { color: #aab2c5; }
    pre { white-space: pre-wrap; background: #111722; border: 1px solid #2c3343; padding: 16px; border-radius: 10px; overflow: auto; }
    .section { background: #0f1420; border: 1px solid #252c3d; border-radius: 16px; padding: 20px; margin: 18px 0; }
    .warn { color: #ffd37a; }
  </style>
</head>
<body>
  <main>
    <h1>Interface Diligence Report</h1>
    <p id="meta">Loading...</p>
    <p class="warn">MVP report renderer. This displays the backend renderer payload without legal-advice framing.</p>
    <div id="report"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const runId = params.get("run_id") || "";
    const backendUrl = (sessionStorage.getItem("ln_reviewer_backend_url") || "").replace(/\/$/, "");
    const apiKey = sessionStorage.getItem("ln_reviewer_api_key") || "";
    const report = document.getElementById("report");
    const meta = document.getElementById("meta");

    loadReport().catch((error) => {
      meta.textContent = "Report failed to load.";
      report.innerHTML = `<pre>${escapeHtml(error.message)}</pre>`;
    });

    async function loadReport() {
      if (!runId || !backendUrl || !apiKey) {
        throw new Error("Missing run_id, backend URL, or operator API key. Open this report from the reviewer console.");
      }

      const response = await fetch(`${backendUrl}/v1/reviewer/report/${encodeURIComponent(runId)}`, {
        headers: { "x-ln-api-key": apiKey }
      });
      const json = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(`${response.status}: ${JSON.stringify(json)}`);

      const payload = json.renderer_payload || {};
      meta.textContent = `${payload.target || "Target"} — ${payload.validation_status || "UNKNOWN"}`;
      report.innerHTML = (payload.sections || []).map((section) => `
        <section class="section">
          <h2>${escapeHtml(section.title || section.id || "Section")}</h2>
          <pre>${escapeHtml(JSON.stringify(section.data || {}, null, 2))}</pre>
        </section>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
