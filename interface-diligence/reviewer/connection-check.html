<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interface Diligence Connection Check</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0b0d12; color: #f5f7fb; }
    main { max-width: 900px; margin: 0 auto; padding: 48px 20px; }
    pre { white-space: pre-wrap; background: #111722; border: 1px solid #2c3343; padding: 16px; border-radius: 10px; overflow: auto; }
    a { color: #9fc2ff; }
  </style>
</head>
<body>
  <main>
    <p><a href="./index.html">← Back to reviewer console</a></p>
    <h1>Connection Check</h1>
    <p>This checks whether the main-domain Cloudflare proxy can reach the GCloud backend health endpoint.</p>
    <pre id="out">Checking...</pre>
  </main>
  <script>
    const out = document.getElementById("out");
    fetch("/api/interface-diligence/health")
      .then(async (response) => {
        const text = await response.text();
        out.textContent = JSON.stringify({ ok: response.ok, status: response.status, body: tryJson(text) }, null, 2);
      })
      .catch((error) => {
        out.textContent = JSON.stringify({ ok: false, error: error.message }, null, 2);
      });

    function tryJson(text) {
      try { return JSON.parse(text); } catch (_error) { return text; }
    }
  </script>
</body>
</html>
