name: Build Act III Legal Architecture

on:
  pull_request:
    types: [synchronize, edited]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
          fetch-depth: 0

      - name: Apply locked Act III rebuild
        run: python3 .github/tmp/build_act3_legal_architecture.py

      - name: Validate structure and JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          t=Path('index.html').read_text(encoding='utf-8')
          required=[
            'ACT III · LEGAL ARCHITECTURE IN OPERATION',
            'How I use technology to preserve legal judgment through execution.',
            'Evidence remains attached.',
            'Unsupported conclusions cannot silently pass.',
            'Human judgment controls the final position.',
            'Trace one legal conclusion',
            'Payment Perimeter',
            'Credit Scoring',
            'Identity & KYC',
            'The lawyer authors the architecture. Technology preserves it through execution.',
            "capstoneFlow(['Legal Grammar','Applied Legal Architecture','Supporting Workflow'])"
          ]
          missing=[x for x in required if x not in t]
          if missing: raise SystemExit('Missing Act III content: '+repr(missing))
          active=t[t.index('  // ---------- ACT III ----------'):t.index('  // ---------- CAPSTONE ----------')]
          forbidden=[
            'ACT III · RUNTIME WORKFLOW',
            'Runtime spine',
            'Live operating system',
            'Review controls built in',
            'Public source intake',
            'Active registry application',
            'Legal exposure report'
          ]
          leaked=[x for x in forbidden if x in active]
          if leaked: raise SystemExit('Legacy Act III remains active: '+repr(leaked))
          scripts=re.findall(r'<script(?![^>]*type="application/json")[^>]*>(.*?)</script>',t,re.S)
          Path('/tmp/runtime.js').write_text('\n'.join(scripts),encoding='utf-8')
          print('Act III structural validation: PASS')
          PY
          node --check /tmp/runtime.js

      - name: Commit rebuilt Act III
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Rebuild Act III as Legal Architecture in Operation"
          git push origin HEAD:act2-live-run-rebuild

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1

      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1

      - name: Validate interactions and capture Act III
        run: |
          cat > render-act3.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser=await chromium.launch({headless:true});
          const logs=[];
          for(const cfg of [{name:'desktop',width:1440,height:1100},{name:'mobile',width:390,height:844}]){
            const page=await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            const errors=[];
            page.on('pageerror',error=>errors.push(String(error)));
            await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
            await page.waitForTimeout(1200);
            const section=page.locator('#delivery-system');
            await section.scrollIntoViewIfNeeded();
            await page.waitForTimeout(250);
            if(await page.locator('[data-act3-operation]').count()!==5) throw new Error(`${cfg.name}: workflow stages missing`);
            if(await page.locator('[data-act3-trace]').count()!==3) throw new Error(`${cfg.name}: trace tabs missing`);
            const initial=await page.locator('#act3-operation-panel').innerText();
            if(!initial.includes('Preserve the underlying source')) throw new Error(`${cfg.name}: Evidence stage missing`);
            await page.evaluate(()=>document.querySelector('[data-act3-operation="2"]').click());
            await page.waitForTimeout(100);
            const legalTesting=await page.locator('#act3-operation-panel').innerText();
            if(!legalTesting.includes('Apply the controlled questions')) throw new Error(`${cfg.name}: Legal Testing stage missing`);
            await page.evaluate(()=>document.querySelector('[data-act3-trace="credit"]').click());
            await page.waitForTimeout(100);
            const credit=await page.locator('#act3-trace-panel').innerText();
            if(!credit.includes('actual override authority')) throw new Error(`${cfg.name}: Credit Scoring trace missing`);
            await page.evaluate(()=>document.querySelector('[data-act3-trace="identity"]').click());
            await page.waitForTimeout(100);
            const identity=await page.locator('#act3-trace-panel').innerText();
            if(!identity.includes('threshold logic')) throw new Error(`${cfg.name}: Identity & KYC trace missing`);
            await page.evaluate((mobile)=>{
              document.querySelectorAll('#delivery-system .reveal').forEach(node=>node.classList.add('visible'));
              if(mobile){
                const top=document.querySelector('.topnav');
                const funnel=document.querySelector('.mobile-funnel');
                if(top) top.style.display='none';
                if(funnel) funnel.style.display='none';
              }
              document.querySelector('[data-act3-operation="0"]').click();
              document.querySelector('[data-act3-trace="payment"]').click();
            },cfg.name==='mobile');
            await page.waitForTimeout(100);
            const overflow=await page.evaluate(()=>document.documentElement.scrollWidth-window.innerWidth);
            if(overflow>1) throw new Error(`${cfg.name}: horizontal overflow ${overflow}px`);
            if(errors.length) throw new Error(`${cfg.name}: browser errors: ${errors.join(' | ')}`);
            await section.screenshot({path:`act3-${cfg.name}.png`});
            logs.push(`${cfg.name}: PASS — five stages, three traces, Legal Testing, Credit Scoring, Identity & KYC, 0px overflow`);
            await page.close();
          }
          await browser.close();
          await writeFile('validation.txt',logs.join('\n'));
          EOF
          node render-act3.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: act3-legal-architecture-preview
          path: |
            act3-desktop.png
            act3-mobile.png
            validation.txt
          if-no-files-found: error
