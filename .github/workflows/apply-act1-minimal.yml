name: Apply minimalist Act I

on:
  push:
    branches: [act2-live-run-rebuild]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
          fetch-depth: 0

      - name: Rebuild Act I
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          css_marker = '/* ---- MINIMALIST ACT I START ---- */'
          css = r'''
/* ---- MINIMALIST ACT I START ---- */
.act1-minimal{padding-bottom:1.55rem;}
.act1-opening{max-width:62rem;}
.act1-opening h2{max-width:49rem;}
.act1-opening-copy{max-width:57rem;margin:.85rem 0 0;color:rgba(229,229,229,.68);font-size:.86rem;line-height:1.7;}
.act1-opening-copy+.act1-opening-copy{margin-top:.45rem;color:rgba(229,229,229,.48);}
.act1-method-shell{margin-top:1.5rem;border-top:1px solid rgba(197,160,89,.25);border-bottom:1px solid rgba(197,160,89,.18);}
.act1-method-nav{display:grid;grid-template-columns:repeat(8,minmax(118px,1fr));overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(197,160,89,.45) transparent;}
.act1-method-step{position:relative;min-width:118px;padding:.9rem .72rem .82rem;border:0;border-right:1px solid rgba(229,229,229,.075);background:transparent;color:rgba(229,229,229,.44);text-align:left;cursor:pointer;transition:color .2s,background .2s;}
.act1-method-step:last-child{border-right:0;}
.act1-method-step::after{content:"";position:absolute;left:.72rem;right:.72rem;bottom:0;height:1px;background:transparent;transition:background .2s,box-shadow .2s;}
.act1-method-step:hover,.act1-method-step:focus,.act1-method-step.active{outline:none;color:var(--gold);background:rgba(197,160,89,.035);}
.act1-method-step.active::after{background:var(--gold);box-shadow:0 0 10px rgba(197,160,89,.65);}
.act1-method-step .n{display:block;margin-bottom:.25rem;font-size:.52rem;font-weight:800;letter-spacing:.13em;color:rgba(197,160,89,.65);}
.act1-method-step .t{display:block;font-family:"Cormorant Garamond",Georgia,serif;font-size:1rem;line-height:1.05;color:inherit;}
.act1-stage-panel{display:grid;grid-template-columns:180px minmax(0,1.2fr) minmax(0,1fr);gap:1.15rem;padding:1.15rem 0 1.2rem;align-items:start;}
.act1-stage-id{padding-right:1rem;border-right:1px solid rgba(197,160,89,.18);}
.act1-stage-count{display:block;color:var(--gold);font-size:.55rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;}
.act1-stage-id h3{margin:.28rem 0 0;font-family:"Cormorant Garamond",Georgia,serif;font-size:1.65rem;line-height:1;color:#f0ece5;font-weight:500;}
.act1-stage-block strong{display:block;margin-bottom:.32rem;color:var(--gold);font-size:.55rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;}
.act1-stage-block p{margin:0;color:rgba(229,229,229,.68);font-size:.78rem;line-height:1.62;}
.act1-stage-controls{display:none;}
.act1-domain{margin-top:1.7rem;padding-top:1.5rem;border-top:1px solid rgba(229,229,229,.08);}
.act1-domain-head{display:flex;align-items:end;justify-content:space-between;gap:1rem;}
.act1-domain-head h3{margin:.25rem 0 0;font-family:"Cormorant Garamond",Georgia,serif;color:#f4f0e8;font-size:1.75rem;font-weight:500;line-height:1;}
.act1-domain-head p{max-width:48rem;margin:.55rem 0 0;color:rgba(229,229,229,.58);font-size:.78rem;line-height:1.6;}
.act1-domain-tabs{display:flex;gap:1rem;overflow-x:auto;margin-top:1rem;border-bottom:1px solid rgba(229,229,229,.09);}
.act1-domain-tab{position:relative;flex:0 0 auto;padding:.58rem 0 .68rem;border:0;background:transparent;color:rgba(229,229,229,.42);font-size:.62rem;font-weight:800;letter-spacing:.11em;text-transform:uppercase;cursor:pointer;}
.act1-domain-tab::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:transparent;}
.act1-domain-tab:hover,.act1-domain-tab:focus,.act1-domain-tab.active{outline:none;color:var(--gold);}
.act1-domain-tab.active::after{background:var(--gold);box-shadow:0 0 10px rgba(197,160,89,.55);}
.act1-domain-context{padding:.9rem 0 .75rem;color:rgba(229,229,229,.69);font-family:"Cormorant Garamond",Georgia,serif;font-size:1.12rem;line-height:1.38;}
.act1-domain-compare{border-top:1px solid rgba(197,160,89,.22);}
.act1-domain-row{display:grid;grid-template-columns:150px minmax(0,1fr) minmax(0,1fr);gap:1rem;padding:.72rem 0;border-bottom:1px solid rgba(229,229,229,.075);}
.act1-domain-row .lens{color:var(--gold);font-size:.55rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;}
.act1-domain-cell strong{display:block;margin-bottom:.18rem;color:rgba(244,240,232,.9);font-size:.69rem;font-weight:600;}
.act1-domain-cell span{display:block;color:rgba(229,229,229,.54);font-size:.72rem;line-height:1.52;}
.act1-domain-note{margin:.75rem 0 0;color:rgba(229,229,229,.48);font-size:.69rem;line-height:1.55;}
.act1-domain-note strong{color:var(--gold);font-weight:700;}
.act1-application{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));margin-top:1rem;border-top:1px solid rgba(197,160,89,.24);border-bottom:1px solid rgba(197,160,89,.16);}
.act1-application div{padding:.72rem .8rem .78rem;border-right:1px solid rgba(229,229,229,.075);}
.act1-application div:last-child{border-right:0;}
.act1-application strong{display:block;color:var(--gold);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.25rem;}
.act1-application span{display:block;color:rgba(229,229,229,.59);font-size:.69rem;line-height:1.48;}
.act1-disciplines{margin-top:1.65rem;border-top:1px solid rgba(229,229,229,.09);}
.act1-discipline{display:grid;grid-template-columns:215px minmax(0,1fr);gap:1rem;padding:.72rem 0;border-bottom:1px solid rgba(229,229,229,.075);}
.act1-discipline strong{color:#ede8df;font-family:"Cormorant Garamond",Georgia,serif;font-size:1.04rem;font-weight:500;}
.act1-discipline span{color:rgba(229,229,229,.56);font-size:.73rem;line-height:1.55;}
.act1-output{margin-top:1.55rem;padding-top:1.15rem;border-top:1px solid rgba(197,160,89,.22);}
.act1-output-head{display:flex;align-items:end;justify-content:space-between;gap:1rem;}
.act1-output-head p{max-width:48rem;margin:.35rem 0 0;color:rgba(229,229,229,.56);font-size:.74rem;line-height:1.55;}
.act1-output-strip{display:flex;flex-wrap:wrap;gap:.35rem 1.1rem;margin-top:.85rem;color:rgba(229,229,229,.72);font-size:.6rem;font-weight:800;letter-spacing:.11em;text-transform:uppercase;}
.act1-output-strip span{position:relative;}
.act1-output-strip span+span::before{content:"";display:inline-block;width:14px;height:1px;margin:0 .65rem .2rem 0;background:rgba(197,160,89,.48);}
.act1-bridge{margin-top:1.45rem;padding-top:1rem;border-top:1px solid rgba(229,229,229,.08);display:flex;align-items:center;justify-content:space-between;gap:1.1rem;}
.act1-bridge p{margin:0;max-width:50rem;color:rgba(229,229,229,.62);font-family:"Cormorant Garamond",Georgia,serif;font-size:1.08rem;line-height:1.35;}
.act1-bridge a{flex:0 0 auto;color:var(--gold);font-size:.6rem;font-weight:800;letter-spacing:.11em;text-transform:uppercase;border-bottom:1px solid rgba(197,160,89,.45);padding-bottom:.25rem;}
@media(max-width:900px){
  .act1-stage-panel{grid-template-columns:150px 1fr;}.act1-stage-block:last-child{grid-column:2;}
  .act1-domain-row{grid-template-columns:120px 1fr 1fr;}.act1-application{grid-template-columns:repeat(2,1fr);}.act1-application div:nth-child(2){border-right:0;}.act1-application div:nth-child(-n+2){border-bottom:1px solid rgba(229,229,229,.075);}
}
@media(max-width:640px){
  .act1-method-nav{display:none;}.act1-stage-panel{grid-template-columns:1fr;gap:.7rem;padding-top:.95rem;}.act1-stage-id{border-right:0;padding:0 0 .55rem;border-bottom:1px solid rgba(197,160,89,.17);}.act1-stage-block:last-child{grid-column:auto;}
  .act1-stage-controls{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0 0;border-top:1px solid rgba(229,229,229,.07);}.act1-stage-controls button{border:0;background:transparent;color:var(--gold);font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}.act1-stage-controls span{color:rgba(229,229,229,.4);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;}
  .act1-domain-head,.act1-output-head,.act1-bridge{align-items:flex-start;flex-direction:column;}.act1-domain-row{grid-template-columns:1fr;gap:.35rem;padding:.8rem 0;}.act1-domain-cell{padding-left:.65rem;border-left:1px solid rgba(197,160,89,.22);}.act1-domain-cell+.act1-domain-cell{margin-top:.3rem;}.act1-application{grid-template-columns:1fr;}.act1-application div{border-right:0;border-bottom:1px solid rgba(229,229,229,.075)!important;}.act1-application div:last-child{border-bottom:0!important;}.act1-discipline{grid-template-columns:1fr;gap:.22rem;}.act1-output-strip{display:grid;gap:.42rem;}.act1-output-strip span+span::before{display:none;}
}
/* ---- MINIMALIST ACT I END ---- */
'''
          if css_marker not in text:
              text = text.replace('</style>', css + '\n</style>', 1)

          start = text.find('  // ---------- ACT I ----------')
          end = text.find('  function authLine(a){', start)
          if start < 0 or end < 0:
              raise SystemExit('Act I replacement markers not found')

          act1 = r'''  // ---------- ACT I ----------
  (function(){
    var stages=[
      {title:'Conduct',question:'What is actually happening?',discipline:'Ignore the commercial label. Identify the activity, transaction, decision, processing operation or representation that the law can regulate.',result:'A legally material description of the conduct.'},
      {title:'Role',question:'Whose legal position is engaged?',discipline:'Resolve the role per activity and per exposure: provider, deployer, lender, intermediary, custodian, principal, adviser or another duty-bearing actor.',result:'The correct duty bearer and allocation question.'},
      {title:'Context',question:'Which facts change the legal treatment?',discipline:'Identify the affected person, data, asset, market, jurisdiction, degree of automation, custody, audience and operational control.',result:'The relevant legal surface without treating it as proof of exposure.'},
      {title:'Harm',question:'What is the terminal legal wrong?',discipline:'Classify by the injury or consequence ultimately pursued—not by the technology, product label or intermediate mechanism.',result:'The legally relevant harm category and remedy path.'},
      {title:'Authority',question:'Which rule genuinely governs the issue?',discipline:'Use only real, findable and on-point statutes, regulations, cases or enforceable principles. Authority is selected for relevance, not volume.',result:'A defensible legal source and interpretive boundary.'},
      {title:'Trigger / Exclusion',question:'Which facts activate the exposure—and which facts defeat it?',discipline:'Test precise factual conditions against the underlying record. Every trigger must be paired with an exclusion capable of preventing a false positive.',result:'A supported, controlled, excluded or evidence-limited position.'},
      {title:'Consequence',question:'Who bears what consequence, and when?',discipline:'Separate entity exposure, personal liability, market access, financial consequence, enforceability, timing and current legal status.',result:'A practical severity and priority assessment.'},
      {title:'Response / Review',question:'What action is legally capable of addressing the issue?',discipline:'Route the finding to the correct contract, policy, operational control, evidence request, remediation step or qualified/local counsel question.',result:'A response matched to the legal problem.'}
    ];

    var demos={
      credit:{
        label:'Credit Scoring',
        context:'One activity can carry a regulated financial function and a distinct AI capability overlay. The two classifications answer different legal questions.',
        rows:[
          ['Behavior Class / Archetype','SCOR — credit scoring or assessment','JDG — person-affecting scoring or decisioning'],
          ['Lane','Financial provider or operator, resolved per exposure','AI provider or deployer, resolved per exposure'],
          ['Surface','Credit Data · Consumer Retail','Personal Data · Financial · Consumer/Public'],
          ['Terminal Harm','Fair lending · disclosure · consumer harm','Automated decision · privacy · discrimination']
        ],
        application:{authority:'Financial law governs lending, fair treatment and reasons; AI/privacy law governs automation, data use and oversight.',trigger:'Does the score materially influence the outcome? Is human review genuinely independent? Are specific reasons available?',consequence:'Regulatory exposure, consumer remedy, defective allocation or an evidence limitation requiring escalation.',response:'Fair-lending testing, reason generation, meaningful human review, contractual allocation and counsel review.'}
      },
      payment:{
        label:'Payment Orchestration',
        context:'The payment function remains primary. An AI overlay is added only where model routing or autonomous action materially changes the legal analysis.',
        rows:[
          ['Behavior Class / Archetype','PAY — payment initiation or orchestration','ORC / DOE — model routing or autonomous action, where present'],
          ['Lane','Payment provider, intermediary or programme operator','AI provider or deployer, according to control of the capability'],
          ['Surface','Transaction Data · Merchant SME · Client Funds','Financial Data · Infrastructure · Personal Data'],
          ['Terminal Harm','Licensing · safeguarding · settlement failure','Authority allocation · privacy · automated-action harm']
        ],
        application:{authority:'Payments and safeguarding rules govern the financial activity; AI and data rules govern the capability layer.',trigger:'Who initiates the transaction? Who controls or holds funds? Can the automated layer commit, retry or redirect activity?',consequence:'Authorisation perimeter risk, safeguarding failure, financial commitment, data exposure or incomplete public proof.',response:'Role allocation, funds-flow evidence, permission limits, circuit controls, provider terms and local payments review.'}
      },
      identity:{
        label:'Identity Verification',
        context:'Identity verification is a financial-control activity. AI classifications become relevant only where ingestion, transformation or consequential decisioning is actually present.',
        rows:[
          ['Behavior Class / Archetype','KYCV — identity and KYC verification','RDR / TRN / JDG — ingestion, transformation or decisioning, where present'],
          ['Lane','Financial provider or onboarding operator','AI provider or deployer, resolved by the specific processing role'],
          ['Surface','KYC Identity Data · Sensitive Financial · Consumer Retail','Personal Data · Sensitive/Biometric · Consumer/Public'],
          ['Terminal Harm','AML failure · access error · privacy harm','Biometric/privacy harm · automated-decision harm']
        ],
        application:{authority:'KYC/AML and financial-data duties govern onboarding; privacy and AI rules govern collection, processing and decision use.',trigger:'What data is collected? Is biometric inference used? Does the output determine access? What manual exception route exists?',consequence:'Onboarding failure, unlawful processing, wrongful denial, regulatory heat or a private-evidence requirement.',response:'Data-minimisation route, KYC evidence, exception review, retention controls, notice and qualified counsel review.'}
      }
    };

    var stageButtons=stages.map(function(s,i){
      return '<button class="act1-method-step" type="button" data-act1-step="'+i+'" aria-selected="'+(i===0?'true':'false')+'"><span class="n">0'+(i+1)+'</span><span class="t">'+esc(s.title)+'</span></button>';
    }).join('');
    var domainButtons=Object.keys(demos).map(function(k,i){
      return '<button class="act1-domain-tab'+(i===0?' active':'')+'" type="button" data-act1-domain="'+k+'" aria-selected="'+(i===0?'true':'false')+'">'+esc(demos[k].label)+'</button>';
    }).join('');

    main.appendChild(el(
      '<section id="foundation" class="act" data-rail="1"><div class="card-shell act1-minimal">'
      +'<header id="doctrine-layer" class="reveal act1-opening"><p class="eyebrow">ACT I · LEGAL REASONING</p><h2 class="font-display section-title text-white mt-2">From facts to legal position.</h2><p class="act1-opening-copy">Complex technology matters do not begin with a list of laws. They begin with characterising the conduct, identifying the legally relevant role and context, testing the governing rule against evidence, and reaching a position that can be drafted, controlled or escalated for review.</p><p class="act1-opening-copy">The vocabulary changes by domain. The legal method does not.</p></header>'
      +'<div class="reveal act1-method-shell"><nav class="act1-method-nav" aria-label="Legal reasoning stages">'+stageButtons+'</nav><div id="act1-stage-panel" class="act1-stage-panel" aria-live="polite"></div><div class="act1-stage-controls"><button type="button" id="act1-prev">← Previous</button><span id="act1-mobile-count">01 / 08</span><button type="button" id="act1-next">Next →</button></div></div>'
      +'<section id="taxonomy-map" class="reveal act1-domain"><div class="act1-domain-head"><div><p class="eyebrow">Cross-domain demonstration</p><h3>One legal method. Domain-specific vocabulary.</h3><p>Behavior Class, Lane, Surface and terminal harm narrow the legal universe. They do not decide the exposure. Authority, trigger and exclusion complete the application.</p></div></div><div class="act1-domain-tabs" role="tablist">'+domainButtons+'</div><div id="act1-domain-demo" aria-live="polite"></div></section>'
      +'<section class="reveal act1-disciplines" aria-label="Governing disciplines">'
        +'<div class="act1-discipline"><strong>Classification is not conclusion.</strong><span>Classification identifies the relevant legal inquiry. It does not prove exposure.</span></div>'
        +'<div class="act1-discipline"><strong>Signal is not evidence.</strong><span>A summary, index or prior classification cannot replace the underlying factual record.</span></div>'
        +'<div class="act1-discipline"><strong>Every trigger needs an exclusion.</strong><span>Good legal analysis identifies both what activates an issue and what defeats it.</span></div>'
        +'<div class="act1-discipline"><strong>The response must fit the problem.</strong><span>A clause cannot repair a defective interface; a technical control cannot resolve a legal-allocation failure.</span></div>'
      +'</section>'
      +'<section class="reveal act1-output"><div class="act1-output-head"><div><p class="eyebrow">What the method produces</p><p>A legal position that states what is supported, what is excluded, what remains uncertain, and what instrument or review route is capable of addressing it.</p></div></div><div class="act1-output-strip"><span>Reasoned Position</span><span>Evidence Basis</span><span>Applicable Authority</span><span>Limitations</span><span>Legal Instrument</span><span>Review Route</span></div></section>'
      +'<div id="act1-act2-bridge" class="reveal act1-bridge"><p>The method is only valuable if it survives contact with a complex matter. Act II applies it to an integrated product and its legally distinct activities.</p><a href="#matrix">Continue to Act II →</a></div>'
      +'</div></section>'
    ));

    var currentStage=0;
    function renderStage(i){
      currentStage=(i+stages.length)%stages.length;
      var s=stages[currentStage];
      document.querySelectorAll('[data-act1-step]').forEach(function(btn,n){var active=n===currentStage;btn.classList.toggle('active',active);btn.setAttribute('aria-selected',active?'true':'false');});
      document.getElementById('act1-stage-panel').innerHTML='<div class="act1-stage-id"><span class="act1-stage-count">0'+(currentStage+1)+' / 08</span><h3>'+esc(s.title)+'</h3></div><div class="act1-stage-block"><strong>Legal question</strong><p>'+esc(s.question)+'</p><div style="height:.55rem"></div><strong>Analytical discipline</strong><p>'+esc(s.discipline)+'</p></div><div class="act1-stage-block"><strong>Result</strong><p>'+esc(s.result)+'</p></div>';
      document.getElementById('act1-mobile-count').textContent='0'+(currentStage+1)+' / 08';
    }

    function renderDomain(key){
      var d=demos[key]||demos.credit;
      document.querySelectorAll('[data-act1-domain]').forEach(function(btn){var active=btn.getAttribute('data-act1-domain')===key;btn.classList.toggle('active',active);btn.setAttribute('aria-selected',active?'true':'false');});
      var rows=d.rows.map(function(r){return '<div class="act1-domain-row"><div class="lens">'+esc(r[0])+'</div><div class="act1-domain-cell"><strong>Primary domain · FinTech</strong><span>'+esc(r[1])+'</span></div><div class="act1-domain-cell"><strong>Capability overlay · AI</strong><span>'+esc(r[2])+'</span></div></div>';}).join('');
      var a=d.application;
      document.getElementById('act1-domain-demo').innerHTML='<p class="act1-domain-context">'+esc(d.context)+'</p><div class="act1-domain-compare">'+rows+'</div><p class="act1-domain-note"><strong>Boundary:</strong> The primary domain governs the underlying financial activity. The AI overlay adds capability-specific duties only where the product mechanics justify it. Neither replaces the other.</p><div class="act1-application"><div><strong>Authority</strong><span>'+esc(a.authority)+'</span></div><div><strong>Trigger / Exclusion</strong><span>'+esc(a.trigger)+'</span></div><div><strong>Consequence</strong><span>'+esc(a.consequence)+'</span></div><div><strong>Response / Review</strong><span>'+esc(a.response)+'</span></div></div>';
    }

    document.querySelectorAll('[data-act1-step]').forEach(function(btn){btn.addEventListener('click',function(){renderStage(parseInt(btn.getAttribute('data-act1-step'),10));});});
    document.getElementById('act1-prev').addEventListener('click',function(){renderStage(currentStage-1);});
    document.getElementById('act1-next').addEventListener('click',function(){renderStage(currentStage+1);});
    document.querySelectorAll('[data-act1-domain]').forEach(function(btn){btn.addEventListener('click',function(){renderDomain(btn.getAttribute('data-act1-domain'));});});
    renderStage(0);
    renderDomain('credit');
  })();

'''
          text = text[:start] + act1 + text[end:]
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate rebuilt page
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, json
          t=Path('index.html').read_text(encoding='utf-8')
          required=['ACT I · LEGAL REASONING','From facts to legal position.','One legal method. Domain-specific vocabulary.','Classification is not conclusion.','What the method produces','Continue to Act II']
          missing=[x for x in required if x not in t]
          if missing: raise SystemExit('Missing Act I content: '+repr(missing))
          forbidden=['First Fork - where does the AI risk live?','Risk Map - classify the AI','Authority-to-rule examples','ACT I - SOURCE LAYER']
          active=t[t.index('  // ---------- ACT I ----------'):t.index('  function authLine(a){')]
          leaked=[x for x in forbidden if x in active]
          if leaked: raise SystemExit('Legacy Act I still active: '+repr(leaked))
          ids=re.findall(r'\bid="([^"]+)"',t)
          dup=sorted({x for x in ids if ids.count(x)>1})
          if dup: raise SystemExit('Duplicate ids: '+repr(dup))
          scripts=re.findall(r'<script(?![^>]*type="application/json")[^>]*>(.*?)</script>',t,re.S)
          Path('/tmp/runtime.js').write_text('\n'.join(scripts),encoding='utf-8')
          print('Act I content and ID validation: PASS')
          PY
          node --check /tmp/runtime.js

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve and render Act I
        run: |
          python3 -m http.server 4173 >/tmp/act1-preview.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break; sleep 1; done
          cat > render-act1.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({headless:true});
          for (const cfg of [{name:'desktop',width:1440,height:1000},{name:'mobile',width:390,height:844}]) {
            const page = await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
            await page.waitForTimeout(1200);
            const act1 = page.locator('#foundation');
            await act1.scrollIntoViewIfNeeded();
            await page.waitForTimeout(300);
            await act1.screenshot({path:`act1-${cfg.name}.png`});
          }
          await browser.close();
          EOF
          node render-act1.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: act1-minimal-preview
          path: |
            act1-desktop.png
            act1-mobile.png
          if-no-files-found: error

      - name: Commit Act I rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Rebuild Act I as a minimalist cross-domain legal method"
          git push origin HEAD:act2-live-run-rebuild
