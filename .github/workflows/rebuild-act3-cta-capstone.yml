name: Diagnose final Act III CTA

on:
  pull_request:
    types: [synchronize, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  render:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1
      - name: Diagnose and capture
        run: |
          cat > diagnose-act3.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser=await chromium.launch({headless:true});
          const logs=[];
          for(const cfg of [{name:'desktop',width:1440,height:1100},{name:'mobile',width:390,height:844}]){
            const page=await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            const pageErrors=[]; page.on('pageerror',e=>pageErrors.push(String(e)));
            try{
              await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
              await page.waitForTimeout(1000);
              logs.push(`${cfg.name} upstream-count=${await page.locator('[data-upstream-system-cta]').count()}`);
              await page.locator('[data-upstream-system-cta]').first().click({force:true,timeout:15000});
              await page.waitForTimeout(100);
              logs.push(`${cfg.name} modal-open=${await page.locator('#modal.open').count()}`);
              logs.push(`${cfg.name} modal-text=${(await page.locator('#modal').innerText()).slice(0,220)}`);
              await page.locator('[data-system-continue]').click({force:true,timeout:15000});
              await page.waitForTimeout(200);
              logs.push(`${cfg.name} modal-after-continue=${await page.locator('#modal.open').count()}`);
              const act3=page.locator('#delivery-system');
              await act3.scrollIntoViewIfNeeded();
              await page.evaluate((mobile)=>{
                document.querySelectorAll('#delivery-system .reveal').forEach(n=>n.classList.add('visible'));
                const top=document.querySelector('.topnav'); const funnel=document.querySelector('.mobile-funnel');
                if(top) top.style.display='none'; if(mobile&&funnel) funnel.style.display='none';
              },cfg.name==='mobile');
              await page.waitForTimeout(100);
              logs.push(`${cfg.name} launch-count=${await page.locator('.act3-launch-btn').count()}`);
              logs.push(`${cfg.name} capstone-count=${await page.locator('#capstone').count()}`);
              logs.push(`${cfg.name} overflow=${await page.evaluate(()=>document.documentElement.scrollWidth-window.innerWidth)}`);
              logs.push(`${cfg.name} page-errors=${pageErrors.join(' | ')||'none'}`);
              await act3.screenshot({path:`act3-${cfg.name}.png`});
            }catch(error){
              logs.push(`${cfg.name} ERROR=${String(error)}`);
              logs.push(`${cfg.name} page-errors=${pageErrors.join(' | ')||'none'}`);
              await page.screenshot({path:`act3-${cfg.name}.png`,fullPage:true}).catch(()=>{});
            }
            await page.close();
          }
          await browser.close();
          await writeFile('browser-diagnostic.txt',logs.join('\n'));
          EOF
          node diagnose-act3.mjs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: act3-cta-browser-diagnostic
          path: |
            act3-desktop.png
            act3-mobile.png
            browser-diagnostic.txt
          if-no-files-found: warn
