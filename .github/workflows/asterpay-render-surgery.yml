name: AsterPay rendered portfolio surgery

on:
  push:
    branches:
      - act2-live-run-rebuild
    paths:
      - index.html
      - tools/apply_asterpay_render_surgery.py
      - .github/workflows/asterpay-render-surgery.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]' && github.event.head_commit.message != 'Remove temporary AsterPay surgery tooling'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
          fetch-depth: 0

      - name: Apply rendered-review surgery
        run: python tools/apply_asterpay_render_surgery.py

      - name: Validate HTML structure and anchors
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from collections import Counter
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          ids = re.findall(r'id="([^"]+)"', text)
          duplicates = [item for item, count in Counter(ids).items() if count > 1]
          if duplicates:
              raise SystemExit(f'Duplicate IDs: {duplicates}')

          hrefs = re.findall(r'href="#([^"]+)"', text)
          missing = sorted(set(hrefs) - set(ids))
          if missing:
              raise SystemExit(f'Broken internal anchors: {missing}')

          required = [
              'I turn complex <span>product reality</span> into reviewable legal decisions.',
              'Simulated diligence instruction · AsterPay',
              'Legal judgment is the foundation.',
              'Swipe to inspect the routed obligations.',
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f'Missing required marker: {marker}')

          if 'class="cta sticky-sandbox"' in text:
              raise SystemExit('Obstructive floating sandbox CTA remains.')

          print('HTML structure and content markers: PASS')
          PY

      - name: Validate inline JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          Path('/tmp/portfolio-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/portfolio-inline.js

      - name: Commit surgery
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index change produced.'
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Refine AsterPay portfolio after rendered review'
          git push origin HEAD:act2-live-run-rebuild
