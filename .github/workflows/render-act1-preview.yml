name: Render minimalist Act I preview

on:
  pull_request:
    types: [synchronize, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  render:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1
      - name: Test and render
        run: |
          cat > render-act1.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({headless:true});
          for (const cfg of [{name:'desktop',width:1440,height:1000},{name:'mobile',width:390,height:844}]) {
            const page = await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
            await page.waitForTimeout(1200);
            const foundation = page.locator('#foundation');
            await foundation.scrollIntoViewIfNeeded();
            await page.waitForTimeout(500);
            await page.evaluate(() => document.querySelector('[data-act1-step="5"]')?.click());
            await page.waitForFunction(() => document.querySelector('#act1-stage-panel')?.textContent?.includes('Which facts activate the exposure'));
            await page.evaluate(() => document.querySelector('[data-act1-domain="payment"]')?.click());
            await page.waitForFunction(() => document.querySelector('#act1-domain-demo')?.textContent?.includes('PAY — payment initiation or orchestration'));
            const overflow = await page.evaluate(() => document.documentElement.scrollWidth - window.innerWidth);
            if (overflow > 1) throw new Error(`${cfg.name} horizontal overflow: ${overflow}px`);
            await page.evaluate(() => {
              document.querySelector('[data-act1-step="0"]')?.click();
              document.querySelector('[data-act1-domain="credit"]')?.click();
              document.querySelectorAll('#foundation .reveal').forEach(el => el.classList.add('visible'));
            });
            await page.waitForTimeout(200);
            await foundation.screenshot({path:`act1-${cfg.name}.png`});
            await page.close();
          }
          await browser.close();
          EOF
          node render-act1.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: act1-minimal-preview
          path: |
            act1-desktop.png
            act1-mobile.png
          if-no-files-found: error
