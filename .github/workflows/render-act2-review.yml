name: Render Act II visual review

on:
  pull_request:
    types: [edited, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  render:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1
      - name: Verify and render
        run: |
          cat > /tmp/render.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser = await chromium.launch({headless:true});
          const logs=[];
          for (const cfg of [{name:'desktop',width:1440,height:1100},{name:'mobile',width:390,height:844}]) {
            const page = await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            page.on('pageerror', error => logs.push(`${cfg.name} pageerror: ${String(error)}`));
            try {
              await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
              await page.waitForTimeout(1200);
              const section=page.locator('#matrix');
              await section.scrollIntoViewIfNeeded();
              await page.waitForSelector('[data-act2-movement="deconstruct"]',{timeout:15000});
              const initial=await page.locator('#act2-movement-panel').innerText();
              logs.push(`${cfg.name} initial: ${initial.slice(0,180)}`);
              await section.screenshot({path:`act2-${cfg.name}.png`});
              await page.locator('[data-act2-movement="test"]').click({force:true});
              await page.waitForTimeout(100);
              const threadCount=await page.locator('[data-act2-thread="credit"]').count();
              logs.push(`${cfg.name} credit-thread-count: ${threadCount}`);
              if(threadCount){
                await page.locator('[data-act2-thread="credit"]').click({force:true});
                await page.waitForTimeout(100);
                logs.push(`${cfg.name} tested: ${(await page.locator('#act2-thread-panel').innerText()).slice(0,220)}`);
              }
              await page.locator('[data-act2-movement="reconstruct"]').click({force:true});
              await page.waitForTimeout(100);
              logs.push(`${cfg.name} reconstructed: ${(await page.locator('#act2-movement-panel').innerText()).slice(0,180)}`);
              const overflow=await page.evaluate(() => document.documentElement.scrollWidth-window.innerWidth);
              logs.push(`${cfg.name} horizontal-overflow: ${overflow}px`);
            } catch (error) {
              logs.push(`${cfg.name} verification-error: ${String(error)}`);
              await page.screenshot({path:`act2-${cfg.name}.png`,fullPage:true});
            }
            await page.close();
          }
          await writeFile('browser-errors.txt', logs.join('\n'));
          await browser.close();
          EOF
          node /tmp/render.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: act2-applied-legal-architecture-preview
          path: |
            act2-desktop.png
            act2-mobile.png
            browser-errors.txt
          if-no-files-found: error
