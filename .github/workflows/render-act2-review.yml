name: Render Act II visual review

on:
  pull_request:
    types: [edited, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  render:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1
      - name: Validate and capture Act II
        run: |
          cat > render-act2.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser = await chromium.launch({headless:true});
          const logs=[];
          for (const cfg of [{name:'desktop',width:1440,height:1100},{name:'mobile',width:390,height:844}]) {
            const page = await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            const errors=[];
            page.on('pageerror', error => errors.push(String(error)));
            await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
            await page.waitForTimeout(1200);
            const section=page.locator('#matrix');
            await section.scrollIntoViewIfNeeded();
            await page.waitForTimeout(250);
            const initial=await page.locator('#act2-movement-panel').innerText();
            if(!initial.includes('Expose the legally distinct matter')) throw new Error(`${cfg.name}: Deconstruct did not render`);
            await page.evaluate((mobile) => {
              document.querySelectorAll('#matrix .reveal').forEach(node => node.classList.add('visible'));
              if(mobile){
                const top=document.querySelector('.topnav');
                const funnel=document.querySelector('.mobile-funnel');
                if(top) top.style.display='none';
                if(funnel) funnel.style.display='none';
              }
            }, cfg.name==='mobile');
            await page.waitForTimeout(100);
            await section.screenshot({path:`act2-${cfg.name}.png`});
            await page.evaluate(() => document.querySelector('[data-act2-movement="test"]').click());
            await page.waitForTimeout(100);
            if(await page.locator('[data-act2-thread]').count() !== 4) throw new Error(`${cfg.name}: issue thread tabs missing`);
            await page.evaluate(() => document.querySelector('[data-act2-thread="credit"]').click());
            await page.waitForTimeout(100);
            const tested=await page.locator('#act2-thread-panel').innerText();
            if(!tested.includes('The score materially determines')) throw new Error(`${cfg.name}: Credit Scoring test did not render`);
            await page.evaluate(() => document.querySelector('[data-act2-movement="reconstruct"]').click());
            await page.waitForTimeout(100);
            const rebuilt=await page.locator('#act2-movement-panel').innerText();
            if(!rebuilt.includes('Rebuild the separate findings')) throw new Error(`${cfg.name}: Reconstruct did not render`);
            const overflow=await page.evaluate(() => document.documentElement.scrollWidth-window.innerWidth);
            if(overflow>1) throw new Error(`${cfg.name}: horizontal overflow ${overflow}px`);
            if(errors.length) throw new Error(`${cfg.name}: browser errors: ${errors.join(' | ')}`);
            logs.push(`${cfg.name}: PASS — Deconstruct, Test, Credit Scoring, Reconstruct, 0px overflow`);
            await page.close();
          }
          await browser.close();
          await writeFile('validation.txt',logs.join('\n'));
          EOF
          node render-act2.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: act2-final-preview
          path: |
            act2-desktop.png
            act2-mobile.png
            validation.txt
          if-no-files-found: error
