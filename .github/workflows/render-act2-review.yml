name: Render Act II visual review

on:
  pull_request:
    types: [edited, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  render:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1
      - name: Capture Act II
        run: |
          echo 'Capture started.' > browser-errors.txt
          cat > /tmp/render.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { appendFile } from 'node:fs/promises';
          const browser = await chromium.launch({headless:true});
          for (const cfg of [{name:'desktop',width:1440,height:1100},{name:'mobile',width:390,height:844}]) {
            const page = await browser.newPage({viewport:{width:cfg.width,height:cfg.height},deviceScaleFactor:1});
            const logs=[];
            page.on('pageerror', error => logs.push(`pageerror: ${String(error)}`));
            try {
              await page.goto('http://127.0.0.1:4173/index.html',{waitUntil:'networkidle',timeout:120000});
              await page.waitForTimeout(1200);
              const section=page.locator('#matrix');
              await section.scrollIntoViewIfNeeded();
              await page.waitForTimeout(250);
              const movementCount=await page.locator('[data-act2-movement]').count();
              const threadCountBefore=await page.locator('[data-act2-thread]').count();
              const initial=await page.locator('#act2-movement-panel').innerText().catch(()=> 'movement panel unavailable');
              logs.push(`movement-count: ${movementCount}`);
              logs.push(`thread-count-before-test: ${threadCountBefore}`);
              logs.push(`initial: ${initial.slice(0,220)}`);
              await page.screenshot({path:`act2-${cfg.name}.png`,fullPage:false});
              if(movementCount>=3){
                await page.locator('[data-act2-movement="test"]').click({force:true}).catch(error=>logs.push(`test-click: ${String(error)}`));
                await page.waitForTimeout(150);
                const threadCount=await page.locator('[data-act2-thread]').count();
                logs.push(`thread-count-after-test: ${threadCount}`);
                if(threadCount){
                  await page.locator('[data-act2-thread="credit"]').click({force:true}).catch(error=>logs.push(`credit-click: ${String(error)}`));
                  await page.waitForTimeout(100);
                  const tested=await page.locator('#act2-thread-panel').innerText().catch(()=> 'thread panel unavailable');
                  logs.push(`tested: ${tested.slice(0,240)}`);
                }
                await page.locator('[data-act2-movement="reconstruct"]').click({force:true}).catch(error=>logs.push(`reconstruct-click: ${String(error)}`));
                await page.waitForTimeout(100);
                const rebuilt=await page.locator('#act2-movement-panel').innerText().catch(()=> 'movement panel unavailable');
                logs.push(`reconstructed: ${rebuilt.slice(0,220)}`);
              }
              const overflow=await page.evaluate(() => document.documentElement.scrollWidth-window.innerWidth);
              logs.push(`horizontal-overflow: ${overflow}px`);
            } catch(error) {
              logs.push(`capture-error: ${String(error)}`);
              await page.screenshot({path:`act2-${cfg.name}.png`,fullPage:false}).catch(()=>{});
            }
            await appendFile('browser-errors.txt',`\n[${cfg.name}]\n${logs.join('\n')}\n`);
            await page.close();
          }
          await browser.close();
          EOF
          node /tmp/render.mjs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: act2-applied-legal-architecture-preview
          path: |
            act2-desktop.png
            act2-mobile.png
            browser-errors.txt
          if-no-files-found: warn
