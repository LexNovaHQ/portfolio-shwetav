name: Render hero preview

on:
  pull_request:
    branches: [main]
  push:
    branches: [act2-live-run-rebuild]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - name: Remove stale hero override
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          marker = '  var lockedHero = {'
          boot = '  function boot(C, act2Manifest){'
          if marker in s:
              start = s.index(marker)
              end = s.index(boot, start)
              s = s[:start] + '  // Hero content is governed by the synchronized embedded content source.\n' + s[end:]
          s = s.replace('  C.hero = Object.assign({}, C.hero || {}, lockedHero);\n', '')
          s = s.replace('>Shwetabh Singh</div>', '>Shwetav Singh</div>')
          s = s.replace('© 2026 Shwetabh Singh', '© 2026 Shwetav Singh')
          p.write_text(s, encoding='utf-8')
          PY
          git diff --check
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Remove stale hero content override"
            git push origin HEAD:act2-live-run-rebuild
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y
          npm install playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 > /tmp/portfolio-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/portfolio-preview.log
          exit 1
      - name: Render screenshots
        run: |
          cat > render-preview.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({ headless: true });
          const desktop = await browser.newPage({ viewport: { width: 1440, height: 1100 }, deviceScaleFactor: 1 });
          await desktop.goto('http://127.0.0.1:4173/index.html', { waitUntil: 'networkidle', timeout: 120000 });
          await desktop.waitForTimeout(2200);
          await desktop.screenshot({ path: 'hero-desktop.png', fullPage: false });
          const mobile = await browser.newPage({ viewport: { width: 390, height: 844 }, deviceScaleFactor: 1 });
          await mobile.goto('http://127.0.0.1:4173/index.html', { waitUntil: 'networkidle', timeout: 120000 });
          await mobile.waitForTimeout(2200);
          await mobile.screenshot({ path: 'hero-mobile.png', fullPage: false });
          await browser.close();
          EOF
          node render-preview.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: hero-preview
          path: |
            hero-desktop.png
            hero-mobile.png
          if-no-files-found: error
