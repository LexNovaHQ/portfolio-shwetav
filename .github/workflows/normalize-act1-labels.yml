name: Normalize Act I labels

on:
  pull_request:
    types: [synchronize, edited]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
          fetch-depth: 0
      - name: Apply label normalization
        run: python3 .github/tmp/normalize_act1_labels.py
      - name: Validate labels
        run: |
          python3 - <<'PY'
          from pathlib import Path
          t=Path('index.html').read_text(encoding='utf-8')
          required=['ACT I · LEGAL GRAMMAR', "{title:'Terminal Harm',question:'What is the terminal legal wrong?'"]
          missing=[x for x in required if x not in t]
          if missing: raise SystemExit('Missing normalized labels: '+repr(missing))
          forbidden=['ACT I · LEGAL REASONING', "{title:'Harm',question:'What is the terminal legal wrong?'"]
          leaked=[x for x in forbidden if x in t]
          if leaked: raise SystemExit('Old labels remain: '+repr(leaked))
          print('Act I label validation: PASS')
          PY
      - name: Commit normalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Normalize Act I as Legal Grammar and Terminal Harm"
          git push origin HEAD:act2-live-run-rebuild
