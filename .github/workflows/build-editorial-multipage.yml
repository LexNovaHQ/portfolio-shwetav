name: Diagnose editorial multi-page portfolio

on:
  pull_request:
    types: [synchronize, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'act2-live-run-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: act2-live-run-rebuild
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Serve portfolio
        run: |
          python3 -m http.server 4173 >/tmp/portfolio.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0; sleep 1; done
          cat /tmp/portfolio.log
          exit 1
      - name: Capture diagnostics
        run: |
          cat > diagnose.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const browser=await chromium.launch({headless:true});
          const configs=[
            {file:'index.html',name:'home'},
            {file:'legal-grammar.html',name:'act1'},
            {file:'applied-legal-architecture.html',name:'act2'},
            {file:'legal-architecture-in-operation.html',name:'act3'},
          ];
          const output=[];
          for(const viewport of [{label:'desktop',width:1440,height:1000},{label:'mobile',width:390,height:844}]){
            for(const cfg of configs){
              const page=await browser.newPage({viewport:{width:viewport.width,height:viewport.height}});
              const errors=[]; page.on('pageerror',e=>errors.push(String(e)));
              await page.goto(`http://127.0.0.1:4173/${cfg.file}`,{waitUntil:'networkidle',timeout:120000});
              await page.waitForTimeout(1000);
              const data=await page.evaluate(()=>{
                const sels=['#hero','#proof-architecture','#foundation','#matrix','#delivery-system','#contact'];
                const vis={};
                for(const sel of sels){const el=document.querySelector(sel);vis[sel]=el?{display:getComputedStyle(el).display,visible:!!(el.offsetWidth||el.offsetHeight||el.getClientRects().length)}:null;}
                return {
                  bodyPage:document.body.getAttribute('data-page'),
                  sections:vis,
                  railCount:document.querySelectorAll('.local-rail-link').length,
                  activeNav:document.querySelectorAll('.editorial-nav-link.active').length,
                  headerCta:document.querySelectorAll('.editorial-header-cta').length,
                  launchCount:document.querySelectorAll('.act3-launch-btn').length,
                  contactText:(document.querySelector('#contact')?.innerText||'').slice(0,500),
                  width:document.documentElement.scrollWidth,
                  viewport:window.innerWidth
                };
              });
              data.viewportLabel=viewport.label;data.pageName=cfg.name;data.errors=errors;
              output.push(data);
              await page.evaluate(()=>document.querySelectorAll('.reveal').forEach(n=>n.classList.add('visible')));
              await page.screenshot({path:`${cfg.name}-${viewport.label}.png`,fullPage:true});
              await page.close();
            }
          }
          await browser.close();
          await writeFile('diagnostic.json',JSON.stringify(output,null,2));
          EOF
          node diagnose.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: editorial-multipage-diagnostics
          path: |
            diagnostic.json
            home-desktop.png
            act1-desktop.png
            act2-desktop.png
            act3-desktop.png
            home-mobile.png
            act1-mobile.png
            act2-mobile.png
            act3-mobile.png
          if-no-files-found: error
