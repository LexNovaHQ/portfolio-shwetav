}
*{box-sizing:border-box;}
html{scroll-behavior:smooth; background:var(--void);}
body{margin:0;
  background:

    radial-gradient(circle at 80% 18%, rgba(255,255,255,.045), transparent 24rem),

.tracked{letter-spacing:.2em; text-transform:uppercase;}
.gold{color:var(--gold);}
.surface{background:linear-gradient(180deg,rgba(12,12,12,.96),rgba(8,8,8,.96)); border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.03);}
.hairline{height:1px; background:linear-gradient(90deg,transparent,rgba(197,160,89,.55),rgba(255,255,255,.07),transparent);}
.progress-line{position:fixed; top:0; left:0; height:2px; width:0%; z-index:80;
  background:linear-gradient(90deg,var(--gold),rgba(197,160,89,.25)); box-shadow:0 0 16px rgba(197,160,89,.6);}
.topnav{position:sticky; top:0; z-index:70; background:rgba(5,5,5,.78); backdrop-filter:blur(18px);

.page-shell{position:relative; z-index:2;}
.main-grid{display:grid; grid-template-columns:minmax(0,1fr);}

/* ---- RAIL (live argument map) ---- */
.rail-wrap{display:none;}
@media(min-width:1024px){
  .rail-wrap{display:block; position:sticky; top:86px; align-self:start; height:calc(100vh - 110px); overflow-y:auto;}
  .rail{position:relative; padding:.5rem .25rem 2rem;}
  .rail::before{content:""; position:absolute; left:21px; top:26px; bottom:40px; width:1px;
    background:linear-gradient(180deg,rgba(197,160,89,.25),rgba(255,255,255,.08),rgba(197,160,89,.25));}
  .rail-band{font-size:.6rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(197,160,89,.7);
    font-weight:800; margin:1.1rem 0 .35rem 2.7rem;}
  .rail-band .tag{display:block; color:rgba(229,229,229,.38); font-weight:600; letter-spacing:.12em; margin-top:1px;}
  .rail-stage{position:relative; display:grid; grid-template-columns:44px 1fr; gap:.7rem; align-items:start; min-height:54px;
    border-radius:.85rem; padding:.12rem .2rem; text-decoration:none; cursor:pointer;}
  .rail-stage:hover,.rail-stage:focus{background:rgba(197,160,89,.06); outline:none;}
  .rail-dot{width:14px; height:14px; margin-left:14px; margin-top:2px; border-radius:999px; background:#080808;
    border:1px solid rgba(197,160,89,.45); box-shadow:0 0 0 5px rgba(5,5,5,.98); transition:all .3s;}
  .rail-dot.endpoint{transform:rotate(45deg); border-radius:3px;}
  .rail-stage.completed .rail-dot{background:rgba(197,160,89,.45); border-color:rgba(197,160,89,.75);}
  .rail-stage.active .rail-dot{background:var(--gold); border-color:var(--gold); box-shadow:0 0 0 5px #050505,0 0 22px rgba(197,160,89,.9);}
  .rail-stage.completed .rail-node{color:rgba(229,229,229,.72);}
  .rail-stage.active .rail-node{color:var(--gold);}
  .rail-node{font-size:.74rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(229,229,229,.5); font-weight:700;}
  .rail-sub{font-size:.68rem; color:rgba(229,229,229,.4); margin-top:.15rem; line-height:1.3;}
  .rail-why{display:none; margin-top:.5rem; padding:.55rem .65rem; border:1px solid rgba(197,160,89,.24);
    border-radius:.75rem; background:rgba(197,160,89,.07); color:rgba(229,229,229,.72); font-size:.68rem; line-height:1.45;}
  .rail-stage.explain .rail-why{display:block;}
  .rail-chip{display:inline-flex; align-items:center; gap:.4rem; margin:1rem 0 0 2.7rem; padding:.35rem .6rem;
    border:1px solid rgba(197,160,89,.35); background:rgba(197,160,89,.06); color:var(--gold);
    font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; border-radius:999px;}
  .rail-chip .pulse{width:6px; height:6px; border-radius:999px; background:var(--gold); box-shadow:0 0 8px var(--gold);}
}
.mobile-funnel{position:sticky; top:56px; z-index:60; display:flex; gap:.35rem; align-items:center; padding:.55rem 1rem;

section{scroll-margin-top:110px;}

ers, and what legal instrument should respond.","proof":"Shown through project walkthrough and scrubbed proof artifacts."},{"label":"Internal AI Use Review","what":"A review workflow for shadow AI, employee tool use, client-data exposure, output ownership, and workplace governance.","supports":"Supports internal AI policy, handbook, impact assessment, IP, and human-review controls.","proof":"Shown through the workplace governance scanner and related document stack."},{"label":"Client Product Profile Vault","what":"A structured intake vault that maps product facts — market exposure, model architecture, output ownership, SLA posture, PII processing, and AI archetype — into document-routing logic.","supports":"Supports ToS, DPA, AUP, SLA, Agentic Addendum, Privacy Policy, and related review-ready documents.","proof":"Built as a four-module intake wizard with clause-injection mappings."},{"label":"Risk-to-Clause Mapping System","what":"A legal mapping layer that connects risks, authorities, trigger conditions, and remediation clauses.","supports":"Supports reviewability: a reviewer can trace why a clause exists and what legal risk it closes.","proof":"Shown through the threat matrix and living document interaction."},{"label":"Document Assembly Workflow","what":"A workflow for turning client/product inputs into a structured document stack instead of hand-building every draft from zero.","supports":"Supports repeatable legal delivery while keeping human review and legal judgment in the loop.","proof":"Shown through the Vault-to-document assembly path."},{"label":"Client Review Portal","what":"A delivery layer for client intake, review, document status, and structured handoff.","supports":"Supports review-ready delivery: the legal work is organized for client and counsel review.","proof":"Shown through safe/scrubbed portal proof artifacts."}],"ctas":[{"label":"Watch project walkthrough","target":"#funnel-video"},{"label":"Explore proof portal","target":"#funnel-sandboxes"},{"label":"View build notes","target":"#capstone"}],"proof_line":"Demos and videos use public, synthetic, or scrubbed proof artifacts only.","credential_bar":"3.5 years litigation · B.A. LL.B., NLU Odisha · AI governance · privacy · commercial contracts · building hands-on since Oct 2025"},"rail":{"chip":{"derived":"law → system argument","structured":"risks → instruments","running":"instruments → delivery system"},"nodes":[{"kind":"start","label":"Start","sub":"the thesis","target":"hero-thesis","why":"Establishes the claim: lawyer first, systems second."},{"band":"ACT I · FOUNDATION","band_tag":"the law","node":"Doctrine","sub":"the legal source layer","target":"doctrine-layer","why":"Shows the legal source layer: cases, statutes, and risk principles."},{"band":"ACT I · FOUNDATION","band_tag":"the law","node":"Taxonomy","sub":"the risk map","target":"taxonomy-map","why":"Shows how AI use cases become legal risk categories."},{"band":"ACT II · THE LEGAL MATRIX","band_tag":"the instruments","node":"Instruments","sub":"clauses, policies, playbooks","target":"instruments-layer","why":"Shows how mapped risks become clauses, policies, and playbooks."},{"band":"ACT III · LEGAL DELIVERY SYSTEM","band_tag":"built to deliver it","node":"Tooling","sub":"diligence + delivery loop","target":"tooling-layer","why":"Shows the diligence and intake workflows that operationalize the legal work."},{"band":"ACT III · LEGAL DELIVERY SYSTEM","band_tag":"built to deliver it","node":"Systems","sub":"sandbox OS + portal delivery","target":"systems-layer","why":"Shows the reusable delivery layer: portal, vault, and automation architecture."},{"kind":"terminal","label":"Close","sub":"the fit","target":"close-fit","why":"Converts the proof into the hiring argument for legal tech practice."}]},"act1":{"orientation_line":"This portfolio runs in two halves. Acts I–II are the law — every AI risk mapped, and the clauses that close it. Act III is the systems I built to do that work automatically. The systems exist to deliver the law.","architecture_diagram":["Risk Map","Clauses","The Systems"],"header":"The Legal Foundation — AI law risks mapped into a working taxonomy.","forward_ref":"→ what the diligence engine later detects on its own.","intro":"Each one stays close to the real legal problem — what creates the exposure, what closes it, what holds up. I built them in AI law: contracts, compliance, privacy, AI liability, diligence, digital business risk. The build is just the delivery — the legal judgment is the point.","lanes":[{"tag":"Lane A","text":"companies building AI products"},{"tag":"Lane B","text":"companies deploying AI internally"}],"reference_layer":{"frame":"The reference layer the systems read from.","spine":["Mechanism","Consequence","Remediation"],"worked_line":"A model is probabilistic (mechanism) → its confident false output creates reliance liability (consequence) → a hallucination-specific waiver + output-authority boundary closes it (remediation).","scope_stat":"98 threats · 10 archetypes · 10 surfaces · 3 jurisdictions — authored solo since October 2025, refined from 81 through forensic-engine runs.","applied_practice":"Applied-practice layer shown frosted, with a count only. No raw corpus, no commercial labels."},"risk_map":{"note":"Classify → trigger. Select an archetype → its surfaces light over the Global Floor → click a lit surface → modal pulls the matching registry rows (authority IN/EU/US + clause). Preset-driven entry; on-hover definitions on every archetype and surface.","global_floor":{"code":"UNI","label":"Global Floor (Universal)","def":"The baseline every AI product is bound by, regardless of what it does — consent, transparency, third-party pass-throughs.","count":37},"archetypes":[{"code":"DOE","name":"Doer","kind":"Action AI","def":"Executes tasks or spends money autonomously (AI SDRs, automated support, agents)."},{"code":"JDG","name":"Judge","kind":"Predictive AI","def":"Scores or screens humans for opportunity (HR screeners, loan approvals)."},{"code":"CMP","name":"Companion","kind":"Social AI","def":"Sustains emotional relationships or roleplay (virtual therapists, conversational agents)."},{"code":"CRT","name":"Creator","kind":"Generative AI","def":"Generates net-new media or code (image generators, voice cloners, copilots)."},{"code":"RDR","name":"Reader","kind":"Ingestion AI","def":"Consumes and vectorizes external data (RAG pipelines, scrapers)."},{"code":"ORC","name":"Orchestrator","kind":"Routing AI","def":"Routes prompts to third-party models (API gateways, model routers)."},{"code":"TRN","name":"Translator","kind":"Conversion AI","def":"Bridges formats, often via physical inputs (meeting note-takers, speech-to-text)."},{"code":"SHD","name":"Shield","kind":"Defense AI","def":"Monitors or audits enterprise environments (AI pen-testing, compliance bots)."},{"code":"OPT","name":"Optimizer","kind":"Systemic AI","def":"Manages critical or financial infrastructure (algorithmic trading, grid control)."},{"code":"MOV","name":"Mover","kind":"Physical AI","def":"Acts on the physical world (warehouse robotics, autonomous drones)."}],"surfaces":[{"name":"PII","def":"Processing identifiable personal data — names, emails, IPs, user text."},{"name":"Sensitive/Biometric","def":"Health, voice, or facial-geometry data — triggers strict biometric regimes."},{"name":"Financial","def":"AI managing trades, credit, or payments."},{"name":"Minors","def":"Users under 18 — triggers age-design and parental-consent regimes."},{"name":"Employment","def":"Screening candidates or employees — triggers bias-audit mandates."},{"name":"Consumer-Public","def":"Mass-market B2C exposure — dark-patterns, takedown, class-action surface."},{"name":"Enterprise-Private","def":"B2B SaaS to large organizations — SLA and wasted-expenditure exposure."},{"name":"Infrastructure","def":"Reliance on foundation-model APIs or critical infrastructure."},{"name":"Content&IP","def":"Generated media, training data, and ownership of output."},{"name":"Safety&Physical","def":"Physical-world action and bodily-safety exposure."}],"presets":[{"key":"customer-chatbot","label":"Customer chatbot","description":"Conversational AI answering customers or users.","underlying_function":"Companion / general conversational interface","likely_surfaces":"Consumer-public · Personal data","archetype":"CMP","surfaces":["Consumer-Public","PII"]},{"key":"ai-support-agent","label":"AI support agent","description":"AI that responds to tickets, handles customer support, or recommends actions.","underlying_function":"Doer / Companion","likely_surfaces":"Consumer-public · Enterprise-private · Personal data","archetype":"DOE","surfaces":["Consumer-Public","Enterprise-Private","PII"]},{"key":"hiring-screening-tool","label":"Hiring / screening tool","description":"AI that screens, ranks, scores, or recommends candidates or employees.","underlying_function":"Judge","likely_surfaces":"Employment · Personal data","archetype":"JDG","surfaces":["Employment","PII"]},{"key":"coding-copilot","label":"Coding copilot","description":"AI that generates, reviews, or assists with code.","underlying_function":"Creator","likely_surfaces":"Content & IP · Enterprise-private","archetype":"CRT","surfaces":["Content&IP","Enterprise-Private"]},{"key":"meeting-note-taker","label":"Meeting note-taker","description":"AI that records, transcribes, summarizes, or analyzes meetings.","underlying_function":"Translator / Reader","likely_surfaces":"Personal data · Sensitive/biometric-adjacent · Enterprise-private","archetype":"TRN","surfaces":["PII","Sensitive/Biometric","Enterprise-Private"]},{"key":"ai-sdr-outbound-agent","label":"AI SDR / outbound agent","description":"AI that sends, sequences, personalizes, or triggers sales/outbound actions.","underlying_function":"Doer / Orchestrator","likely_surfaces":"Personal data · Consumer-public · Enterprise-private","archetype":"DOE","surfaces":["PII","Consumer-Public","Enterprise-Private"]},{"key":"rag-knowledge-bot","label":"RAG knowledge bot","description":"AI that ingests documents and retrieves answers from a knowledge base.","underlying_function":"Reader","likely_surfaces":"Personal data · Infrastructure · Enterprise-private","archetype":"RDR","surfaces":["PII","Infrastructure","Enterprise-Private"]},{"key":"trading-payment-agent","label":"Trading / payment agent","description":"AI that acts on financial signals, payment flows, accounts, or transaction logic.","underlying_function":"Optimizer / Doer","likely_surfaces":"Financial · Infrastructure","archetype":"OPT","surfaces":["Financial","Infrastructure"]}],"diagnostic_format":"Mechanical trigger → Law (IN / US / EU) → Remediation","worked_example":{"title":"The Judge (HR screener)","triggers":["Employment","PII"],"law":{"in":"DPDP (employee data)","eu":"GDPR Art. 22 + AI Act Annex III (high-risk; 2 Dec 2027)","us":"Title VII / EEOC · NYC LL144 · IL HB3773 · TX TRAIGA"},"case":"Mobley v. Workday (ongoing)","remediation":"bias-audit + human-in-the-loop clause"},"title":"The Risk Map — classify the AI, then identify the legal surface.","intro":"The map works in two moves. First, classify what the AI does. Second, identify what legal surface it touches. The output is a triggered risk with authority and remediation.","move1_heading":"Move 1 — Classify what the AI does","move1_explanation":"The first question is functional, not promotional. Ignore the company’s marketing label. Ask what the AI actually does.","preset_instruction":"Select a common AI use case to light the underlying AI function.","move2_heading":"Move 2 — Identify what legal surface it touches","move2_explanation":"The same AI function can trigger different legal risks depending on what it touches: personal data, employment, IP, financial decisions, consumers, infrastructure, or physical safety.","output_heading":"Output — triggered risk → authority → remediation","output_explanation":"Once function and surface combine, the system can identify the legal risk, cite the authority, and route the remediation into the right instrument or workflow.","surface_instruction":"Click a lit surface to see why the risk is triggered.","surface_labels":{"PII":"Personal data","Sensitive/Biometric":"Sensitive / biometric","Financial":"Financial","Minors":"Minors","Employment":"Employment","Consumer-Public":"Consumer-public","Enterprise-Private":"Enterprise-private","Infrastructure":"Infrastructure","Content&IP":"Content & IP","Safety&Physical":"Safety / physical"}},"case_law":[{"name":"Moffatt v. Air Canada","line":"The chatbot speaks with the company's authority; no “separate tool” defence."},{"name":"Walters v. OpenAI","line":"Point-of-interaction disclaimers defeat reasonable reliance."},{"name":"Thaler v. Perlmutter","tag":"aff'd D.C. Cir. 2025","line":"No copyright for autonomous AI output; forces human-in-the-loop."},{"name":"Bartz v. Anthropic","tag":"$1.5B","line":"The training-data reckoning; forces upstream IP indemnities."},{"name":"Mobley v. Workday","tag":"ongoing","line":"AI hiring tools face disparate-impact liability."},{"name":"FTC v. Rite Aid","line":"Algorithmic disgorgement; a regulator can force the model destroyed."},{"name":"Cruz v. Fireflies","tag":"BIPA","line":"Meeting-capture AI triggers strict biometric / recording consent."}],"connector1":"A taxonomy protects no one on its own. Once the risk can be classified, it must be routed into clauses, policies, playbooks, and review-ready instruments. That is Act II.","orientation_purpose":"The legal work comes first. The systems exist only to deliver it faster, more consistently, and in a reviewable form.","eyebrow":"ACT I · FOUNDATION","subline":"Before I built the tools, I built the legal source layer they would read from: AI physics, legal doctrine, defensive controls, and product/instrument routing.","what_this_proves":"This section shows how technical AI behavior becomes legal risk, how legal risk becomes a control, and how that control is routed into a document, workflow, or system.","first_fork":{"title":"First Fork — where does the AI risk live?","subtitle":"Before the taxonomy, the work splits by legal context. The question is not only what does the AI do? The first question is: is the company building AI for others, or using AI inside its own business?","lanes":[{"key":"lane-a","visible_label":"Build-side AI products","internal_label":"Lane A","who":"Companies building, selling, or exposing AI products to customers, users, APIs, or enterprise buyers.","focus_chips":["product/service classification","hallucination liability","agentic authority","customer data processing","output ownership","enterprise procurement","public-facing terms","downstream API/pass-through risk"],"routes":["ToS","DPA","Privacy Policy","AUP","SLA","Agentic Addendum","Product Playbook"],"explanation":"Lane A asks: if the AI product fails, misleads, processes data, generates output, or acts for a user, what legal architecture protects the company?"},{"key":"lane-b","visible_label":"Internal AI deployment","internal_label":"Lane B","who":"Companies using AI inside the business through employees, contractors, teams, departments, or operational workflows.","focus_chips":["shadow AI","employee tool use","client-data leakage","workplace privacy","AI-assisted work ownership","human review","internal governance","impact assessment"],"routes":["AI Use Handbook","IP Deed","HITL SOP","DPIA","Shadow AI Scanner","Workplace Playbook"],"explanation":"Lane B asks: if employees or teams use AI inside the business, how do we control data, authorship, confidentiality, reliance, and human review?"}],"transition":"Once the lane is clear, the analysis moves into the source layer: what the AI technically does, what legal doctrine that triggers, what defensive control responds, and where the fix must live."},"ai_bible":{"title":"The AI Bible — the source layer behind the taxonomy","intro":"The taxonomy starts from AI behavior, not document templates. The source layer asks four questions: what the system technically does, what legal doctrine that triggers, what control contains the risk, and which instrument or workflow carries the fix.","core_spine":["AI physics","legal doctrine","defensive control","product / instrument routing"],"columns":[{"title":"AI physics","text":"What the system technically does: generate, infer, remember, route, act, score, ingest, or automate."},{"title":"Legal doctrine","text":"The legal exposure triggered by that behavior: reliance, authority, privacy, authorship, consent, discrimination, deletion, or product/service classification."},{"title":"Defensive control","text":"The legal architecture that contains the risk: waiver, boundary, audit, consent gate, human review, cap, pass-through, or prohibition."},{"title":"Product / instrument routing","text":"Where the control lives: ToS, DPA, AUP, SLA, Agentic Addendum, Handbook, IP Deed, SOP, DPIA, Vault intake, diligence engine, or portal workflow."}],"rows":[{"title":"Probabilistic Output","lane":"Both","ai_physics":"Probabilistic output can be confidently wrong.","legal_doctrine":"Reliance, chatbot authority, warranty, misrepresentation, and customer-facing output risk.","defensive_control":"Hallucination waiver, output authority boundary, point-of-interaction warning, and human verification trigger.","routing":"ToS · AUP · diligence engine · product UI warning","why":"Generic AI may be wrong language is not enough. The control must sit where reliance happens and must define what the AI output is legally allowed to be."},{"title":"Agentic Action","lane":"Lane A","ai_physics":"Agentic systems can act, retry, spend, route, trigger workflows, or bind a process without a fresh human click.","legal_doctrine":"Electronic agent attribution, agency risk, authority, automated transaction risk, and operational liability.","defensive_control":"Spend caps, retry limits, loop thresholds, circuit breakers, approval gates, audit logs, and authority boundaries.","routing":"Agentic Addendum · ToS · governance log · Vault intake","why":"Once AI moves from answering to acting, the legal problem changes from wrong output to who is responsible for machine action?"},{"title":"AI Memory / Fine-Tuning","lane":"Both","ai_physics":"Fine-tuned or training-based memory is not cleanly deletable like a database row.","legal_doctrine":"Erasure rights, privacy compliance, model disgorgement, data retention, and subprocessor transparency.","defensive_control":"RAG-only mandate, deletion architecture, training prohibition, subprocessor disclosure, and data-use boundary.","routing":"DPA · Privacy Policy · Vault intake · DPIA","why":"If user data becomes part of model weights, deletion and downstream control become much harder. The legal architecture must be designed around the technical memory model."},{"title":"AI Output / Authorship","lane":"Both","ai_physics":"Autonomous AI output may not carry human authorship by default.","legal_doctrine":"Copyright ownership, assignment failure, authorship evidence, work-product control, and IP-chain risk.","defensive_control":"Human-in-the-loop authorship protocol, prompt/work-product assignment, contributor warranty, authorship evidence trail.","routing":"IP Deed · HITL SOP · ToS output terms · Workplace Handbook","why":"If the business cannot prove a human authorship chain, we own the output may be commercially weak even if the document says it."},{"title":"AI Scoring / Decisioning","lane":"Lane B","ai_physics":"AI systems can score, rank, screen, recommend, or influence access to opportunity.","legal_doctrine":"Bias, discrimination, automated decisioning, employment screening, high-risk decisioning, and explainability risk.","defensive_control":"Bias audit, human review, prohibited-use boundary, appeal/escalation route, and impact assessment.","routing":"DPIA · AUP · Handbook · HITL SOP · diligence engine","why":"The legal issue is not only the model’s output. It is whether the output affects a person’s opportunity, rights, employment, credit, access, or treatment."},{"title":"Consent / Online Terms","lane":"Lane A","ai_physics":"AI products often operate through fast online flows where terms, warnings, notices, and consents are buried or skipped.","legal_doctrine":"Clickwrap enforceability, assent, notice, consent validity, dark-pattern risk, and consumer protection.","defensive_control":"Affirmative consent UI, visible notice architecture, acceptance logs, renewal/cancellation clarity, and point-of-action warning.","routing":"ToS · Privacy Policy · UI mandate · product workflow · portal records","why":"A strong clause is useless if the user never validly assented to it. Legal architecture must reach the interface layer."}]},"taxonomy_bridge":{"title":"From source layer to working taxonomy","intro":"The AI Bible is the reasoning layer. The taxonomy turns that reasoning into units a diligence engine can read.","flow":["AI Bible source layer","98 threat units","10 AI functions + 10 legal surfaces","triggered risk","authority","remediation"],"scope_stat":"98 threat units · 10 AI functions · 10 legal surfaces · 3 jurisdiction bands","explanation":"Each threat unit is structured so the system can ask: what AI behavior is present, what legal surface is touched, what authority is relevant, what consequence follows, and what instrument should respond.","confidentiality_note":"The full source layer and applied-practice notes are not exposed here. The visible layer shows the reasoning architecture, selected examples, and the taxonomy logic."},"worked_examples":{"default":"Select a common AI use case above. The example below will show how the taxonomy turns an AI use case into a legal-risk route.","items":{"customer-chatbot":{"selected_use_case":"Customer chatbot","move1":"Companion — the AI speaks directly to users in a conversational interface.","move2":"Consumer-public + personal data.","output":"Reliance, misleading output, customer-facing disclosure, privacy, and consent risk.","authority":"Moffatt v. Air Canada · Walters v. OpenAI · privacy notice / consent principles","remediation":"Hallucination waiver, output authority boundary, point-of-interaction warning, privacy notice, and escalation path.","routes_into":"ToS · Privacy Policy · AUP · diligence engine"},"ai-support-agent":{"selected_use_case":"AI support agent","move1":"Doer / Companion — the AI answers customers and may recommend or trigger support actions.","move2":"Consumer-public + enterprise-private + personal data.","output":"Wrong support advice, escalation failure, data exposure, and automated action risk.","authority":"Chatbot authority and reliance principles · data protection notice/processing duties · electronic action risk where workflows are triggered","remediation":"Human escalation route, support-output disclaimer, authority boundary, processing disclosure, and action limits.","routes_into":"ToS · Privacy Policy · AUP · support workflow · portal records"},"hiring-screening-tool":{"selected_use_case":"Hiring / screening tool","move1":"Judge — the AI scores, ranks, screens, or recommends humans.","move2":"Employment + personal data.","output":"Bias, disparate impact, automated decisioning, explainability, and employment-data risk.","authority":"GDPR Art. 22 logic · EU AI Act high-risk employment logic · employment discrimination principles · workplace privacy principles","remediation":"Bias audit, human-in-the-loop review, use restriction, audit log, appeal/escalation path, and impact assessment.","routes_into":"DPIA · AUP · AI Use Handbook · HITL SOP"},"coding-copilot":{"selected_use_case":"Coding copilot","move1":"Creator — the AI generates or materially assists with code.","move2":"Content & IP + enterprise-private.","output":"Ownership uncertainty, open-source contamination, security reliance, and human authorship risk.","authority":"Thaler v. Perlmutter · IP ownership / assignment principles · software warranty and reliance risk","remediation":"HITL authorship protocol, output review, IP assignment boundary, open-source review, and prohibited reliance rule.","routes_into":"IP Deed · HITL SOP · ToS output terms · AUP"},"meeting-note-taker":{"selected_use_case":"Meeting note-taker","move1":"Translator / Reader — the AI records, transcribes, summarizes, or analyzes spoken content.","move2":"Personal data + sensitive/biometric-adjacent + enterprise-private.","output":"Recording consent, biometric/voice risk, confidential information leakage, and privacy disclosure risk.","authority":"Cruz v. Fireflies · privacy notice/consent principles · confidentiality and workplace privacy principles","remediation":"meeting consent notice, recording disclosure, retention limit, processing disclosure, and confidential-data handling rule.","routes_into":"Privacy Policy · DPA · AI Use Handbook · DPIA"},"ai-sdr-outbound-agent":{"selected_use_case":"AI SDR / outbound agent","move1":"Doer / Orchestrator — the AI personalizes, sequences, sends, routes, or triggers outbound actions.","move2":"Personal data + consumer-public + enterprise-private.","output":"automated outreach, consent, spam/dark-pattern, data processing, and action-authority risk.","authority":"consent and marketing law principles · electronic agent/action attribution principles · consumer protection principles","remediation":"audience limits, consent/opt-out routing, human approval for campaigns, authority boundary, and audit logs.","routes_into":"AUP · ToS · Privacy Policy · Agentic Addendum · outbound workflow"},"rag-knowledge-bot":{"selected_use_case":"RAG knowledge bot","move1":"Reader — the AI ingests, indexes, retrieves, and answers from documents or knowledge bases.","move2":"Personal data + infrastructure + enterprise-private.","output":"data ingestion, retention, retrieval leakage, source provenance, and deletion risk.","authority":"FTC v. Rite Aid logic · GDPR/DPDP deletion and processing principles · confidentiality and subprocessor transparency principles","remediation":"RAG-only mandate, source logging, access controls, deletion architecture, and subprocessor disclosure.","routes_into":"DPA · Privacy Policy · Vault intake · DPIA · security workflow"},"trading-payment-agent":{"selected_use_case":"Trading / payment agent","move1":"Optimizer / Doer — the AI manages or triggers financial decisions, payment flows, or transaction actions.","move2":"Financial + infrastructure.","output":"financial reliance, unauthorized transaction, automation error, and high-stakes decision risk.","authority":"electronic agent/action attribution principles · financial reliance and consumer protection principles · service classification risk","remediation":"transaction caps, human approval threshold, prohibited reliance warning, audit logs, and circuit breaker.","routes_into":"Agentic Addendum · ToS · AUP · governance log"}}},"source_rule_spine":{"title":"Source Rule Spine — authority converted into operating rules","intro":"The cases are not citations for decoration. Each source creates a rule that becomes a registry condition, drafting control, or workflow requirement.","rows":[{"source":"Moffatt v. Air Canada","rule":"Chatbot output can bind the company where users reasonably rely on it.","powers":"Output authority boundary · hallucination controls · customer-facing warning design"},{"source":"Walters v. OpenAI","rule":"Point-of-interaction disclaimers matter because reliance forms at the moment of use.","powers":"interface warning · output disclaimer · reliance limitation"},{"source":"Thaler v. Perlmutter","rule":"Autonomous AI output may fail human authorship requirements.","powers":"HITL authorship protocol · IP assignment structure · work-product evidence trail"},{"source":"Bartz v. Anthropic","rule":"Training-data provenance can become a major copyright and dataset-risk issue.","powers":"dataset provenance controls · upstream IP indemnity · training-data review"},{"source":"FTC v. Rite Aid","rule":"Regulators can require deletion or destruction of tainted algorithmic systems.","powers":"RAG-only mandate · deletion architecture · model-memory restrictions"},{"source":"Specht v. Netscape / Meyer v. Uber","rule":"Online terms must be visible, affirmative, and reasonably presented to bind users.","powers":"clickwrap design · consent logs · UI mandate · notice architecture"},{"source":"Vernor v. Autodesk","rule":"Contract structure can affect whether software access is treated as a license rather than ownership transfer.","powers":"service/access classification · license boundary · platform-use restrictions"},{"source":"Soteria v. IBM","rule":"Liability wording can preserve or exclude wasted expenditure and major commercial loss categories.","powers":"liability cap architecture · exclusion drafting · enterprise negotiation playbook"}]},"connector_visual":"Risk classified → control selected → instrument routed."},"act2":{"header":"The Legal Matrix — threat IDs converted into clauses, policies, playbooks, and review-ready instruments.","eyebrow":"ACT II · THE LEGAL MATRIX","subline":"Act I classified the risk. Act II shows how that risk becomes legal architecture: a threat ID, an authority, a defensive control, and the instrument that carries the fix.","core_visual_line":"Risk classified → control selected → instrument routed","explanation":"The registry is not a list of legal issues. It is a routing layer: each threat ID carries the risk, authority, control logic, and document destination.","guide_line":"Follow the route: matrix first, instrument map second, clause viewer third.","local_rail":[{"label":"Orientation","target":"act2-orientation"},{"label":"Threat Matrix","target":"act2-threat-matrix"},{"label":"Instrument Architecture","target":"instruments-layer"},{"label":"Living Document","target":"act2-living-document"},{"label":"Vault Router","target":"act2-vault-router"},{"label":"Act III Bridge","target":"act2-act3-bridge"}],"threat_matrix":{"title":"Threat Matrix — the registry behind the instruments","intro":"The threat matrix converts AI-law risk into structured rows: threat ID, lane, AI function, legal surface, authority, tier, and clause route.","proof_line":"98 threat units · 17 fields · Lane A / Lane B routing · IN / EU / US authority mapping","integrity_note":"If a jurisdiction is not mapped, the cell stays blank. The matrix does not invent fake IN/EU/US parallels just to look complete.","guide_text":"Filter the matrix or click a row to see how a threat becomes a document route.","columns":["Threat ID","Threat","Lane","AI function / surface","Authority","Clause / instrument route","Tier"],"rows":[{"id":"UNI_CNS_001","threat":"Browsewrap Invalidity","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Specht v. Netscape Communications Corp. (2d Cir. 2002)"},"clause":"TOS §1.1","tier":"T3"},{"id":"UNI_CNS_002","threat":"Cluttered Mobile Consent","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Meyer v. Uber Technologies, Inc. (2d Cir. 2017)"},"clause":"TOS §1.1","tier":"T3"},{"id":"UNI_CNS_003","threat":"Unconscionable Venue","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"Bragg v. Linden Research, Inc. (E.D. Pa. 2007)"},"clause":"TOS §14.3","tier":"T3"},{"id":"UNI_CNS_004","threat":"Dark Pattern Cancellation","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"FTC Act §5 / ROSCA (15 U.S.C. §8401 et seq.)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_005","threat":"Subscription Price Hike Consent","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"NY General Obligations Law §5-903 (as amended Dec 2025)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_006","threat":"FTC Click-to-Cancel Rule","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"FTC Negative Option Rule (16 CFR Part 425, rulemaking restarted Jan 30, 2026)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_007","threat":"Unwaivable Reversal Right","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Uniform Electronic Transactions Act §10(b)"},"clause":"UI Mandate","tier":"T2"},{"id":"UNI_LIA_001","threat":"First Sale Doctrine Trap","lane":"A","archetype":"UNI","surface":["Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Vernor v. Autodesk Inc. (9th Cir. 2010)"},"clause":"TOS §2.2","tier":"T2"},{"id":"UNI_LIA_002","threat":"The Wasted Costs Loophole","lane":"A","archetype":"UNI","surface":["Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Soteria Insurance Ltd v. IBM United Kingdom Ltd [2022] EWHC 2084 (TCC)"},"clause":"TOS §9.2","tier":"T2"},{"id":"UNI_LIA_004","threat":"Inconspicuous Warranty Caps","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"UCC §2-316 and §2-719"},"clause":"TOS §9.2","tier":"T2"},{"id":"UNI_LIA_005","threat":"AI Reclassified as Product","lane":"A","archetype":"UNI","surface":["Enterprise-Private"],"authority":{"in":"CPA 2019 product liability (§82–87)","eu":"Product Liability Directive 2024/2853 (software/AI = product; 9 Dec 2026)","us":"UCC Art. 2 (goods/services line); state product-liability"},"clause":"TOS §2.2","tier":"T1"},{"id":"UNI_LIA_006","threat":"Ban on User Waivers","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"AI LEAD Act (S.2937, pending)"},"clause":"TOS §2.2","tier":"T5"},{"id":"DOE_LIA_007","threat":"Electronic Agent Authority","lane":"A","archetype":"DOE","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Uniform Electronic Transactions Act §14"},"clause":"TOS §9.2","tier":"T1"},{"id":"UNI_HAL_001","threat":"Chatbot Promissory Estoppel","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Moffatt v. Air Canada (B.C. Civil Resolution Tribunal, 2024)"},"clause":"TOS §8.2","tier":"T2"}]},"instrument_architecture":{"title":"Instrument Architecture — the document stack is a legal system","intro":"The documents are not standalone files. Each instrument has a role, dependency, and trigger. The stack works because the documents route into each other.","guide_line":"Hover a document to see its role. Click to open the stack logic. Try a route to see which instruments activate together."},"living_document":{"title":"Living Document — how risk becomes an instrument","intro":"Select a threat or commercial trigger. The viewer reveals the clause, connected documents, and the legal logic that makes the instrument work.","guide_line":"Click a trigger to reveal the clause and connected instruments.","watermark":"SAMPLE / EXCERPT / REVIEW-READY STRUCTURE","triggers":[{"label":"Hallucination / Output Authority","group":"AI Risk Trigger","lane":"Lane A","main_document":"Main document: DOC_AI_A_TOS","main_clause_title":""},{"label":"Agentic Action / Circuit Breaker","group":"AI Risk Trigger","lane":"Lane A","main_document":"Main document: DOC_AI_A_AGT","main_clause_title":""},{"label":"RAG-only / Deletion Architecture","group":"AI Risk Trigger","lane":"Lane A, with Lane B relevance where internal AI tools process personal data","main_document":"Main document: DOC_AI_A_DPA","main_clause_title":""},{"label":"AI Output / HITL Authorship","group":"AI Risk Trigger","lane":"Both, but main viewer route should start with Lane A ToS and show Lane B support documents","main_document":"Main document: DOC_AI_A_TOS","main_clause_title":""},{"label":"Product / Service Classification","group":"AI Risk Trigger","lane":"Lane A","main_document":"Main document: DOC_AI_A_TOS","main_clause_title":""},{"label":"Privacy / Transfer Routing","group":"AI Risk Trigger","lane":"Both","main_document":"Main document: DOC_AI_A_DPA","main_clause_title":""},{"label":"Indemnity Routing","group":"Commercial Architecture Trigger","lane":"Lane A, with Lane B flow-down relevance","main_document":"Main document: DOC_AI_A_TOS","main_clause_title":""},{"label":"Liability Cap / Exclusions","group":"Commercial Architecture Trigger","lane":"Lane A","main_document":"Main document: DOC_AI_A_TOS","main_clause_title":""},{"label":"SLA / Service Credits","group":"Commercial Architecture Trigger","lane":"Lane A","main_document":"Main document: DOC_AI_A_SLA","main_clause_title":""},{"label":"Data Processing / Subprocessors","group":"Commercial Architecture Trigger","lane":"Lane A, with Lane B relevance where employee/internal data is processed","main_document":"Main document: DOC_AI_A_DPA","main_clause_title":""},{"label":"AUP / Prohibited Use","group":"Commercial Architecture Trigger","lane":"Lane A, with Lane B policy analogue","main_document":"Main document: DOC_AI_A_AUP","main_clause_title":""},{"label":"Suspension / Termination Route","group":"Commercial Architecture Trigger","lane":"Lane A, with cross-document enforcement relevance","main_document":"Main document: DOC_AI_A_TOS","main_clause_title":""}]},"vault_router":{"title":"Vault Router — how the stack becomes dynamic","intro":"The document map is the static architecture. The Vault turns client/product answers into document routing.","guide_line":"Toggle a product fact to see which instruments activate.","toggles":["B2B / B2C","EU users","Personal data","Agentic capability","SLA required","Output ownership","High-risk use case","Internal employee AI use"]},"connector2":"A document stack is still hand-work if someone must read the registry, select the clauses, and assemble the file manually. The leverage was not the document alone — it was the system that could produce it. So I built that.","connector_visual":"Instrument architecture → intake logic → automated assembly"},"act3":{"header":"Act III: The Legal Delivery System — from legal risk to review-ready delivery.","eyebrow":"ACT III · THE LEGAL DELIVERY SYSTEM","subline":"Acts I–II showed the law, taxonomy, threat matrix, and instruments. Act III shows the system that runs the work: diligence, Vault assembly, portal delivery, maintenance review, and controlled AI workflow proof.","core_thesis":"The law came first. The system exists to deliver it.","orientation":{"title":"The Legal Delivery System — from legal risk to review-ready delivery.","visual_chain":["Legal risk","Diligence Engine","Diligence Report","Vault Assembly","Document Route","Portal Delivery","Maintenance Radar"],"node_details":{"Legal risk":"The legal exposure identified from product behavior, internal AI use, public material, or client facts.","Diligence Engine":"Domain materials become structured risk findings. AI law as proof domain.","Diligence Report":"Structured transfer object: profile, classification, threat matches, evidence, and remediation route.","Vault Assembly":"Client/product answers combine with the diligence report to produce a product profile.","Document Route":"The system determines which clauses, schedules, addenda, policies, and playbooks activate.","Portal Delivery":"The review-ready stack is delivered through a dummy client portal/CRM view using synthetic data.","Maintenance Radar":"Updated registry entries can be checked against the product profile and delivered stack to classify coverage."}},"project_walkthrough":{"title":"Project Environment Walkthrough — from prompt-agent reasoning to portal delivery.","subline":"Recorded project-environment runs across frontier model workspaces — ChatGPT Projects, Claude, and Gemini — showing how source files, threat registries, prompt-agent roles, diligence reports, Vault logic, and Lex Nova's CRM/client portal infrastructure work together as one legal delivery system.","safety_note":"Recorded with synthetic or scrubbed data. Internal prompts, client data, production credentials, and full private source files are not exposed.","proof_line":"This proves prompt and systems orchestration, not just app-building: source files, registries, prompt-agent runs, legal reasoning, intake logic, and delivery infrastructure are connected into one workflow.","environment_chips":["ChatGPT Project Run","Claude Run","Gemini Run"],"chapters":["Source files / project context","Signal or source intake","Diligence Engine","Threat registry match","Vault assembly logic","Portal / CRM delivery","Maintenance review"],"flow":["Project source files","signal / source intake","Diligence Engine run","threat matrix matching","diligence report","Vault assembly logic","product profile","document routing","CRM / admin view","client portal delivery"],"ctas":[{"label":"Watch walkthrough","href":"#","state":"placeholder"},{"label":"View system map","href":"#act3-sandbox-os"},{"label":"Open sandbox","href":"https://sandbox.lexnovahq.com"}]},"sandbox_os":{"title":"Sandbox Operating System — run the legal delivery loop with synthetic data.","subline":"The sandbox is a public-safe version of the delivery system. Diligence findings become assembly inputs. Vault answers become document-routing logic. The final output lands in a dummy portal and maintenance view.","domain":"sandbox.lexnovahq.com","engine_a":{"title":"Diligence Engine","subline":"Domain materials converted into structured risk findings.","framing":"The Diligence Engine is domain-adaptable. AI law as proof domain because Acts I–II already built the taxonomy, threat matrix, and instrument stack.","modes":[{"label":"AI product diligence","description":"Reads public-facing product/legal material and classifies the product's AI function, legal surface, and triggered risks."},{"label":"Internal AI Use Diligence","description":"Reads internal AI-use survey facts and classifies employee/tool/data/output risks into governance routes."}],"input_row":"Website / document / pasted materials / internal-use survey","chain":["Source material","profile extraction","function / surface classification","threat matrix match","diligence report"],"output_row":"Company profile · product profile · triggered risks · evidence · remediation route · push to assembly","node_details":{"Source material":"Website, uploaded document, pasted public text, or internal-use survey.","profile extraction":"Extracts company, product, AI behavior, data flows, users, jurisdiction, and operational context.","function / surface classification":"Classifies what the AI does and what legal surface it touches: Doer, Reader, Judge, Creator, PII, employment, IP/content, enterprise-private, consumer-public.","threat matrix match":"Runs the classified profile against the threat matrix and risk map.","diligence report":"Produces the structured report used by the assembly layer."}},"transfer":{"title":"Structured Diligence Report","contents":["company profile","product profile","AI function classification","legal surfaces","threat matches","evidence basis","authority band","remediation route","suggested document route"],"line":"Push to Assembly →"},"engine_b":{"title":"Vault Assembly & Delivery Engine","subline":"Diligence report + Vault answers converted into product profile, clause routes, document payload, portal delivery, and maintenance review.","formula":["Vault questionnaire","+","Diligence report","=","Product profile + document routing"],"chain":["Vault questionnaire","Diligence report","product profile","clause / schedule routing","assembly payload","dummy portal / CRM","maintenance radar"],"node_details":{"Vault questionnaire":"Client/product answers: market exposure, users, AI architecture, model providers, data flows, sub-processors, output/IP, SLA posture, and agentic controls.","Diligence report":"The structured report pushed from the Diligence Engine or uploaded into the assembly flow.","product profile":"Converts Vault answers and diligence findings into a structured legal profile.","clause / schedule routing":"Determines which clauses, schedules, addenda, policies, and playbooks activate.","assembly payload":"Structured output that can be passed to n8n, Make, or document automation for assembly.","dummy portal / CRM":"Shows delivery state, document status, client profile, and review-ready handoff using synthetic data.","maintenance radar":"Demo logic showing how new or updated registry entries can be checked against the client profile and delivered stack to classify coverage as covered, upcoming, or exposed."}},"gateway":{"title":"Open the live sandbox","subline":"Run the synthetic legal delivery loop: diligence → assembly → delivery → maintenance.","domain":"sandbox.lexnovahq.com","safety_note":"Public-safe sandbox. Synthetic data only. No production client data, internal prompt stack, credentials, or private registry corpus exposed.","ctas":[{"label":"Open Sandbox","href":"https://sandbox.lexnovahq.com"},{"label":"Start with Diligence","href":"https://sandbox.lexnovahq.com/diligence"},{"label":"Jump to Assembly","href":"https://sandbox.lexnovahq.com/assembly"},{"label":"View Maintenance Demo","href":"https://sandbox.lexnovahq.com/maintenance"}]}},"prompt_agent_proof":{"title":"Prompt-Agent Engineering — controlled legal intelligence workflows.","subline":"The same legal reasoning was decomposed into role-based prompt systems: source discovery, evidence extraction, registry matching, legal-risk analysis, document routing, and human-review checkpoints.","flow":["Signal / source","evidence extraction","registry-grounded analysis","architecture decision","reviewable output","human review"],"modules":[{"name":"Signal / source discovery","purpose":"Finds potential legal-risk triggers or source materials.","input":"Public/synthetic source material or defined search context.","output":"Structured source candidates and trigger context.","guardrail":"Not presented as public live lead generation."},{"name":"Hunter / diligence run","purpose":"Reads materials, extracts evidence, classifies risk, and routes findings.","input":"Source materials, registry, and product/legal context.","output":"Evidence-grounded diligence findings.","guardrail":"Registry-grounded; no unsupported legal claims."},{"name":"Architect","purpose":"Selects the strongest risks and structures the legal argument or document route.","input":"Diligence findings and threat-route data.","output":"Structured architecture decision.","guardrail":"Human legal review remains final."},{"name":"Copy / communication layer","purpose":"Converts structured legal findings into clear, reviewable outputs.","input":"Architecture decision and audience context.","output":"Readable memo, report, or communication draft.","guardrail":"Does not invent evidence or legal authority."},{"name":"Community Signal","purpose":"Captures public pain signals and legal-risk patterns without turning the system into blind marketing automation.","input":"Public discussion patterns or synthetic examples.","output":"Risk-pattern observations.","guardrail":"Used as intelligence, not public autonomous outreach."}],"proof_format":["video walkthrough","architecture diagram","scrubbed transcript excerpt","sample JSON output","role decomposition map"],"why_not_live":"Public live signal hunting would distort the identity. It could look like cold-outreach tooling. The point is not lead generation. The point is structured prompt-agent engineering for legal intelligence.","ctas":[{"label":"Watch prompt-agent walkthrough","href":"#","state":"placeholder"},{"label":"View scrubbed output sample","href":"#","state":"placeholder"}]},"workflow_automation_proof":{"title":"Workflow Automation Proof — the same control logic outside law.","subline":"Reusable workflow infrastructure: intake, validation, classification, routing, logging, notification, and human review.","proof_layers":[{"title":"Automation build notes and component library proof","description":"Show repository/build notes only if the public repo is actually proof-ready. Do not claim a public audited repo unless the repository genuinely contains audited artifacts."},{"title":"Category 2 Upwork workflow demo","description":"One end-to-end practical workflow: form/webhook intake → validation → classification → routing → sheet/CRM write → notification → audit log → limited agentic node → human approval."}],"flow":["Form / webhook intake","validation","classification","routing","sheet / CRM write","notification","audit log","limited agentic node","human approval"],"agentic_boundary":"The agentic node recommends, drafts, classifies, or prepares a next action. It does not autonomously send, spend, delete, or execute external actions without human review.","ctas":[{"label":"View automation build notes","href":"#","state":"placeholder"},{"label":"Watch Category 2 demo","href":"#","state":"placeholder"},{"label":"View repository","href":"#","state":"conditional"}]},"close_bridge":{"title":"The system is not a replacement for legal judgment.","line":"It is the operating layer that makes legal judgment structured, reviewable, and repeatable.","proof_chain":["law","classification","instrument routing","controlled assembly","human review"],"bridge":"That is the through-line: a legal mind using systems to make legal work more precise, not a technologist borrowing legal language.","cta":"Continue to Capstone"}},"capstone":{"title":"One Mind: The Legal Problem First — Across Three Jurisdictions","crossborder":{"lead":true,"in":"IT Act 2000 → DPDP Act 2023 · CPA 2019 · Copyright Act 1957 · IT Amendment Rules 2026 (3-hour takedown) · MeitY advisories","eu":"GDPR · EU AI Act 2024/1689 (Art. 50: 2 Aug 2026; high-risk Annex III: 2 Dec 2027) · Product Liability Directive 2024/2853","us":"UCC Art. 2/2A · UETA §14 · CCPA/CPRA · TX TRAIGA · IL HB3773 (Colorado AI Act: repealed/replaced — not active)"},"parallel_map":{"header":"The same legal discipline, even in the engineering.","frame":"The law came first and trained the instinct — classification, dependency, controlled assembly — and it shows up when I build software. Not a method that generalises across domains; a legal mind that shaped the code.","rows":[{"legal":"Threat Registry","engineering":"component-classification.csv"},{"legal":"The Vault (client-config questionnaire)","engineering":"client-config layer"},{"legal":"Lane docs (template assemblies)","engineering":"template assemblies"},{"legal":"Core / adapter clause structure","engineering":"provider-agnostic core"}]},"identity_line":"A litigator who taught himself to build — not a builder who picked up law. The legal judgment leads; the code is only how I ship it."},"close":{"body":"I'm a lawyer by instinct, not by accident. I spent three and a half years in a courtroom before I wrote a line of code, and what drew me next wasn't technology for its own sake — it was the place where law and technology collide. Privacy, data protection, AI: the questions there are still open, the old answers don't quite fit, and that's exactly what pulled me in. So I taught myself to build — not to leave the law, but to go deeper into it than paper alone would let me. The technology made me a sharper lawyer; it was never the other way round. I didn't become a builder who picked up law. I stayed a lawyer who learned to build. I'd rather do this work — at the edge of tech and privacy law — inside a team already taking it seriously.","governance_note":"Models are routed by data sensitivity. Public-only diagnostics run on free fast-inference tiers — no privacy cost, the input is already public. Client and work data run on paid API tiers with model training disabled. Every demo here uses public or synthetic data only.","genuineness":"All work shown is mine; every link and demo is genuine.","contact":{"linkedin":"https://linkedin.com/in/shwetabh-singh","email":"shwetav.alpna.singh@gmail.com","phone":"+918825334336","render":"clickable icons (LinkedIn / mail / phone), not pasted URLs"}}}</script>

        if(/^\d+(\.\d+)*:/.test(s)) return '<div class="doc-clause-heading">'+esc(s)+'</div>';

        +'<a class="contact-ico" href="'+esc(c.contact.linkedin)+'" target="_blank" rel="noopener">'+ico('in')+'LinkedIn</a>'
        +'<a class="contact-ico" href="mailto:'+esc(c.contact.email)+'">'+ico('mail')+esc(c.contact.email)+'</a>'
        +'<a class="contact-ico" href="tel:'+esc(c.contact.phone)+'">'+ico('ph')+esc(c.contact.phone)+'</a></div>'
    +'</div></section>'));
  })();

  // ---------- RAIL ----------
  (function(){
    var rail=document.getElementById('rail');
    var railData=C.rail || {nodes:[], chip:{}};
    var fallbackTargets=['hero-thesis','doctrine-layer','taxonomy-map','instruments-layer','tooling-layer','systems-layer','close-fit'];
    var fallbackWhy=[
      'Establishes the claim: lawyer first, systems second.',
      'Shows the legal source layer: cases, statutes, and risk principles.',
      'Shows how AI use cases become legal risk categories.',
      'Shows how mapped risks become clauses, policies, and playbooks.',
      'Shows the diligence and intake workflows that operationalize the legal work.',
      'Shows the reusable delivery layer: portal, vault, and automation architecture.',
      'Converts the proof into the hiring argument for legal tech practice.'
    ];
    var html='';
    (railData.nodes || []).forEach(function(n,i){
      var label=n.label || n.node || ('Step '+(i+1));
      var target=n.target || fallbackTargets[i] || 'hero';
      var why=n.why || fallbackWhy[i] || n.sub || label;
      if(n.kind==='start'||n.kind==='terminal'){
        html+='<a class="rail-stage" href="#'+esc(target)+'" data-node="'+i+'" data-target="'+esc(target)+'"><div class="rail-dot endpoint"></div><div><div class="rail-node">'+esc(label)+'</div><div class="rail-sub">'+esc(n.sub)+'</div><div class="rail-why">'+esc(why)+'</div></div></a>';
      } else {
        // band header only when band changes
        var prev=railData.nodes[i-1];
        if(!prev||prev.band!==n.band){ html+='<div class="rail-band">'+esc(n.band)+'<span class="tag">'+esc(n.band_tag)+'</span></div>'; }
        html+='<a class="rail-stage" href="#'+esc(target)+'" data-node="'+i+'" data-target="'+esc(target)+'"><div class="rail-dot"></div><div><div class="rail-node">'+esc(label)+'</div><div class="rail-sub">'+esc(n.sub)+'</div><div class="rail-why">'+esc(why)+'</div></div></a>';
      }
    });
    html+='<div class="rail-chip" id="rail-chip"><span class="pulse"></span><span id="rail-chip-text">'+esc((railData.chip||{}).derived || 'law → system argument')+'</span></div>';
    rail.innerHTML=html;
  })();

  // ---------- SCROLL / SPY / REVEAL ----------
  (function(){
    var progress=document.getElementById('progress');
    var railStages=Array.prototype.slice.call(document.querySelectorAll('.rail-stage'));
    var mfSegs=Array.prototype.slice.call(document.querySelectorAll('.mobile-funnel .seg'));
    var mfLbl=document.getElementById('mfunnel-lbl');
    var chipText=document.getElementById('rail-chip-text');
    var navLinks=Array.prototype.slice.call(document.querySelectorAll('.nav-link[href^="#"]'));
    var navMap={hero:'#foundation',foundation:'#foundation',matrix:'#matrix',funnel:'#funnel',capstone:'#capstone',contact:'#contact'};
    var railData=C.rail || {nodes:[], chip:{}};
    var railTargets=railStages.map(function(st){ return document.getElementById(st.getAttribute('data-target')); });
    var railLabels=railStages.map(function(st){
      var node=(railData.nodes || [])[parseInt(st.getAttribute('data-node'),10)] || {};
      return node.label || node.node || 'Start';
    });
    var activeRail=-1, explainTimer=null;

    var reveals=document.querySelectorAll('.reveal');
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.12});
      reveals.forEach(function(n){io.observe(n);});
    } else {
      reveals.forEach(function(n){n.classList.add('visible');});
    }

    function showRailWhy(idx){
      if(idx<0 || !railStages[idx]) return;
      if(explainTimer) window.clearTimeout(explainTimer);
      railStages.forEach(function(st){ st.classList.remove('explain'); });
      railStages[idx].classList.add('explain');
      explainTimer=window.setTimeout(function(){ railStages[idx].classList.remove('explain'); }, 5200);
    }
    railStages.forEach(function(st,idx){
      st.addEventListener('mouseenter', function(){ showRailWhy(idx); });
      st.addEventListener('focus', function(){ showRailWhy(idx); });
      st.addEventListener('click', function(){ showRailWhy(idx); });
    });

    function update(){
      var max=document.documentElement.scrollHeight-window.innerHeight;
      progress.style.width=(max>0?(window.scrollY/max*100):0)+'%';
      var cur=0, curId='hero', off=window.innerHeight*.42;
      railTargets.forEach(function(target,idx){
        if(target && target.getBoundingClientRect().top-off<=0){
          cur=idx;
          curId=target.closest('section') ? target.closest('section').id : target.id;
        }
      });
      railStages.forEach(function(st,idx){
        st.classList.toggle('completed', idx<cur);
        st.classList.toggle('active', idx===cur);
      });
      if(cur!==activeRail){
        activeRail=cur;
        showRailWhy(cur);
      }
      mfSegs.forEach(function(s,idx){ s.classList.toggle('active', idx<=cur); });
      mfLbl.textContent=railLabels[cur]||'Start';
      var chip=railData.chip || {};
      chipText.textContent = cur>=4 ? (chip.running || 'instruments → delivery system') : cur>=3 ? (chip.structured || 'risks → instruments') : (chip.derived || 'law → system argument');
      var target=navMap[curId]||'#foundation';
      navLinks.forEach(function(l){ l.classList.toggle('active', l.getAttribute('href')===target); });
    }
    window.addEventListener('scroll', update, {passive:true});
    window.addEventListener('resize', update);
    update();
  })();

  }
  if(window.fetch){
    fetch('content.json', {cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : embeddedContent; })
      .then(function(fresh){
        return fetch('data/act2-manifest.json', {cache:'no-store'})
          .then(function(r){ return r.ok ? r.json() : null; })
          .catch(function(){ return null; })
          .then(function(act2){ boot(fresh || embeddedContent, act2); });
      })
      .catch(function(){
        fetch('data/act2-manifest.json', {cache:'no-store'})
          .then(function(r){ return r.ok ? r.json() : null; })
          .catch(function(){ return null; })
          .then(function(act2){ boot(embeddedContent, act2); });
      });
  } else {
    boot(embeddedContent, null);
  }
})();
</script>
</body>
</html>
