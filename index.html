}
*{box-sizing:border-box;}
html{scroll-behavior:smooth; background:var(--void);}
body{margin:0;
  background:

    radial-gradient(circle at 80% 18%, rgba(255,255,255,.045), transparent 24rem),

.tracked{letter-spacing:.2em; text-transform:uppercase;}
.gold{color:var(--gold);}
.surface{background:linear-gradient(180deg,rgba(12,12,12,.96),rgba(8,8,8,.96)); border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.03);}
.hairline{height:1px; background:linear-gradient(90deg,transparent,rgba(197,160,89,.55),rgba(255,255,255,.07),transparent);}
.progress-line{position:fixed; top:0; left:0; height:2px; width:0%; z-index:80;
  background:linear-gradient(90deg,var(--gold),rgba(197,160,89,.25)); box-shadow:0 0 16px rgba(197,160,89,.6);}
.topnav{position:sticky; top:0; z-index:70; background:rgba(5,5,5,.78); backdrop-filter:blur(18px);

.page-shell{position:relative; z-index:2;}
.main-grid{display:grid; grid-template-columns:minmax(0,1fr);}

/* ---- RAIL (live argument map) ---- */
.rail-wrap{display:none;}
@media(min-width:1024px){
  .rail-wrap{display:block; position:sticky; top:86px; align-self:start; height:calc(100vh - 110px); overflow-y:auto;}
  .rail{position:relative; padding:.5rem .25rem 2rem;}
  .rail::before{content:""; position:absolute; left:21px; top:26px; bottom:40px; width:1px;
    background:linear-gradient(180deg,rgba(197,160,89,.25),rgba(255,255,255,.08),rgba(197,160,89,.25));}
  .rail-band{font-size:.6rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(197,160,89,.7);
    font-weight:800; margin:1.1rem 0 .35rem 2.7rem;}
  .rail-band .tag{display:block; color:rgba(229,229,229,.38); font-weight:600; letter-spacing:.12em; margin-top:1px;}
  .rail-stage{position:relative; display:grid; grid-template-columns:44px 1fr; gap:.7rem; align-items:start; min-height:54px;
    border-radius:.85rem; padding:.12rem .2rem; text-decoration:none; cursor:pointer;}
  .rail-stage:hover,.rail-stage:focus{background:rgba(197,160,89,.06); outline:none;}
  .rail-dot{width:14px; height:14px; margin-left:14px; margin-top:2px; border-radius:999px; background:#080808;
    border:1px solid rgba(197,160,89,.45); box-shadow:0 0 0 5px rgba(5,5,5,.98); transition:all .3s;}
  .rail-dot.endpoint{transform:rotate(45deg); border-radius:3px;}
  .rail-stage.completed .rail-dot{background:rgba(197,160,89,.45); border-color:rgba(197,160,89,.75);}
  .rail-stage.active .rail-dot{background:var(--gold); border-color:var(--gold); box-shadow:0 0 0 5px #050505,0 0 22px rgba(197,160,89,.9);}
  .rail-stage.completed .rail-node{color:rgba(229,229,229,.72);}
  .rail-stage.active .rail-node{color:var(--gold);}
  .rail-node{font-size:.74rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(229,229,229,.5); font-weight:700;}
  .rail-sub{font-size:.68rem; color:rgba(229,229,229,.4); margin-top:.15rem; line-height:1.3;}
  .rail-why{display:none; margin-top:.5rem; padding:.55rem .65rem; border:1px solid rgba(197,160,89,.24);
    border-radius:.75rem; background:rgba(197,160,89,.07); color:rgba(229,229,229,.72); font-size:.68rem; line-height:1.45;}
  .rail-stage.explain .rail-why{display:block;}
  .rail-chip{display:inline-flex; align-items:center; gap:.4rem; margin:1rem 0 0 2.7rem; padding:.35rem .6rem;
    border:1px solid rgba(197,160,89,.35); background:rgba(197,160,89,.06); color:var(--gold);
    font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; border-radius:999px;}
  .rail-chip .pulse{width:6px; height:6px; border-radius:999px; background:var(--gold); box-shadow:0 0 8px var(--gold);}
}
.mobile-funnel{position:sticky; top:56px; z-index:60; display:flex; gap:.35rem; align-items:center; padding:.55rem 1rem;

section{scroll-margin-top:110px;}

.ld-mini-document{border:1px solid rgba(60,43,20,.12); border-radius:.55rem; background:#ede7d8; color:#221b12; padding:.7rem .75rem; box-shadow:0 10px 22px rgba(0,0,0,.28);}
.ld-mini-document h4{font-family:"Cormorant Garamond",serif; color:#3a2a11; font-size:1rem; line-height:1.05; margin:0;}
.ld-mini-document .reason{font-size:.62rem; color:rgba(34,27,18,.56); line-height:1.35; margin:.25rem 0;}
.ld-mini-document .mini-excerpt{font-family:Georgia,"Times New Roman",serif; font-size:.72rem; line-height:1.45; color:#2b241b; max-height:7.2rem; overflow:hidden; position:relative;}
.ld-mini-document .mini-excerpt::after{content:""; position:absolute; left:0; right:0; bottom:0; height:1.6rem; background:linear-gradient(transparent,#ede7d8);}
.ld-callout{border:1px solid rgba(197,160,89,.25); background:rgba(10,10,10,.88); border-radius:.75rem; padding:.65rem .7rem; box-shadow:0 16px 32px rgba(0,0,0,.42);}
.ld-callout .lab{font-size:.56rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); font-weight:800;}
.ld-callout p{margin:.25rem 0 0; font-size:.72rem; line-height:1.45; color:rgba(229,229,229,.75);}
@media(max-width:760px){
  .ld-document-page{padding:2.7rem 1.15rem 1.5rem;}
  .ld-doc-watermark{font-size:1.25rem;}
  .instrument-map-canvas{min-height:470px;}
  .instrument-node{min-width:104px; max-width:126px; font-size:.72rem;}
}

.ld-theater{position:fixed; inset:0; z-index:170; display:none; padding:1rem;}
.ld-theater.open{display:block;}
.ld-theater-backdrop{position:absolute; inset:0; background:rgba(0,0,0,.78); backdrop-filter:blur(16px);}
.ld-theater-panel{position:relative; z-index:1; width:min(1380px,100%); max-height:calc(100vh - 32px); margin:0 auto; display:grid;
  grid-template-columns:220px minmax(0,1fr) 300px; gap:1rem; border:1px solid rgba(197,160,89,.28); border-radius:1.15rem;
  background:linear-gradient(180deg,#0b0b0b,#050505); box-shadow:0 30px 120px rgba(0,0,0,.86); padding:1rem; overflow:hidden;}
.ld-theater-close{position:absolute; top:.85rem; right:.85rem; z-index:4; border:1px solid rgba(197,160,89,.45); background:rgba(5,5,5,.78);
  color:var(--gold); border-radius:999px; min-height:36px; padding:.38rem .75rem; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; font-weight:800; cursor:pointer;}
.ld-theater-meta,.ld-theater-side{min-height:0; overflow:auto;}
.ld-theater-meta{border-right:1px solid rgba(197,160,89,.12); padding:.7rem .75rem .7rem 0;}
.ld-theater-kicker{font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:800;}
.ld-theater-meta h3{font-family:"Cormorant Garamond",serif; color:#fff; font-size:1.55rem; line-height:1.05; margin:.55rem 0;}
.ld-theater-route{color:rgba(229,229,229,.58); font-size:.72rem; line-height:1.5;}
.ld-theater-badges{display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.75rem;}
.ld-theater-badges .ld-style-badge{margin:0; color:var(--gold); background:rgba(197,160,89,.06);}
.ld-theater-main{min-height:0; overflow:auto; padding:.35rem .4rem .35rem 0;}
.ld-document-page-modal{min-height:calc(100vh - 92px); max-width:850px; margin:0 auto;}
.ld-theater-doc-body{position:relative; z-index:1;}
.ld-theater-side{display:grid; gap:.8rem; align-content:start; padding:.7rem .1rem .7rem 0;}
.ld-mini-doc-panel,.ld-callout-panel{border:1px solid rgba(229,229,229,.09); border-radius:.9rem; background:rgba(255,255,255,.018); padding:.75rem;}
.ld-side-title{font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:800; margin-bottom:.55rem;}
.ld-theater-side .ld-mini-document{box-shadow:none; margin-bottom:.55rem;}
.ld-theater-side .ld-callout{box-shadow:none; margin-bottom:.5rem;}
body.ld-theater-lock{overflow:hidden;}
@media(max-width:1100px){
  .ld-theater-panel{grid-template-columns:1fr; overflow:auto;}
  .ld-theater-meta{border-right:0; border-bottom:1px solid rgba(197,160,89,.12); padding-right:2.8rem;}
  .ld-theater-main{overflow:visible; padding:0;}
  .ld-document-page-modal{min-height:560px;}
}

/* ---- ACT III / CAPSTONE / CLOSE ---- */
.station{border:1px solid rgba(229,229,229,.1); background:rgba(255,255,255,.02); border-radius:1rem; padding:1rem 1.1rem; display:flex; flex-direction:column;}
.station h3{font-family:"Cormorant Garamond",serif; color:var(--gold); font-size:1.35rem; margin:0; line-height:1;}
.station .sys{font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:rgba(229,229,229,.45); margin-top:.2rem;}
.station .fr{font-size:.82rem; color:rgba(229,229,229,.7); line-height:1.5; margin-top:.5rem; flex:1;}
.station .aff{display:flex; gap:.4rem; margin-top:.7rem; flex-wrap:wrap;}
.aff-chip{font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; border:1px solid rgba(197,160,89,.35); color:var(--gold);
  border-radius:999px; padding:.25rem .55rem;}
.aff-chip.placeholder{border-color:rgba(229,229,229,.16); color:rgba(229,229,229,.4);}
.aff-chip.live{background:rgba(39,134,95,.14); border-color:rgba(39,134,95,.5); color:#5fb38c;}
.jur-card{border:1px solid rgba(229,229,229,.1); background:rgba(255,255,255,.02); border-radius:1rem; padding:1rem 1.1rem;}
.jur-card h3{font-family:"Cormorant Garamond",serif; color:var(--gold); font-size:1.5rem; margin:0;}
.jur-card p{font-size:.8rem; color:rgba(229,229,229,.72); line-height:1.55; margin:.4rem 0 0;}
.pm-table{width:100%; border-collapse:collapse; margin-top:.6rem;}
.pm-table th{text-align:left; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(229,229,229,.45); padding:.4rem .5rem; border-bottom:1px solid rgba(197,160,89,.2);}
.pm-table td{padding:.5rem; border-bottom:1px solid rgba(255,255,255,.05); font-size:.85rem;}
.pm-table td.legal{color:var(--marble);}
.pm-table td.eng{color:rgba(229,229,229,.55); font-family:ui-monospace,monospace; font-size:.78rem;}
.contact-row{display:flex; flex-wrap:wrap; gap:.6rem;}
.contact-ico{display:inline-flex; align-items:center; gap:.5rem; border:1px solid rgba(197,160,89,.4); border-radius:999px;
  padding:.55rem .9rem; color:var(--gold); transition:all .2s; font-size:.82rem;}
.contact-ico:hover{background:rgba(197,160,89,.12); transform:translateY(-1px);}
.contact-ico svg{width:16px; height:16px;}

/* ---- MODAL ---- */
.modal{position:fixed; inset:0; z-index:120; display:none; align-items:center; justify-content:center; padding:1rem;
  background:rgba(0,0,0,.74); backdrop-filter:blur(16px);}
.modal.open{display:flex;}
.modal-card{width:min(680px,100%); max-height:88vh; overflow:auto; border-radius:1.3rem; padding:1.4rem 1.5rem; background:linear-gradient(180deg,#0e0e0e,#080808); border:1px solid var(--border); position:relative;}
.modal-close{position:absolute; top:.9rem; right:.9rem; width:38px; height:38px; border-radius:999px; border:1px solid rgba(197,160,89,.4); color:var(--gold); background:rgba(5,5,5,.7); cursor:pointer; font-size:1.1rem;}
.modal h3{font-family:"Cormorant Garamond",serif; color:#fff; font-size:1.6rem; margin:.2rem 0 0;}
.modal .beat{margin-top:.9rem;}
.modal .beat .lab{font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); font-weight:800;}
.modal .beat p{margin:.25rem 0 0; line-height:1.6; color:rgba(229,229,229,.85);}
.placeholder-note{margin-top:1rem; padding-top:.9rem; border-top:1px solid rgba(197,160,89,.16); font-size:.76rem; color:rgba(229,229,229,.45);}

@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto} .reveal,.load-in,.btn,.ld-clause,.ld-docchip{transition:none; animation:none; transform:none; opacity:1;}
}

rface": ["Enterprise-Private"], "authority": {"in": "Indian Contract Act", "eu": "B2B contract", "us": "UCC / contract"}, "clause": "AGT + TOS", "tier": "T3"}, {"id": "DOE_PRV_001", "threat": "Autonomous Over-Scope Data Processing", "lane": "A", "archetype": "DOE", "surface": ["PII"], "authority": {"in": "DPDP (purpose limitation)", "eu": "GDPR (purpose limitation)", "us": "CCPA"}, "clause": "AGT + DPA", "tier": "T2"}]}, "stack_overview": {"laneA": [{"doc": "TOS", "role": "central router", "line": "Master terms; routes every other document by trigger."}, {"doc": "DPA", "line": "Data processing terms; fires on PII / EU data."}, {"doc": "AGT", "line": "Agent addendum; fires on autonomous capability."}, {"doc": "AUP", "line": "Acceptable-use; injection, sensitive-surface, bias blocks."}, {"doc": "PP", "line": "Privacy policy; controller-side processing."}, {"doc": "SLA", "line": "Service levels; enterprise uptime / liability."}], "laneB": [{"doc": "HND", "line": "Internal AI-use handbook for staff deployment."}, {"doc": "IP", "line": "Prompt-assignment + ownership chain for internal output."}, {"doc": "DPIA", "line": "Data-protection impact assessment for internal tools."}, {"doc": "SOP", "line": "Human-in-the-loop operating procedures."}, {"doc": "Scanner", "line": "Internal-deployment risk diagnostic."}]}, "living_document": {"behavior": "Real TOS (the spine doc) renders fully blurred at rest. Click a button → scroll + pop + un-blur the specific clause, with the 3-beat explanation. Full animation. Mobile degrades to stacked full-screen sequence.", "spine_doc": "TOS (central router)", "watermark": "CONFIDENTIAL — Sample — Shwetabh Singh", "threat_buttons": [{"threat": "Chatbot hallucination binds you", "clause": "TOS §8 Hallucination Waiver", "case": "Moffatt / Walters", "what": "A hallucination-specific waiver + output-authority boundary + point-of-interaction clickwrap.", "why": "Moffatt binds the chatbot's words to the company; a point-of-interaction disclaimer defeats the reasonable reliance the company would otherwise owe (Walters). A generic “AS-IS” clause does neither."}, {"threat": "Agent overspends / auto-contracts", "clause": "AGT Circuit Breaker", "case": "UETA §14", "what": "Per-incident spend cap, retry and loop limits, and machine-action attribution.", "why": "UETA §14 attributes an electronic agent's actions to the principal — so the agent's spending is the company's liability. The circuit breaker caps the blast radius before it compounds."}, {"threat": "“Delete my data” = delete the model", "clause": "DPA §4 RAG-Only Mandate", "case": "Rite Aid / GDPR Art. 17 / DPDP §8(7)", "what": "Mandates retrieval-augmented generation over fine-tuning, so user data never bakes into model weights.", "why": "Fine-tuning makes data mathematically un-deletable; an erasure request then can't be honored, exposing FTC algorithmic disgorgement (Rite Aid) and breach of GDPR Art. 17 / DPDP §8(7). RAG keeps deletion possible."}, {"threat": "Your AI output is public domain", "clause": "IP Prompt Assignment + HITL", "case": "Thaler v. Perlmutter", "what": "Assigns the human selection/arrangement logic and mandates human-in-the-loop authorship.", "why": "Raw autonomous AI output isn't copyrightable (Thaler), so a standard “assign all copyrights” transfers nothing. The chain secures enterprise IP by anchoring it to human authorship."}, {"threat": "AI reclassified as a product (strict liability)", "clause": "TOS §2.2 Service Classification", "case": "EU PLD 2024/2853", "what": "Defines the offering as a service, not a product, with the supporting structural terms.", "why": "The revised EU Product Liability Directive can sweep software/AI into strict product liability. The classification clause holds the service line and the defenses that go with it."}, {"threat": "Cross-border consent fails", "clause": "Cross-Border Consent Clause", "case": "DPDP §6 / GDPR Art. 6–7 / CCPA", "what": "Layered consent and lawful-basis architecture across three regimes.", "why": "Consent valid in one jurisdiction is invalid in another: DPDP §6 notice+consent, GDPR Art. 6–7 lawful basis, and CCPA opt-out are different instruments. The clause layers all three."}], "trigger_buttons": {"note": "Wired to the real vault.js engine and the Act I surfaces. Click a condition → the router fires → connected docs pop alongside, hooks lit → labelled ‘what the Vault injects automatically when you flag this →’ (hands into Act III).", "items": [{"trigger": "Agentic capability", "surface": "Doer", "fires": "TOS §2.7 + entire DOC_AGT", "injects": "spend caps §4.1/§4.2, circuit breaker"}, {"trigger": "EU data", "surface": "Consumer-Public / Enterprise-Private", "fires": "DPA §6.2–6.4 + Schedule D", "injects": "Standard Contractual Clauses attached"}, {"trigger": "PII processing", "surface": "PII", "fires": "DOC_DPA + DOC_PP activate", "injects": "controller / processor split"}, {"trigger": "RAG vs Fine-tuning", "surface": "memory architecture", "fires": "RAG → DPA §4 fires; Fine-tune → §4 omitted, TOS §6.1(c) opt-in", "injects": "the conditional deletion logic, live"}, {"trigger": "Indemnity / remedial", "surface": "liability", "fires": "TOS ↔ DPA ↔ AGT", "injects": "cross-referenced caps light across documents"}]}, "vault_tease": "B2C + EU data → Consumer + EU surfaces → injects §8 and attaches the DPA into Schedule A → this is the base the Vault assembles from →"}, "connector2": "But a document stack is still hand-work: someone reading the registry, choosing the clauses, assembling the file. The leverage was never the document — it was the system that produces it. So I built that."}, "act3": {"header": "Act III — The Funnel: the machine that runs it.", "scope_note": "Live tools (the four sandboxes) and the videos are a separate build phase. Structure, copy, the OS map, the automation-library link, and Connector 3 are real now.", "determinism_principle": "Here's why you can trust the funnel: the registry constrains the model, the Vault→Assembly is deterministic, and the residual judgment goes to human review. As deterministic as law requires.", "master_video": {"placeholder": true, "frame": "Primary exhibit — a chaptered full-power walkthrough of the project-version engines (most powerful models, in the ChatGPT/Claude project interface), narrated for the prompt/agent engineering. Chapters: Signal → Diligence → Assembly → CRM. Shows the client-deliverable docs (Architect Notes excluded) and the threat-registry CSV as provenance. CRM chapter uses synthetic data only.", "phase": "Phase 4"}, "os_map": "One synthetic record traced end-to-end through the stations.", "stations": [{"name": "Signal", "system": "Spear multi-agent + signal hunters", "frame": "Engineering proof, not a product — multi-agent LLM pipeline.", "affordances": ["Watch", "Read"]}, {"name": "Diligence", "system": "Forensic Engine (Sandbox 1)", "frame": "Run a URL or upload a doc → Risk Report (mechanical trigger → law IN/US/EU → remediation). AI-risk diligence; the same engine generalises to any diligence domain.", "affordances": ["Watch", "Run", "Read"]}, {"name": "Assembly", "system": "Vault → Assembly → CRM (Sandbox 2)", "frame": "One closed-loop engine, step-by-step, synthetic input. Law-as-code. Manage = synthetic sandbox, never the real portal.", "affordances": ["Watch", "Run", "Read"]}, {"name": "Lane B Scanner", "system": "Internal-deployment diagnostic (Sandbox 3)", "frame": "The deploy-side counterpart — the key Lane B artifact.", "affordances": ["Watch", "Run", "Read"]}, {"name": "Automation Engine", "system": "automation-library (Sandbox 4)", "frame": "Public, audited repo (real now) + a runnable document pipeline: drop a doc → OCR → extract → classify → summarise → route. The same architecture, generalised.", "affordances": ["Watch", "Run", "Read"], "repo_live": true}], "connector3": "Every system here runs on one spine — the scanner reads the registry, the Vault assembles the clauses, and the platform proves the architecture isn't specific to law at all. Which is the whole point."}, "capstone": {"title": "One Mind: The Legal Problem First — Across Three Jurisdictions", "crossborder": {"lead": true, "in": "IT Act 2000 → DPDP Act 2023 · CPA 2019 · Copyright Act 1957 · IT Amendment Rules 2026 (3-hour takedown) · MeitY advisories", "eu": "GDPR · EU AI Act 2024/1689 (Art. 50: 2 Aug 2026; high-risk Annex III: 2 Dec 2027) · Product Liability Directive 2024/2853", "us": "UCC Art. 2/2A · UETA §14 · CCPA/CPRA · TX TRAIGA · IL HB3773 (Colorado AI Act: repealed/replaced — not active)"}, "parallel_map": {"header": "The same legal discipline, even in the engineering.", "frame": "The law came first and trained the instinct — classification, dependency, controlled assembly — and it shows up when I build software. Not a method that generalises across domains; a legal mind that shaped the code.", "rows": [{"legal": "Threat Registry", "engineering": "component-classification.csv"}, {"legal": "The Vault (client-config questionnaire)", "engineering": "client-config layer"}, {"legal": "Lane docs (template assemblies)", "engineering": "template assemblies"}, {"legal": "Core / adapter clause structure", "engineering": "provider-agnostic core"}]}, "identity_line": "A litigator who taught himself to build — not a builder who picked up law. The legal judgment leads; the code is only how I ship it."}, "close": {"body": "I'm a lawyer by instinct, not by accident. I spent three and a half years in a courtroom before I wrote a line of code, and what drew me next wasn't technology for its own sake — it was the place where law and technology collide. Privacy, data protection, AI: the questions there are still open, the old answers don't quite fit, and that's exactly what pulled me in. So I taught myself to build — not to leave the law, but to go deeper into it than paper alone would let me. The technology made me a sharper lawyer; it was never the other way round. I didn't become a builder who picked up law. I stayed a lawyer who learned to build. I'd rather do this work — at the edge of tech and privacy law — inside a team already taking it seriously.", "governance_note": "Models are routed by data sensitivity. Public-only diagnostics run on free fast-inference tiers — no privacy cost, the input is already public. Client and work data run on paid API tiers with model training disabled. Every demo here uses public or synthetic data only.", "genuineness": "All work shown is mine; every link and demo is genuine.", "contact": {"linkedin": "https://linkedin.com/in/shwetabh-singh", "email": "shwetav.alpna.singh@gmail.com", "phone": "+918825334336", "render": "clickable icons (LinkedIn / mail / phone), not pasted URLs"}}}</script>

  function buildLivingDoc(m){
    var ld=m.living_document, twrap=document.getElementById('ld-threats'), selectionChip=document.getElementById('ld-selection-chip');
    function triggerByLabel(label){ return (ld.triggers||[]).filter(function(t){return t.label===label;})[0]; }
    twrap.innerHTML=(ld.trigger_groups||[]).map(function(g){
      return '<div class="ld-group-title">'+esc(g.label)+'</div>'+g.triggers.map(function(label){
        var t=triggerByLabel(label)||{label:label};
        return '<button class="ld-btn" type="button" data-trigger-label="'+esc(t.label)+'"><div class="th">'+esc(t.label)+'</div><div class="cl">'+esc(t.lane||'')+' · '+esc(t.mapping_status||t.group||'')+'</div></button>';
      }).join('');
    }).join('');

    var theater=ensureLivingTheater();

    function mainRoute(t, key){
      return ((t.main_reveal_route||[]).filter(function(x){return x.indexOf(key+':')===0;})[0]||'').replace(key+':','').trim();
    }
    function frameTitle(t){
      var display=(t.main_document_display||[]).filter(function(x){return x.indexOf('Document frame title:')===0;})[0];
      return display ? display.replace('Document frame title:','').trim() : (mainRoute(t,'Main document') || t.label || ld.default_note);
    }
    function renderClause(text){
      return String(text||'').split(/\r?\n/).map(function(line){
        var raw=line, s=raw.trim();
        if(!s) return '<div class="doc-spacer" aria-hidden="true"></div>';
        if(/^[A-Z0-9 &;:/().,-]+$/.test(s) && /[A-Z]/.test(s)) return '<div class="doc-section-title">'+esc(s)+'</div>';
        if(/^\d+(\.\d+)*:/.test(s)) return '<div class="doc-clause-heading">'+esc(s)+'</div>';
        if(/^\([a-z]\)\s+/i.test(s)) return '<div class="doc-list-item">'+esc(s).replace(/^(\([a-z]\))\s+/i,'<span class="doc-leadin">$1</span> ')+'</div>';
        if(/^(i{1,3}|iv|v|vi{0,3}|ix|x)\.\s+/i.test(s)) return '<div class="doc-nested-item">'+esc(s).replace(/^((?:i{1,3}|iv|v|vi{0,3}|ix|x)\.)\s+/i,'<span class="doc-leadin">$1</span> ')+'</div>';
        var safe=esc(s).replace(/^([A-Z][A-Za-z /-]{2,48}\.)\s+/, '<span class="doc-leadin">$1</span> ');
        return '<p class="doc-para">'+safe+'</p>';
      }).join('');
    }
    function surroundingBlocks(t){
      var raw=t.raw_markdown||'', m=raw.match(/Surrounding document state:\s*\n\n```text\n([\s\S]*?)\n```/);
      if(!m) return [];
      var lines=m[1].split(/\r?\n/).map(function(x){return x.trim();}).filter(Boolean), blocks=[];
      for(var i=0;i<lines.length;i++){
        if(lines[i].charAt(0)!=='['){
          blocks.push({title:lines[i], state:(lines[i+1]&&lines[i+1].charAt(0)==='[')?lines[i+1]:''});
        }
      }
      return blocks;
    }
    function redacted(title){
      return '<div class="ld-redacted-section"><div class="doc-section-title">'+esc(title||'CONNECTED SECTION')+'</div><div class="ld-blur-line" style="width:92%"></div><div class="ld-blur-line" style="width:76%"></div><div class="ld-blur-line" style="width:64%"></div></div>';
    }
    function renderDocumentPage(t){
      var selectedHtml='<div class="ld-selected-clause" id="ld-selected-clause">'+renderClause(t.main_clause||'Clause manifest unavailable in fallback mode.')+'</div>';
      var blocks=surroundingBlocks(t);
      if(!blocks.length) return redacted('PRECEDING ROUTE CONTEXT')+selectedHtml+redacted('FOLLOWING ROUTE CONTEXT');
      var selectedSeen=false;
      return blocks.map(function(b){
        var isSelected=/FULL|REVEALED/.test(b.state) && !/connected mini-doc|partially visible/i.test(b.state);
        if(isSelected && !selectedSeen){ selectedSeen=true; return selectedHtml; }
        return redacted(b.title);
      }).join('')+(selectedSeen?'':selectedHtml);
    }
    function miniExcerpt(text){
      return String(text||'').split(/\r?\n/).map(function(x){return x.trim();}).filter(Boolean).slice(0,5).map(esc).join('<br>');

    function renderAnnotations(items){

            +'<section class="ld-callout-panel"><div class="ld-side-title">Clause logic</div><div id="ld-theater-callouts"></div></section>'
          +'</aside>'

        // band header only when band changes
        var prev=railData.nodes[i-1];
        if(!prev||prev.band!==n.band){ html+='<div class="rail-band">'+esc(n.band)+'<span class="tag">'+esc(n.band_tag)+'</span></div>'; }
        html+='<a class="rail-stage" href="#'+esc(target)+'" data-node="'+i+'" data-target="'+esc(target)+'"><div class="rail-dot"></div><div><div class="rail-node">'+esc(label)+'</div><div class="rail-sub">'+esc(n.sub)+'</div><div class="rail-why">'+esc(why)+'</div></div></a>';
      }
    });
    html+='<div class="rail-chip" id="rail-chip"><span class="pulse"></span><span id="rail-chip-text">'+esc((railData.chip||{}).derived || 'law → system argument')+'</span></div>';
    rail.innerHTML=html;
  })();

  // ---------- SCROLL / SPY / REVEAL ----------
  (function(){
    var progress=document.getElementById('progress');
    var railStages=Array.prototype.slice.call(document.querySelectorAll('.rail-stage'));
    var mfSegs=Array.prototype.slice.call(document.querySelectorAll('.mobile-funnel .seg'));
    var mfLbl=document.getElementById('mfunnel-lbl');
    var chipText=document.getElementById('rail-chip-text');
    var navLinks=Array.prototype.slice.call(document.querySelectorAll('.nav-link[href^="#"]'));
    var navMap={hero:'#foundation',foundation:'#foundation',matrix:'#matrix',funnel:'#funnel',capstone:'#capstone',contact:'#contact'};
    var railData=C.rail || {nodes:[], chip:{}};
    var railTargets=railStages.map(function(st){ return document.getElementById(st.getAttribute('data-target')); });
    var railLabels=railStages.map(function(st){
      var node=(railData.nodes || [])[parseInt(st.getAttribute('data-node'),10)] || {};
      return node.label || node.node || 'Start';
    });
    var activeRail=-1, explainTimer=null;

    var reveals=document.querySelectorAll('.reveal');
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.12});
      reveals.forEach(function(n){io.observe(n);});
    } else {
      reveals.forEach(function(n){n.classList.add('visible');});
    }

    function showRailWhy(idx){
      if(idx<0 || !railStages[idx]) return;
      if(explainTimer) window.clearTimeout(explainTimer);
      railStages.forEach(function(st){ st.classList.remove('explain'); });
      railStages[idx].classList.add('explain');
      explainTimer=window.setTimeout(function(){ railStages[idx].classList.remove('explain'); }, 5200);
    }
    railStages.forEach(function(st,idx){
      st.addEventListener('mouseenter', function(){ showRailWhy(idx); });
      st.addEventListener('focus', function(){ showRailWhy(idx); });
      st.addEventListener('click', function(){ showRailWhy(idx); });
    });

    function update(){
      var max=document.documentElement.scrollHeight-window.innerHeight;
      progress.style.width=(max>0?(window.scrollY/max*100):0)+'%';
      var cur=0, curId='hero', off=window.innerHeight*.42;
      railTargets.forEach(function(target,idx){
        if(target && target.getBoundingClientRect().top-off<=0){
          cur=idx;
          curId=target.closest('section') ? target.closest('section').id : target.id;
        }
      });
      railStages.forEach(function(st,idx){
        st.classList.toggle('completed', idx<cur);
        st.classList.toggle('active', idx===cur);
      });
      if(cur!==activeRail){
        activeRail=cur;
        showRailWhy(cur);
      }
      mfSegs.forEach(function(s,idx){ s.classList.toggle('active', idx<=cur); });
      mfLbl.textContent=railLabels[cur]||'Start';
      var chip=railData.chip || {};
      chipText.textContent = cur>=4 ? (chip.running || 'instruments → delivery system') : cur>=3 ? (chip.structured || 'risks → instruments') : (chip.derived || 'law → system argument');
      var target=navMap[curId]||'#foundation';
      navLinks.forEach(function(l){ l.classList.toggle('active', l.getAttribute('href')===target); });
    }
    window.addEventListener('scroll', update, {passive:true});
    window.addEventListener('resize', update);
    update();
  })();

  }
  if(window.fetch){
    fetch('content.json', {cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : embeddedContent; })
      .then(function(fresh){
        return fetch('data/act2-manifest.json', {cache:'no-store'})
          .then(function(r){ return r.ok ? r.json() : null; })
          .catch(function(){ return null; })
          .then(function(act2){ boot(fresh || embeddedContent, act2); });
      })
      .catch(function(){
        fetch('data/act2-manifest.json', {cache:'no-store'})
          .then(function(r){ return r.ok ? r.json() : null; })
          .catch(function(){ return null; })
          .then(function(act2){ boot(embeddedContent, act2); });
      });
  } else {
    boot(embeddedContent, null);
  }
})();
</script>
</body>
</html>
