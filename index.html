.tracked{letter-spacing:.2em; text-transform:uppercase;}

.topnav{position:sticky; top:0; z-index:70; background:rgba(5,5,5,.78); backdrop-filter:blur(18px);

/* ---- RAIL (live argument map) ---- */
.rail-wrap{display:none;}
@media(min-width:1024px){
  .rail-wrap{display:block; position:sticky; top:86px; align-self:start; height:calc(100vh - 110px); overflow-y:auto;}
  .rail{position:relative; padding:.5rem .25rem 2rem;}
  .rail::before{content:""; position:absolute; left:21px; top:26px; bottom:40px; width:1px;
    background:linear-gradient(180deg,rgba(197,160,89,.25),rgba(255,255,255,.08),rgba(197,160,89,.25));}
  .rail-band{font-size:.56rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(197,160,89,.7);
    font-weight:800; margin:.85rem 0 .26rem 2.7rem;}
  .rail-band .tag{display:block; color:rgba(229,229,229,.38); font-weight:600; letter-spacing:.12em; margin-top:1px;}
  .rail-stage{position:relative; display:grid; grid-template-columns:44px 1fr; gap:.55rem; align-items:start; min-height:46px;
    border-radius:.85rem; padding:.12rem .2rem; text-decoration:none; cursor:pointer;}
  .rail-stage:hover,.rail-stage:focus{background:rgba(197,160,89,.06); outline:none;}
  .rail-dot{width:14px; height:14px; margin-left:14px; margin-top:2px; border-radius:999px; background:#080808;
    border:1px solid rgba(197,160,89,.45); box-shadow:0 0 0 5px rgba(5,5,5,.98); transition:all .3s;}
  .rail-dot.endpoint{transform:rotate(45deg); border-radius:3px;}
  .rail-stage.completed .rail-dot{background:rgba(197,160,89,.45); border-color:rgba(197,160,89,.75);}
  .rail-stage.active .rail-dot{background:var(--gold); border-color:var(--gold); box-shadow:0 0 0 5px #050505,0 0 22px rgba(197,160,89,.9);}
  .rail-stage.completed .rail-node{color:rgba(229,229,229,.72);}
  .rail-stage.active .rail-node{color:var(--gold);}
  .rail-node{font-size:.69rem; letter-spacing:.14em; text-transform:uppercase; color:rgba(229,229,229,.5); font-weight:700;}
  .rail-sub{font-size:.63rem; color:rgba(229,229,229,.4); margin-top:.12rem; line-height:1.25;}
  .rail-why{display:none; margin-top:.5rem; padding:.55rem .65rem; border:1px solid rgba(197,160,89,.24);
    border-radius:.75rem; background:rgba(197,160,89,.07); color:rgba(229,229,229,.72); font-size:.68rem; line-height:1.45;}
  .rail-stage.explain .rail-why{display:block;}
  .rail-chip{display:inline-flex; align-items:center; gap:.4rem; margin:1rem 0 0 2.7rem; padding:.35rem .6rem;
    border:1px solid rgba(197,160,89,.35); background:rgba(197,160,89,.06); color:var(--gold);
    font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; border-radius:999px;}
  .rail-chip .pulse{width:6px; height:6px; border-radius:999px; background:var(--gold); box-shadow:0 0 8px var(--gold);}
}

section{scroll-margin-top:110px;}
.act{padding:2.4rem 0;}

.btn:hover,.btn:focus{background:rgba(197,160,89,.14); transform:translateY(-1px); outline:none; box-shadow:0 0 0 3px rgba(197,160,89,.12);}

.method-chain-panel{border-left:1px solid rgba(197,160,89,.45); padding-left:1rem;}

.method-chain{display:grid; gap:.55rem;}
.method-chain button{position:relative; width:100%; text-align:left; border:1px solid rgba(229,229,229,.11); border-radius:.75rem; padding:.62rem .78rem .62rem 1rem; background:rgba(255,255,255,.018); color:rgba(229,229,229,.84); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; font-weight:800; transition:all .2s; cursor:pointer;}

  border-radius:1.25rem; padding:1.15rem; box-shadow:inset 0 1px 0 rgba(255,255,255,.03);}

.chain-node{position:relative; display:block; width:100%; text-align:left; border:1px solid rgba(229,229,229,.11);
  border-radius:.75rem; padding:.54rem .72rem .54rem .95rem; background:rgba(255,255,255,.018); color:rgba(229,229,229,.82);
  font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; font-weight:800; transition:all .22s; cursor:pointer;}
.chain-node::before{content:""; position:absolute; left:-.53rem; top:-.62rem; bottom:50%; width:1px; background:rgba(197,160,89,.38);}

  border:1px solid rgba(197,160,89,.7); background:#090909; box-shadow:0 0 0 4px #090909;}
.chain-node:first-child::before{display:none;}
.chain-node:hover,.chain-node:focus,.chain-node.active{border-color:rgba(197,160,89,.7); color:var(--gold); background:rgba(197,160,89,.1); outline:none;}
.chain-node:hover::after,.chain-node:focus::after,.chain-node.active::after{background:var(--gold); box-shadow:0 0 0 4px #090909,0 0 16px rgba(197,160,89,.7);}

.proof-disclaimer{margin:.95rem 0 .45rem; color:rgba(229,229,229,.38); font-size:.56rem; letter-spacing:.12em; text-transform:uppercase;}

.proof-chips{display:grid; grid-template-columns:1fr; gap:.45rem; margin-top:0;}

el":"View build notes","target":"#capstone"}],"proof_line":"Demos and videos use public, synthetic, or scrubbed proof artifacts only.","credential_bar":"3.5 years litigation · B.A. LL.B., NLU Odisha · AI governance · privacy · commercial contracts · building hands-on since Oct 2025"},"rail":{"chip":{"derived":"law → method","structured":"risks → instruments","running":"instruments → delivery system"},"nodes":[{"kind":"start","label":"Start","sub":"the thesis","target":"hero-thesis","why":"Establishes the claim: lawyer first, systems second."},{"band":"ACT I · FOUNDATION","band_tag":"the law","node":"Doctrine","sub":"AI physics → legal doctrine","target":"doctrine-layer","why":"Shows the legal source layer: how AI mechanics create legal consequences."},{"band":"ACT I · FOUNDATION","band_tag":"the law","node":"Taxonomy","sub":"risk surfaces","target":"taxonomy-map","why":"Shows how AI use cases become legal risk categories."},{"band":"ACT II · THE LEGAL MATRIX","band_tag":"the instruments","node":"Matrix","sub":"98 threats → authority → controls","target":"act2-threat-matrix","why":"Shows the registry that converts AI legal risk into traceable threat units."},{"band":"ACT II · THE LEGAL MATRIX","band_tag":"the instruments","node":"Instruments","sub":"document stack + clause viewer","target":"act2-living-document","why":"Shows how mapped risks become clauses, policies, addenda, and playbooks."},{"band":"ACT III · LEGAL DELIVERY SYSTEM","band_tag":"built to deliver it","node":"Walkthrough","sub":"project runs","target":"project-walkthrough","why":"Shows the full-power system run in project/model environments."},{"band":"ACT III · LEGAL DELIVERY SYSTEM","band_tag":"built to deliver it","node":"Sandbox OS","sub":"diligence → assembly → delivery","target":"sandbox-os","why":"Shows the public-safe sandbox where the delivery loop can be tested with synthetic data."},{"band":"ACT III · LEGAL DELIVERY SYSTEM","band_tag":"built to deliver it","node":"Prompt Systems","sub":"controlled legal intelligence","target":"prompt-agent-proof","why":"Shows controlled prompt-agent workflows for legal intelligence and reviewable output."},{"band":"ACT III · LEGAL DELIVERY SYSTEM","band_tag":"built to deliver it","node":"Automation","sub":"general workflow proof","target":"workflow-automation-proof","why":"Shows that the same controlled workflow logic can be applied outside law."},{"band":"CAPSTONE","band_tag":"the method","node":"Synthesis","sub":"one legal method","target":"capstone","why":"Synthesizes the portfolio into one legal method across jurisdictions and systems."},{"kind":"terminal","label":"Close","sub":"technology & data protection lawyer","target":"contact","why":"Converts the proof into the hiring argument."}]},"act1":{"orientation_line":"This portfolio runs in two halves. Acts I–II are the law — every AI risk mapped, and the clauses that close it. Act III is the systems I built to do that work automatically. The systems exist to deliver the law.","architecture_diagram":["Risk Map","Clauses","The Systems"],"header":"The Legal Foundation — AI law risks mapped into a working taxonomy.","forward_ref":"→ what the diligence engine later detects on its own.","intro":"Each one stays close to the real legal problem — what creates the exposure, what closes it, what holds up. I built them in AI law: contracts, compliance, privacy, AI liability, diligence, digital business risk. The build is just the delivery — the legal judgment is the point.","lanes":[{"tag":"Lane A","text":"companies building AI products"},{"tag":"Lane B","text":"companies deploying AI internally"}],"reference_layer":{"frame":"The reference layer the systems read from.","spine":["Mechanism","Consequence","Remediation"],"worked_line":"A model is probabilistic (mechanism) → its confident false output creates reliance liability (consequence) → a hallucination-specific waiver + output-authority boundary closes it (remediation).","scope_stat":"98 threats · 10 archetypes · 10 surfaces · 3 jurisdictions — authored solo since October 2025, refined from 81 through forensic-engine runs.","applied_practice":"Applied-practice layer shown frosted, with a count only. No raw corpus, no commercial labels."},"risk_map":{"note":"Classify → trigger. Select an archetype → its surfaces light over the Global Floor → click a lit surface → modal pulls the matching registry rows (authority IN/EU/US + clause). Preset-driven entry; on-hover definitions on every archetype and surface.","global_floor":{"code":"UNI","label":"Global Floor (Universal)","def":"The baseline every AI product is bound by, regardless of what it does — consent, transparency, third-party pass-throughs.","count":37},"archetypes":[{"code":"DOE","name":"Doer","kind":"Action AI","def":"Executes tasks or spends money autonomously (AI SDRs, automated support, agents)."},{"code":"JDG","name":"Judge","kind":"Predictive AI","def":"Scores or screens humans for opportunity (HR screeners, loan approvals)."},{"code":"CMP","name":"Companion","kind":"Social AI","def":"Sustains emotional relationships or roleplay (virtual therapists, conversational agents)."},{"code":"CRT","name":"Creator","kind":"Generative AI","def":"Generates net-new media or code (image generators, voice cloners, copilots)."},{"code":"RDR","name":"Reader","kind":"Ingestion AI","def":"Consumes and vectorizes external data (RAG pipelines, scrapers)."},{"code":"ORC","name":"Orchestrator","kind":"Routing AI","def":"Routes prompts to third-party models (API gateways, model routers)."},{"code":"TRN","name":"Translator","kind":"Conversion AI","def":"Bridges formats, often via physical inputs (meeting note-takers, speech-to-text)."},{"code":"SHD","name":"Shield","kind":"Defense AI","def":"Monitors or audits enterprise environments (AI pen-testing, compliance bots)."},{"code":"OPT","name":"Optimizer","kind":"Systemic AI","def":"Manages critical or financial infrastructure (algorithmic trading, grid control)."},{"code":"MOV","name":"Mover","kind":"Physical AI","def":"Acts on the physical world (warehouse robotics, autonomous drones)."}],"surfaces":[{"name":"PII","def":"Processing identifiable personal data — names, emails, IPs, user text."},{"name":"Sensitive/Biometric","def":"Health, voice, or facial-geometry data — triggers strict biometric regimes."},{"name":"Financial","def":"AI managing trades, credit, or payments."},{"name":"Minors","def":"Users under 18 — triggers age-design and parental-consent regimes."},{"name":"Employment","def":"Screening candidates or employees — triggers bias-audit mandates."},{"name":"Consumer-Public","def":"Mass-market B2C exposure — dark-patterns, takedown, class-action surface."},{"name":"Enterprise-Private","def":"B2B SaaS to large organizations — SLA and wasted-expenditure exposure."},{"name":"Infrastructure","def":"Reliance on foundation-model APIs or critical infrastructure."},{"name":"Content&IP","def":"Generated media, training data, and ownership of output."},{"name":"Safety&Physical","def":"Physical-world action and bodily-safety exposure."}],"presets":[{"key":"customer-chatbot","label":"Customer chatbot","description":"Conversational AI answering customers or users.","underlying_function":"Companion / general conversational interface","likely_surfaces":"Consumer-public · Personal data","archetype":"CMP","surfaces":["Consumer-Public","PII"]},{"key":"ai-support-agent","label":"AI support agent","description":"AI that responds to tickets, handles customer support, or recommends actions.","underlying_function":"Doer / Companion","likely_surfaces":"Consumer-public · Enterprise-private · Personal data","archetype":"DOE","surfaces":["Consumer-Public","Enterprise-Private","PII"]},{"key":"hiring-screening-tool","label":"Hiring / screening tool","description":"AI that screens, ranks, scores, or recommends candidates or employees.","underlying_function":"Judge","likely_surfaces":"Employment · Personal data","archetype":"JDG","surfaces":["Employment","PII"]},{"key":"coding-copilot","label":"Coding copilot","description":"AI that generates, reviews, or assists with code.","underlying_function":"Creator","likely_surfaces":"Content & IP · Enterprise-private","archetype":"CRT","surfaces":["Content&IP","Enterprise-Private"]},{"key":"meeting-note-taker","label":"Meeting note-taker","description":"AI that records, transcribes, summarizes, or analyzes meetings.","underlying_function":"Translator / Reader","likely_surfaces":"Personal data · Sensitive/biometric-adjacent · Enterprise-private","archetype":"TRN","surfaces":["PII","Sensitive/Biometric","Enterprise-Private"]},{"key":"ai-sdr-outbound-agent","label":"AI SDR / outbound agent","description":"AI that sends, sequences, personalizes, or triggers sales/outbound actions.","underlying_function":"Doer / Orchestrator","likely_surfaces":"Personal data · Consumer-public · Enterprise-private","archetype":"DOE","surfaces":["PII","Consumer-Public","Enterprise-Private"]},{"key":"rag-knowledge-bot","label":"RAG knowledge bot","description":"AI that ingests documents and retrieves answers from a knowledge base.","underlying_function":"Reader","likely_surfaces":"Personal data · Infrastructure · Enterprise-private","archetype":"RDR","surfaces":["PII","Infrastructure","Enterprise-Private"]},{"key":"trading-payment-agent","label":"Trading / payment agent","description":"AI that acts on financial signals, payment flows, accounts, or transaction logic.","underlying_function":"Optimizer / Doer","likely_surfaces":"Financial · Infrastructure","archetype":"OPT","surfaces":["Financial","Infrastructure"]}],"diagnostic_format":"Mechanical trigger → Law (IN / US / EU) → Remediation","worked_example":{"title":"The Judge (HR screener)","triggers":["Employment","PII"],"law":{"in":"DPDP (employee data)","eu":"GDPR Art. 22 + AI Act Annex III (high-risk; 2 Dec 2027)","us":"Title VII / EEOC · NYC LL144 · IL HB3773 · TX TRAIGA"},"case":"Mobley v. Workday (ongoing)","remediation":"bias-audit + human-in-the-loop clause"},"title":"The Risk Map — classify the AI, then identify the legal surface.","intro":"The map works in two moves. First, classify what the AI does. Second, identify what legal surface it touches. The output is a triggered risk with authority and remediation.","move1_heading":"Move 1 — Classify what the AI does","move1_explanation":"The first question is functional, not promotional. Ignore the company’s marketing label. Ask what the AI actually does.","preset_instruction":"Select a common AI use case to light the underlying AI function.","move2_heading":"Move 2 — Identify what legal surface it touches","move2_explanation":"The same AI function can trigger different legal risks depending on what it touches: personal data, employment, IP, financial decisions, consumers, infrastructure, or physical safety.","output_heading":"Output — triggered risk → authority → remediation","output_explanation":"Once function and surface combine, the system can identify the legal risk, cite the authority, and route the remediation into the right instrument or workflow.","surface_instruction":"Click a lit surface to see why the risk is triggered.","surface_labels":{"PII":"Personal data","Sensitive/Biometric":"Sensitive / biometric","Financial":"Financial","Minors":"Minors","Employment":"Employment","Consumer-Public":"Consumer-public","Enterprise-Private":"Enterprise-private","Infrastructure":"Infrastructure","Content&IP":"Content & IP","Safety&Physical":"Safety / physical"}},"case_law":[{"name":"Moffatt v. Air Canada","line":"The chatbot speaks with the company's authority; no “separate tool” defence."},{"name":"Thaler v. Perlmutter","tag":"aff'd D.C. Cir. 2025","line":"No copyright for autonomous AI output; forces human-in-the-loop."},{"name":"Mobley v. Workday","tag":"ongoing","line":"AI hiring tools face disparate-impact liability."},{"name":"FTC v. Rite Aid","line":"Algorithmic disgorgement; a regulator can force the model destroyed."}],"connector1":"A taxonomy protects no one on its own. Once the risk can be classified, it must be routed into clauses, policies, playbooks, and review-ready instruments. That is Act II.","orientation_purpose":"The legal work comes first. The systems exist only to deliver it faster, more consistently, and in a reviewable form.","eyebrow":"ACT I · FOUNDATION","subline":"Before I built the tools, I built the legal source layer they would read from: AI physics, legal doctrine, defensive controls, and product/instrument routing.","what_this_proves":"This section shows how technical AI behavior becomes legal risk, how legal risk becomes a control, and how that control is routed into a document, workflow, or system.","first_fork":{"title":"First Fork — where does the AI risk live?","subtitle":"Before the taxonomy, the work splits by legal context. The question is not only what does the AI do? The first question is: is the company building AI for others, or using AI inside its own business?","lanes":[{"key":"lane-a","visible_label":"Build-side AI products","internal_label":"Lane A","who":"Companies building, selling, or exposing AI products to customers, users, APIs, or enterprise buyers.","focus_chips":["product/service classification","hallucination liability","agentic authority","customer data processing","output ownership","enterprise procurement","public-facing terms","downstream API/pass-through risk"],"routes":["ToS","DPA","Privacy Policy","AUP","SLA","Agentic Addendum","Product Playbook"],"explanation":"Lane A asks: if the AI product fails, misleads, processes data, generates output, or acts for a user, what legal architecture protects the company?"},{"key":"lane-b","visible_label":"Internal AI deployment","internal_label":"Lane B","who":"Companies using AI inside the business through employees, contractors, teams, departments, or operational workflows.","focus_chips":["shadow AI","employee tool use","client-data leakage","workplace privacy","AI-assisted work ownership","human review","internal governance","impact assessment"],"routes":["AI Use Handbook","IP Deed","HITL SOP","DPIA","Shadow AI Scanner","Workplace Playbook"],"explanation":"Lane B asks: if employees or teams use AI inside the business, how do we control data, authorship, confidentiality, reliance, and human review?"}],"transition":"Once the lane is clear, the analysis moves into the source layer: what the AI technically does, what legal doctrine that triggers, what defensive control responds, and where the fix must live."},"ai_bible":{"title":"The AI Bible — the source layer behind the taxonomy","intro":"The taxonomy starts from AI behavior, not document templates. The source layer asks four questions: what the system technically does, what legal doctrine that triggers, what control contains the risk, and which instrument or workflow carries the fix.","core_spine":["AI physics","legal doctrine","defensive control","product / instrument routing"],"columns":[{"title":"AI physics","text":"What the system technically does: generate, infer, remember, route, act, score, ingest, or automate."},{"title":"Legal doctrine","text":"The legal exposure triggered by that behavior: reliance, authority, privacy, authorship, consent, discrimination, deletion, or product/service classification."},{"title":"Defensive control","text":"The legal architecture that contains the risk: waiver, boundary, audit, consent gate, human review, cap, pass-through, or prohibition."},{"title":"Product / instrument routing","text":"Where the control lives: ToS, DPA, AUP, SLA, Agentic Addendum, Handbook, IP Deed, SOP, DPIA, Vault intake, diligence engine, or portal workflow."}],"rows":[{"title":"Probabilistic Output","lane":"Both","ai_physics":"Probabilistic output can be confidently wrong.","legal_doctrine":"Reliance, chatbot authority, warranty, misrepresentation, and customer-facing output risk.","defensive_control":"Hallucination waiver, output authority boundary, point-of-interaction warning, and human verification trigger.","routing":"ToS · AUP · diligence engine · product UI warning","why":"Generic AI may be wrong language is not enough. The control must sit where reliance happens and must define what the AI output is legally allowed to be."},{"title":"Agentic Action","lane":"Lane A","ai_physics":"Agentic systems can act, retry, spend, route, trigger workflows, or bind a process without a fresh human click.","legal_doctrine":"Electronic agent attribution, agency risk, authority, automated transaction risk, and operational liability.","defensive_control":"Spend caps, retry limits, loop thresholds, circuit breakers, approval gates, audit logs, and authority boundaries.","routing":"Agentic Addendum · ToS · governance log · Vault intake","why":"Once AI moves from answering to acting, the legal problem changes from wrong output to who is responsible for machine action?"},{"title":"AI Memory / Fine-Tuning","lane":"Both","ai_physics":"Fine-tuned or training-based memory is not cleanly deletable like a database row.","legal_doctrine":"Erasure rights, privacy compliance, model disgorgement, data retention, and subprocessor transparency.","defensive_control":"RAG-only mandate, deletion architecture, training prohibition, subprocessor disclosure, and data-use boundary.","routing":"DPA · Privacy Policy · Vault intake · DPIA","why":"If user data becomes part of model weights, deletion and downstream control become much harder. The legal architecture must be designed around the technical memory model."},{"title":"AI Output / Authorship","lane":"Both","ai_physics":"Autonomous AI output may not carry human authorship by default.","legal_doctrine":"Copyright ownership, assignment failure, authorship evidence, work-product control, and IP-chain risk.","defensive_control":"Human-in-the-loop authorship protocol, prompt/work-product assignment, contributor warranty, authorship evidence trail.","routing":"IP Deed · HITL SOP · ToS output terms · Workplace Handbook","why":"If the business cannot prove a human authorship chain, we own the output may be commercially weak even if the document says it."},{"title":"AI Scoring / Decisioning","lane":"Lane B","ai_physics":"AI systems can score, rank, screen, recommend, or influence access to opportunity.","legal_doctrine":"Bias, discrimination, automated decisioning, employment screening, high-risk decisioning, and explainability risk.","defensive_control":"Bias audit, human review, prohibited-use boundary, appeal/escalation route, and impact assessment.","routing":"DPIA · AUP · Handbook · HITL SOP · diligence engine","why":"The legal issue is not only the model’s output. It is whether the output affects a person’s opportunity, rights, employment, credit, access, or treatment."},{"title":"Consent / Online Terms","lane":"Lane A","ai_physics":"AI products often operate through fast online flows where terms, warnings, notices, and consents are buried or skipped.","legal_doctrine":"Clickwrap enforceability, assent, notice, consent validity, dark-pattern risk, and consumer protection.","defensive_control":"Affirmative consent UI, visible notice architecture, acceptance logs, renewal/cancellation clarity, and point-of-action warning.","routing":"ToS · Privacy Policy · UI mandate · product workflow · portal records","why":"A strong clause is useless if the user never validly assented to it. Legal architecture must reach the interface layer."}]},"taxonomy_bridge":{"title":"From source layer to working taxonomy","intro":"The AI Bible is the reasoning layer. The taxonomy turns that reasoning into units a diligence engine can read.","flow":["AI Bible source layer","98 threat units","10 AI functions + 10 legal surfaces","triggered risk","authority","remediation"],"scope_stat":"98 threat units · 10 AI functions · 10 legal surfaces · 3 jurisdiction bands","explanation":"Each threat unit is structured so the system can ask: what AI behavior is present, what legal surface is touched, what authority is relevant, what consequence follows, and what instrument should respond.","confidentiality_note":"The full source layer and applied-practice notes are not exposed here. The visible layer shows the reasoning architecture, selected examples, and the taxonomy logic."},"worked_examples":{"default":"Select a common AI use case above. The example below will show how the taxonomy turns an AI use case into a legal-risk route.","items":{"customer-chatbot":{"selected_use_case":"Customer chatbot","move1":"Companion — the AI speaks directly to users in a conversational interface.","move2":"Consumer-public + personal data.","output":"Reliance, misleading output, customer-facing disclosure, privacy, and consent risk.","authority":"chatbot authority / consumer notice / privacy consent principles","remediation":"Hallucination waiver, output authority boundary, point-of-interaction warning, privacy notice, and escalation path.","routes_into":"ToS · Privacy Policy · AUP · diligence engine"},"ai-support-agent":{"selected_use_case":"AI support agent","move1":"Doer / Companion — the AI answers customers and may recommend or trigger support actions.","move2":"Consumer-public + enterprise-private + personal data.","output":"Wrong support advice, escalation failure, data exposure, and automated action risk.","authority":"Chatbot authority and reliance principles · data protection notice/processing duties · electronic action risk where workflows are triggered","remediation":"Human escalation route, support-output disclaimer, authority boundary, processing disclosure, and action limits.","routes_into":"ToS · Privacy Policy · AUP · support workflow · portal records"},"hiring-screening-tool":{"selected_use_case":"Hiring / screening tool","move1":"Judge — the AI scores, ranks, screens, or recommends humans.","move2":"Employment + personal data.","output":"Bias, disparate impact, automated decisioning, explainability, and employment-data risk.","authority":"GDPR Art. 22 logic · EU AI Act high-risk employment logic · employment discrimination principles · workplace privacy principles","remediation":"Bias audit, human-in-the-loop review, use restriction, audit log, appeal/escalation path, and impact assessment.","routes_into":"DPIA · AUP · AI Use Handbook · HITL SOP"},"coding-copilot":{"selected_use_case":"Coding copilot","move1":"Creator — the AI generates or materially assists with code.","move2":"Content & IP + enterprise-private.","output":"Ownership uncertainty, open-source contamination, security reliance, and human authorship risk.","authority":"Thaler v. Perlmutter · IP ownership / assignment principles · software warranty and reliance risk","remediation":"HITL authorship protocol, output review, IP assignment boundary, open-source review, and prohibited reliance rule.","routes_into":"IP Deed · HITL SOP · ToS output terms · AUP"},"meeting-note-taker":{"selected_use_case":"Meeting note-taker","move1":"Translator / Reader — the AI records, transcribes, summarizes, or analyzes spoken content.","move2":"Personal data + sensitive/biometric-adjacent + enterprise-private.","output":"Recording consent, biometric/voice risk, confidential information leakage, and privacy disclosure risk.","authority":"privacy notice/consent principles / confidentiality and workplace privacy principles","remediation":"meeting consent notice, recording disclosure, retention limit, processing disclosure, and confidential-data handling rule.","routes_into":"Privacy Policy · DPA · AI Use Handbook · DPIA"},"ai-sdr-outbound-agent":{"selected_use_case":"AI SDR / outbound agent","move1":"Doer / Orchestrator — the AI personalizes, sequences, sends, routes, or triggers outbound actions.","move2":"Personal data + consumer-public + enterprise-private.","output":"automated outreach, consent, spam/dark-pattern, data processing, and action-authority risk.","authority":"consent and marketing law principles · electronic agent/action attribution principles · consumer protection principles","remediation":"audience limits, consent/opt-out routing, human approval for campaigns, authority boundary, and audit logs.","routes_into":"AUP · ToS · Privacy Policy · Agentic Addendum · outbound workflow"},"rag-knowledge-bot":{"selected_use_case":"RAG knowledge bot","move1":"Reader — the AI ingests, indexes, retrieves, and answers from documents or knowledge bases.","move2":"Personal data + infrastructure + enterprise-private.","output":"data ingestion, retention, retrieval leakage, source provenance, and deletion risk.","authority":"FTC v. Rite Aid logic · GDPR/DPDP deletion and processing principles · confidentiality and subprocessor transparency principles","remediation":"RAG-only mandate, source logging, access controls, deletion architecture, and subprocessor disclosure.","routes_into":"DPA · Privacy Policy · Vault intake · DPIA · security workflow"},"trading-payment-agent":{"selected_use_case":"Trading / payment agent","move1":"Optimizer / Doer — the AI manages or triggers financial decisions, payment flows, or transaction actions.","move2":"Financial + infrastructure.","output":"financial reliance, unauthorized transaction, automation error, and high-stakes decision risk.","authority":"electronic agent/action attribution principles · financial reliance and consumer protection principles · service classification risk","remediation":"transaction caps, human approval threshold, prohibited reliance warning, audit logs, and circuit breaker.","routes_into":"Agentic Addendum · ToS · AUP · governance log"}}},"source_rule_spine":{"title":"Authority Examples","intro":"The cases are not citations for decoration. Each source creates a rule that becomes a registry condition, drafting control, or workflow requirement.","rows":[{"source":"Moffatt v. Air Canada","rule":"Chatbot output can bind the company where users reasonably rely on it.","powers":"Output authority boundary · hallucination controls · customer-facing warning design"},{"source":"Thaler v. Perlmutter","rule":"Autonomous AI output may fail human authorship requirements.","powers":"HITL authorship protocol · IP assignment structure · work-product evidence trail"},{"source":"FTC v. Rite Aid","rule":"Regulators can require deletion or destruction of tainted algorithmic systems.","powers":"RAG-only mandate · deletion architecture · model-memory restrictions"},{"source":"Specht v. Netscape / Meyer v. Uber","rule":"Online terms must be visible, affirmative, and reasonably presented to bind users.","powers":"clickwrap design · consent logs · UI mandate · notice architecture"},{"source":"Vernor v. Autodesk","rule":"Contract structure can affect whether software access is treated as a license rather than ownership transfer.","powers":"service/access classification · license boundary · platform-use restrictions"},{"source":"Soteria v. IBM","rule":"Liability wording can preserve or exclude wasted expenditure and major commercial loss categories.","powers":"liability cap architecture · exclusion drafting · enterprise negotiation playbook"}]},"connector_visual":"Risk classified → control selected → instrument routed."},"act2":{"header":"The Legal Matrix — threat IDs converted into clauses, policies, playbooks, and review-ready instruments.","eyebrow":"ACT II · THE LEGAL MATRIX","subline":"Act I classified the risk. Act II shows how that risk becomes legal architecture: a threat ID, an authority, a defensive control, and the instrument that carries the fix.","core_visual_line":"Risk classified → control selected → instrument routed","explanation":"The registry is not a list of legal issues. It is a routing layer: each threat ID carries the risk, authority, control logic, and document destination.","guide_line":"Follow the route: matrix first, instrument map second, clause viewer third.","local_rail":[{"label":"Orientation","target":"act2-orientation"},{"label":"Threat Matrix","target":"act2-threat-matrix"},{"label":"Instrument Architecture","target":"instruments-layer"},{"label":"Living Document","target":"act2-living-document"},{"label":"Vault Router","target":"act2-vault-router"},{"label":"Act III Bridge","target":"act2-act3-bridge"}],"threat_matrix":{"title":"Threat Matrix — the registry behind the instruments","intro":"The threat matrix converts AI-law risk into structured rows: threat ID, lane, AI function, legal surface, authority, tier, and clause route.","proof_line":"98 threat units · 17 fields · Lane A / Lane B routing · IN / EU / US authority mapping","integrity_note":"If a jurisdiction is not mapped, the cell stays blank. The matrix does not invent fake IN/EU/US parallels just to look complete.","guide_text":"Filter the matrix or click a row to see how a threat becomes a document route.","columns":["Threat ID","Threat","Lane","AI function / surface","Authority","Clause / instrument route","Tier"],"rows":[{"id":"UNI_CNS_001","threat":"Browsewrap Invalidity","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Specht v. Netscape Communications Corp. (2d Cir. 2002)"},"clause":"TOS §1.1","tier":"T3"},{"id":"UNI_CNS_002","threat":"Cluttered Mobile Consent","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Meyer v. Uber Technologies, Inc. (2d Cir. 2017)"},"clause":"TOS §1.1","tier":"T3"},{"id":"UNI_CNS_003","threat":"Unconscionable Venue","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"Bragg v. Linden Research, Inc. (E.D. Pa. 2007)"},"clause":"TOS §14.3","tier":"T3"},{"id":"UNI_CNS_004","threat":"Dark Pattern Cancellation","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"FTC Act §5 / ROSCA (15 U.S.C. §8401 et seq.)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_005","threat":"Subscription Price Hike Consent","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"NY General Obligations Law §5-903 (as amended Dec 2025)"},"clause":"TOS §1.1","tier":   function buildLivingDoc(m){
    var ld=m.living_document, twrap=document.getElementById('ld-threats'), selectionChip=document.getElementById('ld-selection-chip');
    function triggerByLabel(label){ return (ld.triggers||[]).filter(function(t){return t.label===label;})[0]; }
    twrap.innerHTML=(ld.trigger_groups||[]).map(function(g){
      return '<div class="ld-group-title">'+esc(g.label)+'</div>'+g.triggers.map(function(label){
        var t=triggerByLabel(label)||{label:label};
        return '<button class="ld-btn" type="button" data-trigger-label="'+esc(t.label)+'"><div class="th">'+esc(t.label)+'</div><div class="cl">'+esc(t.lane||'')+' · '+esc(t.mapping_status||t.group||'')+'</div></button>';
      }).join('');
    }).join('');

    var theater=ensureLivingTheater();

    function mainRoute(t, key){
      return ((t.main_reveal_route||[]).filter(function(x){return x.indexOf(key+':')===0;})[0]||'').replace(key+':','').trim();
    }
    function frameTitle(t){
      var display=(t.main_document_display||[]).filter(function(x){return x.indexOf('Document frame title:')===0;})[0];
      return display ? display.replace('Document frame title:','').trim() : (mainRoute(t,'Main document') || t.label || ld.default_note);
    }
    function renderClause(text){
      return String(text||'').split(/\r?\n/).map(function(line){
        var raw=line, s=raw.trim();
        if(!s) return '<div class="doc-spacer" aria-hidden="true"></div>';
        if(/^[A-Z0-9 &;:/().,-]+$/.test(s) && /[A-Z]/.test(s)) return '<div class="doc-section-title">'+esc(s)+'</div>';
        if(/^\d+(\.\d+)*:/.test(s)) return '<div class="doc-clause-heading">'+esc(s)+'</div>';
        if(/^\([a-z]\)\s+/i.test(s)) return '<div class="doc-list-item">'+esc(s).replace(/^(\([a-z]\))\s+/i,'<span class="doc-leadin">$1</span> ')+'</div>';
        if(/^(i{1,3}|iv|v|vi{0,3}|ix|x)\.\s+/i.test(s)) return '<div class="doc-nested-item">'+esc(s).replace(/^((?:i{1,3}|iv|v|vi{0,3}|ix|x)\.)\s+/i,'<span class="doc-leadin">$1</span> ')+'</div>';
        var safe=esc(s).replace(/^([A-Z][A-Za-z /-]{2,48}\.)\s+/, '<span class="doc-leadin">$1</span> ');
        return '<p class="doc-para">'+safe+'</p>';
      }).join('');
    }
    function surroundingBlocks(t){
      var raw=t.raw_markdown||'', m=raw.match(/Surrounding document state:\s*\n\n```text\n([\s\S]*?)\n```/);
      if(!m) return [];
      var lines=m[1].split(/\r?\n/).map(function(x){return x.trim();}).filter(Boolean), blocks=[];
      for(var i=0;i<lines.length;i++){
        if(lines[i].charAt(0)!=='['){
          blocks.push({title:lines[i], state:(lines[i+1]&&lines[i+1].charAt(0)==='[')?lines[i+1]:''});
        }
      }
      return blocks;
    }
    function redacted(title){
      return '<div class="ld-redacted-section"><div class="doc-section-title">'+esc(title||'CONNECTED SECTION')+'</div><div class="ld-blur-line" style="width:92%"></div><div class="ld-blur-line" style="width:76%"></div><div class="ld-blur-line" style="width:64%"></div></div>';
    }
    function renderDocumentPage(t){
      var selectedHtml='<div class="ld-selected-clause" id="ld-selected-clause">'+renderClause(t.main_clause||'Clause manifest unavailable in fallback mode.')+'</div>';
      var blocks=surroundingBlocks(t);
      if(!blocks.length) return redacted('PRECEDING ROUTE CONTEXT')+selectedHtml+redacted('FOLLOWING ROUTE CONTEXT');
      var selectedSeen=false;
      return blocks.map(function(b){
        var isSelected=/FULL|REVEALED/.test(b.state) && !/connected mini-doc|partially visible/i.test(b.state);
        if(isSelected && !selectedSeen){ selectedSeen=true; return selectedHtml; }
        return redacted(b.title);
      }).join('')+(selectedSeen?'':selectedHtml);
    }
    function miniExcerpt(text){
      return String(text||'').split(/\r?\n/).map(function(x){return x.trim();}).filter(Boolean).slice(0,5).map(esc).join('<br>');

      }).join('');
    }
    function renderAnnotations(items){
      document.getElementById('ld-theater-callouts').innerHTML=(items||[]).slice(0,5).map(function(a){
        return '<aside class="ld-callout"><div class="lab">'+esc(a.label)+'</div><p>'+esc(a.text)+'</p></aside>';

    function ensureLivingTheater(){
      var existing=document.getElementById('ld-theater');
      if(existing) return existing;
      var node=el('<div class="ld-theater" id="ld-theater" aria-hidden="true">'
        +'<div class="ld-theater-backdrop" data-ld-theater-close></div>'
        +'<div class="ld-theater-panel" role="dialog" aria-modal="true" aria-labelledby="ld-theater-title" tabindex="-1">'
          +'<button class="ld-theater-close" type="button" data-ld-theater-close>Close</button>'
          +'<aside class="ld-theater-meta">'
            +'<div class="ld-theater-kicker" id="ld-theater-kicker"></div>'
            +'<h3 id="ld-theater-title"></h3>'
            +'<div class="ld-theater-route" id="ld-theater-route"></div>'
            +'<div class="ld-theater-badges" id="ld-theater-badges"></div>'
          +'</aside>'
          +'<main class="ld-theater-main" id="ld-theater-main" tabindex="0">'
            +'<div class="ld-document-page ld-document-page-modal">'
              +'<div class="ld-doc-watermark">SAMPLE / REVIEW-READY STRUCTURE</div>'
              +'<div class="ld-doc-title" id="ld-theater-doc-title"></div>'
              +'<div class="ld-theater-doc-body" id="ld-theater-document-body"></div>'
            +'</div>'
          +'</main>'
          +'<aside class="ld-theater-side">'
            +'<section class="ld-mini-doc-panel"><div class="ld-side-title">Connected documents</div><div id="ld-theater-mini-docs"></div></section>'
            +'<section class="ld-callout-panel"><div class="ld-side-title">Clause logic</div><div id="ld-theater-callouts"></div></section>'
          +'</aside>'
        +'</div>'
      +'</div>');
      document.body.appendChild(node);
      node.addEventListener('click', function(e){ if(e.target && e.target.hasAttribute('data-ld-theater-close')) closeLivingTheater(); });
      window.addEventListener('keydown', function(e){
        if(!node.classList.contains('open')) return;
        if(e.key==='Escape'){ closeLivingTheater(); return; }
        var target=currentLivingScrollTarget();
        if(!target) return;
        var step=Math.max(80, Math.floor(target.clientHeight*.85));
        if(e.key==='PageDown'){ target.scrollTop+=step; e.preventDefault(); }
        else if(e.key==='PageUp'){ target.scrollTop-=step; e.preventDefault(); }
        else if(e.key==='ArrowDown'){ target.scrollTop+=48; e.preventDefault(); }
        else if(e.key==='ArrowUp'){ target.scrollTop-=48; e.preventDefault(); }
        else if(e.key==='Home'){ target.scrollTop=0; e.preventDefault(); }
        else if(e.key==='End'){ target.scrollTop=target.scrollHeight; e.preventDefault(); }
      });
      return node;
    }
    function currentLivingScrollTarget(){
      var main=document.getElementById('ld-theater-main');

    function selectLivingTrigger(t){
      if(!t) return;
      document.querySelectorAll('[data-trigger-label]').forEach(function(n){n.classList.toggle('active', n.getAttribute('data-trigger-label')===t.label);});
      if(selectionChip){ selectionChip.textContent='Selected: '+(t.label||'Trigger')+' - opened in viewer'; selectionChip.classList.add('show'); }
      var badges=[];

      if(t.display&&t.display.badge) badges.push(t.display.badge);
      if(t.display&&t.display.conspicuous_box) badges.push('conspicuous box');
      renderTheaterMeta(t, badges);

    }

    document.querySelectorAll('[data-trigger-label]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var t=triggerByLabel(btn.getAttribute('data-trigger-label'))||{};
        selectLivingTrigger(t);
      });
    });
  }

          +'<p class="eyebrow">ACT III · RUNTIME WORKFLOW</p>'
          +'<h2 class="font-display section-title text-white mt-2">How the diligence architecture runs as a public review system.</h2>'
          +'<p class="act3-copy mt-3" style="max-width:58rem">The architecture now connects to an operating system. A user enters a URL or supplies materials; the system captures evidence, builds factual profiles, applies the active vertical registry, renders a bounded diligence report, routes uncertainty into qualified review, and prepares the matter for assembly handoff.</p>'
          +'<p class="font-display italic gold mt-4" style="font-size:1.28rem;line-height:1.3">The law came first. The runtime exists to make the legal work structured, traceable, and review-ready.</p>'
          +flow(['Diligence architecture','Public source intake','Profile stack','Active registry application','Legal exposure report','Qualified review','Assembly handoff'])
          +'<div class="mt-5"><a class="btn" href="'+esc(liveUrl)+'" target="_blank" rel="noopener">Open the live diligence system</a></div>'
        +'</div>'

        +'<div id="act3-runtime-spine" class="reveal mt-8">'
          +'<p class="eyebrow mb-1">Runtime spine</p>'
          +'<p class="act3-copy" style="max-width:56rem">This is the Act II diligence architecture expressed as a running workflow.</p>'
          +'<div class="act3-runtime-spine">'+spine.map(function(s,i){ return '<button class="act3-runtime-step" type="button" data-act3-runtime-step="'+i+'"><span class="num">'+(i+1)+'</span><strong>'+esc(s.title)+'</strong><p>'+esc(s.short)+'</p></button>'; }).join('')+'</div>'
        +'</div>'

        +'<div id="act3-interface-diligence-engine" class="reveal mt-8 act3-runtime-system">'
          +'<div>'
            +'<p class="eyebrow mb-1">Interface Diligence Engine</p>'
            +'<h3 class="font-display text-white" style="font-size:2rem;line-height:1.05;margin:.35rem 0">The live system that runs the architecture.</h3>'
            +'<p class="act3-copy" style="max-width:58rem">The public system is the proof-of-work layer. It is not a legal advice product. It is a review-bounded diligence workflow that turns public evidence and legal materials into a structured report and review path.</p>'
            +'<div class="act3-runtime-system">'+runtimeBlocks.map(function(b){ return card(b.title,b.body); }).join('')+'</div>'
          +'</div>'
          +'<aside class="act3-runtime-cta-card">'
            +'<p class="act3-kicker">Live operating system</p>'
            +'<h3>Interface Diligence Engine</h3>'
            +'<p>Open the public diligence workflow and see the runtime layer directly: URL intake, evidence capture, report generation, qualified review, and assembly handoff.</p>'
            +'<div class="mt-4"><a class="btn" href="'+esc(liveUrl)+'" target="_blank" rel="noopener">Open live system</a></div>'
            +'<p class="text-xs mt-3" style="color:rgba(229,229,229,.48);line-height:1.5">Public-safe surface. No private prompts, credentials, client data, or private registry corpus are exposed.</p>'
          +'</aside>'
        +'</div>'

        +'<div id="act3-qualified-review" class="reveal mt-8">'
          +'<p class="eyebrow mb-1">Qualified Review</p>'
          +'<p class="act3-copy" style="max-width:58rem">The reviewer does not click through a decorative form. The review workspace exists to confirm, correct, or supplement what the diligence system could not verify from public materials. That is the human gate before downstream drafting, document routing, and local counsel review.</p>'
          +flow(['Prefilled public findings','Reviewer correction','Missing-proof answers','Locked review inputs','Assembly handoff'])
        +'</div>'

        +'<div id="act3-control-strip" class="reveal mt-8">'
          +'<p class="eyebrow mb-1">Review controls built in</p>'
          +'<p class="act3-copy" style="max-width:56rem">The control layer is shown here as a boundary strip, not a separate prompt-engineering product.</p>'
          +'<div class="act3-runtime-control-grid">'+controls.map(function(c,i){ return '<button class="act3-runtime-control" type="button" data-act3-control="'+i+'"><strong>'+esc(c.title)+'</strong><p>'+esc(c.body)+'</p></button>'; }).join('')+'</div>'
          +'<div class="act3-runtime-proofline">The system does not ask an AI model to give legal advice. It runs a bounded diligence workflow: public evidence is captured, factual profiles are built, the active registry is applied, uncertainty is routed into qualified review, and the final output remains review-ready rather than legally conclusive.</div>'
        +'</div>'

        +'<div id="act3-assembly-handoff" class="act3-close-bridge reveal mt-8">'
          +'<h3>Runtime becomes review-ready handoff.</h3>'
          +'<p class="act3-copy mt-2">Once the report and review inputs are locked, the matter can move into document, clause, control, evidence, and local-counsel review routes without losing the legal source path.</p>'
          +'<div class="act3-proof-chain mt-4"><span>public evidence</span><span>profiles</span><span>registry application</span><span>qualified review</span><span>assembly handoff</span></div>'
          +'<p class="font-display italic gold mt-4" style="font-size:1.22rem;line-height:1.35">That is the through-line: legal method, converted into architecture, then run through a review-bound workflow.</p>'
          +'<a class="btn sm sec mt-3" href="#capstone">Continue to Capstone</a>'
        +'</div>'
      +'</div></section>'
    ));

    document.querySelectorAll('[data-act3-runtime-step]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx=parseInt(btn.getAttribute('data-act3-runtime-step'),10);
        var s=spine[idx] || spine[0];
        openModal('<p class="act3-kicker">Runtime spine</p><h3>'+esc(s.title)+'</h3><div class="beat"><div class="lab">What it does</div><p>'+esc(s.detail)+'</p></div>');
      });
    });
    document.querySelectorAll('[data-act3-control]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx=parseInt(btn.getAttribute('data-act3-control'),10);
        var c=controls[idx] || controls[0];
        openModal('<p class="act3-kicker">Review control</p><h3>'+esc(c.title)+'</h3><div class="beat"><div class="lab">Control logic</div><p>'+esc(c.detail)+'</p></div>');
      });
    });
  })();

  // ---------- CAPSTONE ----------
  (function(){
    var principles = [
      {title:'Lawyer first', body:'The work is not a shift from law into coding. The legal method stays at the center.'},
      {title:'Technology as instrument', body:'Code, AI systems, and automation are used only where they make legal work more structured, traceable, and review-ready.'},
      {title:'Review-bound output', body:'The end point is not an autonomous legal conclusion. It is work prepared for human legal judgment.'}
    ];
    function capstoneFlow(items){
      return '<div class="act3-runtime-flow">'+items.map(function(x,i){ return (i?'<b>→</b>':'')+'<span>'+esc(x)+'</span>'; }).join('')+'</div>';
    }
    function principleCard(p){
      return '<div class="act3-runtime-panel"><div class="k">'+esc(p.title)+'</div><p>'+esc(p.body)+'</p></div>';
    }
    main.appendChild(el(
      '<section id="capstone" class="act" data-rail="4">'
      +'<div class="card-shell">'
        +'<div class="reveal">'
          +'<p class="eyebrow">CAPSTONE</p>'
          +'<h2 class="font-display section-title text-white mt-2">One legal method, expressed through technology.</h2>'
          +'<p class="act3-copy mt-3" style="max-width:58rem">The work across this portfolio is not a shift from law into coding. It is the same legal method applied through better tools: understand the product, classify the activity, identify the legal surface, map the authority, preserve the evidence path, and route the issue into human legal judgment.</p>'
          +capstoneFlow(['Doctrine became taxonomy','Taxonomy became diligence architecture','Diligence architecture became a review-bound runtime'])
        +'</div>'
        +'<div class="reveal mt-6 act3-runtime-system">'+principles.map(principleCard).join('')+'</div>'
        +'<div class="reveal capstone-closing-line">The through-line is lawyer first: technology is the instrument, not the identity.</div>'
      +'</div></section>'
    ));
  })();

  // ---------- CLOSE ----------
  (function(){
    var c=C.close || {};
    var contact=c.contact || {};
    var body = 'I am a Technology & Data Protection Lawyer with a litigation foundation and hands-on technical fluency. I work at the intersection of law and technology without treating law as a software problem. The legal judgment remains the center: understanding how products work, where legal exposure arises, what evidence supports the review, what documents or controls need attention, and where qualified human review must take over.';
    var fit = 'I am looking to work with teams handling AI governance, privacy, commercial contracts, product counseling, and cross-border technology risk — where legal analysis has to understand the product reality.';
    var proof = 'The systems I built are not the point. They are proof of how I think: structured, evidence-aware, review-bound, and practical.';
    var safety = 'All demos use public, synthetic, or scrubbed data. No client data, credentials, private prompt stack, or private registry corpus is exposed.';
    var genuine = 'All work shown is mine.';
    function ico(kind){
      if(kind==='in') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5A2.5 2.5 0 1 0 5 8.5a2.5 2.5 0 0 0 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V21H17.6v-5.4c0-1.3 0-2.95-1.8-2.95s-2.08 1.4-2.08 2.85V21H9z"/></svg>';
      if(kind==='mail') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>';
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>';
    }
    main.appendChild(el(
    '<section id="contact" class="act" data-rail="5"><span id="close-fit" class="anchor-point" aria-hidden="true"></span>'
    +'<div class="card-shell">'
      +'<div class="reveal"><p class="eyebrow">TERMINAL</p><h2 class="font-display section-title text-white mt-2">The fit</h2></div>'
      +'<div class="reveal terminal-card mt-6"><p class="body">'+esc(body)+'</p>'
        +'<p class="terminal-fit-line">'+esc(fit)+'</p>'
        +'<p class="body" style="font-size:.92rem;color:rgba(229,229,229,.72)">'+esc(proof)+'</p>'
        +'<div><p class="terminal-safety">'+esc(safety)+'</p><p class="terminal-genuine mt-3">'+esc(genuine)+'</p></div></div>'
      +'<div class="reveal mt-5 contact-row">'
        +'<a class="contact-ico" href="'+esc(contact.linkedin || '#')+'" target="_blank" rel="noopener">'+ico('in')+'LinkedIn</a>'
        +'<a class="contact-ico" href="mailto:'+esc(contact.email || '')+'">'+ico('mail')+esc(contact.email || '')+'</a>'
        +'<a class="contact-ico" href="tel:'+esc(contact.phone || '')+'">'+ico('ph')+esc(contact.phone || '')+'</a></div>'
    +'</div></section>'));
  })();

  // ---------- RAIL ----------
  (function(){
    var rail=document.getElementById('rail');
    var railData=C.rail || {nodes:[], chip:{}};
    var fallbackTargets=[
      'hero-thesis',
      'doctrine-layer',
      'taxonomy-map',
      'act2-threat-matrix',
      'act2-living-document',
      'project-walkthrough',
      'sandbox-os',
      'prompt-agent-proof',
      'workflow-automation-proof',
      'capstone',
      'contact'
    ];
    var fallbackWhy=[
      'Establishes the claim: lawyer first, systems second.',
      'Shows the legal source layer: how AI mechanics create legal consequences.',
      'Shows how AI use cases become legal risk categories.',
      'Shows the registry that converts AI legal risk into traceable threat units.',
      'Shows how mapped risks become clauses, policies, addenda, and playbooks.',
      'Shows the full-power system run in project/model environments.',
      'Shows the public-safe sandbox where the delivery loop can be tested with synthetic data.',
      'Shows controlled prompt-agent workflows for legal intelligence and reviewable output.',
      'Shows that the same controlled workflow logic can be applied outside law.',
      'Synthesizes the portfolio into one legal method across jurisdictions and systems.',
      'Converts the proof into the hiring argument.'
    ];
    var html='';
    (railData.nodes || []).forEach(function(n,i){
      var label=n.label || n.node || ('Step '+(i+1));
      var target=n.target || fallbackTargets[i] || 'hero';
      var why=n.why || fallbackWhy[i] || n.sub || label;
      if(n.kind==='start'||n.kind==='terminal'){
        html+='<a class="rail-stage" href="#'+esc(target)+'" data-node="'+i+'" data-target="'+esc(target)+'"><div class="rail-dot endpoint"></div><div><div class="rail-node">'+esc(label)+'</div><div class="rail-sub">'+esc(n.sub)+'</div><div class="rail-why">'+esc(why)+'</div></div></a>';
      } else {
        // band header only when band changes
        var prev=railData.nodes[i-1];
        if(!prev||prev.band!==n.band){ html+='<div class="rail-band">'+esc(n.band)+'<span class="tag">'+esc(n.band_tag)+'</span></div>'; }
        html+='<a class="rail-stage" href="#'+esc(target)+'" data-node="'+i+'" data-target="'+esc(target)+'"><div class="rail-dot"></div><div><div class="rail-node">'+esc(label)+'</div><div class="rail-sub">'+esc(n.sub)+'</div><div class="rail-why">'+esc(why)+'</div></div></a>';
      }
    });
    html+='<div class="rail-chip" id="rail-chip"><span class="pulse"></span><span id="rail-chip-text">'+esc((railData.chip||{}).derived || 'law → method')+'</span></div>';
    rail.innerHTML=html;
  })();

  // ---------- SCROLL / SPY / REVEAL ----------
  (function(){
    var progress=document.getElementById('progress');
    var railStages=Array.prototype.slice.call(document.querySelectorAll('.rail-stage'));
    var railData=C.rail || {nodes:[], chip:{}};
    var mfunnel=document.getElementById('mfunnel');
    var mfLbl=document.getElementById('mfunnel-lbl');
    var mfCount=(railData.nodes || []).length || railStages.length || 1;
    if(mfunnel && mfLbl){
      Array.prototype.slice.call(mfunnel.querySelectorAll('.seg')).forEach(function(s){ s.parentNode.removeChild(s); });
      for(var ms=0; ms<mfCount; ms++){
        var seg=document.createElement('span');
        seg.className='seg';
        seg.setAttribute('data-ms', ms);
        mfunnel.insertBefore(seg, mfLbl);
      }
    }
    var mfSegs=Array.prototype.slice.call(document.querySelectorAll('.mobile-funnel .seg'));
    var chipText=document.getElementById('rail-chip-text');
    var navLinks=Array.prototype.slice.call(document.querySelectorAll('.nav-link[href^="#"]'));
    var navMap={hero:'#foundation',foundation:'#foundation',matrix:'#matrix','delivery-system':'#delivery-system',funnel:'#delivery-system',capstone:'#capstone',contact:'#contact'};
    var railTargets=railStages.map(function(st){ return document.getElementById(st.getAttribute('data-target')); });
    var railLabels=railStages.map(function(st){
      var node=(railData.nodes || [])[parseInt(st.getAttribute('data-node'),10)] || {};
      return node.label || node.node || 'Start';
    });
    var activeRail=-1, explainTimer=null;

    var reveals=document.querySelectorAll('.reveal');
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.12});
      reveals.forEach(function(n){io.observe(n);});
    } else {
      reveals.forEach(function(n){n.classList.add('visible');});
    }

    function showRailWhy(idx){
      if(idx<0 || !railStages[idx]) return;
      if(explainTimer) window.clearTimeout(explainTimer);
      railStages.forEach(function(st){ st.classList.remove('explain'); });
      railStages[idx].classList.add('explain');
      explainTimer=window.setTimeout(function(){ railStages[idx].classList.remove('explain'); }, 5200);
    }
    railStages.forEach(function(st,idx){
      st.addEventListener('mouseenter', function(){ showRailWhy(idx); });
      st.addEventListener('focus', function(){ showRailWhy(idx); });
      st.addEventListener('click', function(){ showRailWhy(idx); });
    });

    function scrollToAnchor(hash){
      var id=decodeURIComponent(String(hash || '').replace(/^#/, ''));
      if(!id) return false;
      var node=document.getElementById(id);
      if(!node) return false;
      node.scrollIntoView({behavior:'smooth', block:'start'});
      window.setTimeout(update, 450);
      return true;
    }
    document.addEventListener('click', function(e){
      var a=e.target.closest ? e.target.closest('a[href^="#"]') : null;
      if(!a) return;
      var href=a.getAttribute('href');
      if(!href || href==='#') return;
      if(scrollToAnchor(href)){
        e.preventDefault();
        if(location.hash!==href) history.pushState(null, '', href);
      }
    });
    window.addEventListener('hashchange', function(){ scrollToAnchor(location.hash); });

    function update(){
      var max=document.documentElement.scrollHeight-window.innerHeight;
      progress.style.width=(max>0?(window.scrollY/max*100):0)+'%';
      var cur=0, curId='hero', off=window.innerHeight*.42;
      railTargets.forEach(function(target,idx){
        if(target && target.getBoundingClientRect().top-off<=0){
          cur=idx;
          curId=target.closest('section') ? target.closest('section').id : target.id;
        }
      });
      railStages.forEach(function(st,idx){
        st.classList.toggle('completed', idx<cur);
        st.classList.toggle('active', idx===cur);
      });
      if(cur!==activeRail){
        activeRail=cur;
        showRailWhy(cur);
      }
      mfSegs.forEach(function(s,idx){ s.classList.toggle('active', idx<=cur); });
      mfLbl.textContent=railLabels[cur]||'Start';
      var chip=railData.chip || {};
      chipText.textContent = cur>=5 ? (chip.running || 'instruments → delivery system') : cur>=3 ? (chip.structured || 'risks → instruments') : (chip.derived || 'law → method');
      var target=navMap[curId]||'#foundation';
      navLinks.forEach(function(l){ l.classList.toggle('active', l.getAttribute('href')===target); });
    }
    window.addEventListener('scroll', update, {passive:true});
    window.addEventListener('resize', update);
    update();
    if(location.hash) window.setTimeout(function(){ scrollToAnchor(location.hash); }, 100);
  })();

  }
  if(window.fetch){
    fetch('content.json', {cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : embeddedContent; })
      .then(function(fresh){
        return fetch('data/act2-manifest.json', {cache:'no-store'})
          .then(function(r){ return r.ok ? r.json() : null; })
          .catch(function(){ return null; })
          .then(function(act2){ boot(fresh || embeddedContent, act2); });
      })
      .catch(function(){
        fetch('data/act2-manifest.json', {cache:'no-store'})
          .then(function(r){ return r.ok ? r.json() : null; })
          .catch(function(){ return null; })
          .then(function(act2){ boot(embeddedContent, act2); });
      });
  } else {
    boot(embeddedContent, null);
  }
})();
</script>
</body>
</html>
