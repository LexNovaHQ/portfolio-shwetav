<style>

}
*{box-sizing:border-box;}
html{scroll-behavior:smooth; background:var(--void);}
body{margin:0;
  background:
    radial-gradient(circle at 15% 5%, rgba(197,160,89,.11), transparent 28rem),
    radial-gradient(circle at 80% 18%, rgba(255,255,255,.045), transparent 24rem),
    linear-gradient(180deg,#050505 0%,#070707 42%,#030303 100%);
  color:var(--marble); font-family:"Inter",system-ui,sans-serif; overflow-x:hidden;}
body::before{content:""; position:fixed; inset:0; pointer-events:none; opacity:.09; z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
  mix-blend-mode:screen;}
.font-display{font-family:"Cormorant Garamond",Georgia,serif;}
.tracked{letter-spacing:.2em; text-transform:uppercase;}
.gold{color:var(--gold);}
.surface{background:linear-gradient(180deg,rgba(12,12,12,.96),rgba(8,8,8,.96)); border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.03);}
.hairline{height:1px; background:linear-gradient(90deg,transparent,rgba(197,160,89,.55),rgba(255,255,255,.07),transparent);}
.progress-line{position:fixed; top:0; left:0; height:2px; width:0%; z-index:80;
  background:linear-gradient(90deg,var(--gold),rgba(197,160,89,.25)); box-shadow:0 0 16px rgba(197,160,89,.6);}
.topnav{position:sticky; top:0; z-index:70; background:rgba(5,5,5,.78); backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(197,160,89,.15);}
.wordmark{display:flex; flex-direction:column; line-height:1.05; text-decoration:none;}
.wordmark-title{font-family:"Cormorant Garamond",Georgia,serif; color:var(--gold); font-size:1.15rem; letter-spacing:.06em;}
.wordmark-subtitle{margin-top:.12rem; color:rgba(229,229,229,.48); font-size:.55rem; letter-spacing:.12em; text-transform:uppercase; font-family:"Inter",system-ui,sans-serif;}
@media(max-width:760px){.wordmark-subtitle{display:none;}}
.nav-link{color:rgba(229,229,229,.66); transition:color .25s,border-color .25s; border-bottom:1px solid transparent;}
.nav-link.active,.nav-link:hover,.nav-link:focus{color:var(--gold); border-color:rgba(197,160,89,.65); outline:none;}
.page-shell{position:relative; z-index:2;}
.main-grid{display:grid; grid-template-columns:minmax(0,1fr);}
@media(min-width:1024px){.main-grid{grid-template-columns:170px minmax(0,1fr); gap:1.25rem;}}

/* ---- RAIL (live argument map) ---- */
.rail-wrap{display:none;}
@media(min-width:1024px){
  .rail-wrap{display:block; position:sticky; top:86px; align-self:start; height:auto; max-height:none; overflow:visible;}
  .rail{position:relative; padding:.5rem .25rem 2rem;}
  .rail::before{content:""; position:absolute; left:21px; top:26px; bottom:40px; width:1px;
    background:linear-gradient(180deg,rgba(197,160,89,.25),rgba(255,255,255,.08),rgba(197,160,89,.25));}
  .rail-band{font-size:.56rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(197,160,89,.7);
    font-weight:800; margin:.85rem 0 .26rem 2.7rem;}
  .rail-band .tag{display:block; color:rgba(229,229,229,.38); font-weight:600; letter-spacing:.12em; margin-top:1px;}
  .rail-stage{position:relative; display:grid; grid-template-columns:44px 1fr; gap:.55rem; align-items:start; min-height:46px;
    border-radius:.85rem; padding:.12rem .2rem; text-decoration:none; cursor:pointer;}
  .rail-stage:hover,.rail-stage:focus{background:rgba(197,160,89,.06); outline:none;}
  .rail-dot{width:14px; height:14px; margin-left:14px; margin-top:2px; border-radius:999px; background:#080808;
    border:1px solid rgba(197,160,89,.45); box-shadow:0 0 0 5px rgba(5,5,5,.98); transition:all .3s;}
  .rail-dot.endpoint{transform:rotate(45deg); border-radius:3px;}
  .rail-stage.completed .rail-dot{background:rgba(197,160,89,.45); border-color:rgba(197,160,89,.75);}
  .rail-stage.active .rail-dot{background:var(--gold); border-color:var(--gold); box-shadow:0 0 0 5px #050505,0 0 22px rgba(197,160,89,.9);}
  .rail-stage.completed .rail-node{color:rgba(229,229,229,.72);}
  .rail-stage.active .rail-node{color:var(--gold);}
  .rail-node{font-size:.69rem; letter-spacing:.14em; text-transform:uppercase; color:rgba(229,229,229,.5); font-weight:700;}
  .rail-sub{font-size:.63rem; color:rgba(229,229,229,.4); margin-top:.12rem; line-height:1.25;}
  .rail-why{display:none; margin-top:.5rem; padding:.55rem .65rem; border:1px solid rgba(197,160,89,.24);
    border-radius:.75rem; background:rgba(197,160,89,.07); color:rgba(229,229,229,.72); font-size:.68rem; line-height:1.45;}
  .rail-stage.explain .rail-why{display:block;}
  .rail-chip{display:inline-flex; align-items:center; gap:.4rem; margin:1rem 0 0 2.7rem; padding:.35rem .6rem;
    border:1px solid rgba(197,160,89,.35); background:rgba(197,160,89,.06); color:var(--gold);
    font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; border-radius:999px;}
  .rail-chip .pulse{width:6px; height:6px; border-radius:999px; background:var(--gold); box-shadow:0 0 8px var(--gold);}
}
.mobile-funnel{position:sticky; top:56px; z-index:60; display:flex; gap:.35rem; align-items:center; padding:.55rem 1rem;

.mobile-funnel .seg.active{background:var(--gold); box-shadow:0 0 12px rgba(197,160,89,.55);}
.mobile-funnel .lbl{font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); white-space:nowrap; margin-left:.4rem;}
@media(min-width:1024px){.mobile-funnel{display:none;}}

section{scroll-margin-top:110px;}
.act{padding:2.4rem 0;}
@media(min-width:768px){.act{padding:3.2rem 0;}}
.card-shell{background:linear-gradient(180deg,rgba(12,12,12,.96),rgba(7,7,7,.96)); border:1px solid var(--border);

  padding:1.35rem; overflow:hidden; position:relative;}

.load-in{animation:loadIn .85s ease both;}
.d1{animation-delay:.1s}.d2{animation-delay:.22s}.d3{animation-delay:.34s}.d4{animation-delay:.46s}.d5{animation-delay:.58s}

.btn{display:inline-flex; align-items:center; justify-content:center; gap:.5rem; min-height:44px; padding:.8rem 1.05rem;
  border-radius:999px; border:1px solid rgba(197,160,89,.48); color:var(--gold); background:rgba(197,160,89,.06);
  font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; font-weight:700; transition:all .25s; cursor:pointer;}
.btn:hover,.btn:focus{background:rgba(197,160,89,.14); transform:translateY(-1px); outline:none; box-shadow:0 0 0 3px rgba(197,160,89,.12);}
.btn.sec{border-color:rgba(229,229,229,.18); color:var(--marble); background:rgba(255,255,255,.025);}
.btn.sm{min-height:34px; padding:.45rem .8rem; font-size:.64rem;}
.quiet-link{display:inline-flex; align-items:center; min-height:44px; color:rgba(229,229,229,.68); font-size:.74rem;

.hero-grid{display:grid; gap:2rem; align-items:start;}

.hero-formation{display:flex; flex-wrap:wrap; gap:.42rem; align-items:center; margin-top:1rem; color:rgba(229,229,229,.74); font-size:.68rem; letter-spacing:.08em; text-transform:uppercase;}
.hero-formation span{display:inline-flex; align-items:center;}
.hero-formation span+span::before{content:""; width:18px; height:1px; margin:0 .42rem 0 0; background:rgba(197,160,89,.58);}
.proof-architecture-grid{display:grid; gap:1.1rem; align-items:start;}
@media(min-width:920px){.proof-architecture-grid{grid-template-columns:minmax(0,1fr) 320px;}}
.proof-architecture-copy{display:grid; gap:.85rem; color:rgba(229,229,229,.74); line-height:1.68; font-size:.9rem;}
.proof-architecture-copy p{margin:0;}
.method-chain-panel{border-left:1px solid rgba(197,160,89,.45); padding-left:1rem;}
.method-chain-instruction{color:rgba(229,229,229,.58); font-size:.76rem; line-height:1.55; margin:.45rem 0 .9rem;}
.method-chain{display:grid; gap:.55rem;}
.method-chain button{position:relative; width:100%; text-align:left; border:1px solid rgba(229,229,229,.11); border-radius:.75rem; padding:.62rem .78rem .62rem 1rem; background:rgba(255,255,255,.018); color:rgba(229,229,229,.84); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; font-weight:800; transition:all .2s; cursor:pointer;}
.method-chain button::before{content:""; position:absolute; left:-1.28rem; top:50%; width:9px; height:9px; border-radius:999px; border:1px solid rgba(197,160,89,.72); background:#090909; transform:translateY(-50%); box-shadow:0 0 0 4px #090909;}
.method-chain button:hover,.method-chain button:focus{outline:none; color:var(--gold); border-color:rgba(197,160,89,.7); background:rgba(197,160,89,.09);}
.method-chain button:hover::before,.method-chain button:focus::before{background:var(--gold); box-shadow:0 0 0 4px #090909,0 0 16px rgba(197,160,89,.72);}
.proof-panel{height:100%; border:1px solid rgba(197,160,89,.26); background:linear-gradient(180deg,rgba(197,160,89,.07),rgba(255,255,255,.018));
  border-radius:1.25rem; padding:1.15rem; box-shadow:inset 0 1px 0 rgba(255,255,255,.03);}
.proof-chain{position:relative; display:grid; grid-template-columns:1fr; gap:.62rem; margin-top:1rem; padding-left:.75rem;}
.chain-node{position:relative; display:block; width:100%; text-align:left; border:1px solid rgba(229,229,229,.11);
  border-radius:.75rem; padding:.54rem .72rem .54rem .95rem; background:rgba(255,255,255,.018); color:rgba(229,229,229,.82);
  font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; font-weight:800; transition:all .22s; cursor:pointer;}
.chain-node::before{content:""; position:absolute; left:-.53rem; top:-.62rem; bottom:50%; width:1px; background:rgba(197,160,89,.38);}
.chain-node::after{content:""; position:absolute; left:-.78rem; top:calc(50% - 4px); width:8px; height:8px; border-radius:999px;
  border:1px solid rgba(197,160,89,.7); background:#090909; box-shadow:0 0 0 4px #090909;}
.chain-node:first-child::before{display:none;}
.chain-node:hover,.chain-node:focus,.chain-node.active{border-color:rgba(197,160,89,.7); color:var(--gold); background:rgba(197,160,89,.1); outline:none;}
.chain-node:hover::after,.chain-node:focus::after,.chain-node.active::after{background:var(--gold); box-shadow:0 0 0 4px #090909,0 0 16px rgba(197,160,89,.7);}
.chain-note{display:none; margin-top:.38rem; color:rgba(229,229,229,.68); font-size:.66rem; letter-spacing:0; text-transform:none; font-weight:400; line-height:1.45;}
.chain-node:hover .chain-note,.chain-node:focus .chain-note,.chain-node.chain-open .chain-note{display:block;}
.proof-disclaimer{margin:.95rem 0 .45rem; color:rgba(229,229,229,.38); font-size:.56rem; letter-spacing:.12em; text-transform:uppercase;}
.proof-subtitle{margin:.95rem 0 .2rem; color:rgba(245,245,245,.78); font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; font-weight:800;}
.proof-subtitle+.proof-disclaimer{margin-top:0;}
.proof-chips{display:grid; grid-template-columns:1fr; gap:.45rem; margin-top:0;}
@media(min-width:640px){.proof-chips{grid-template-columns:repeat(2,minmax(0,1fr));}}
.proof-chip{border:1px solid rgba(197,160,89,.34); background:rgba(5,5,5,.38); color:var(--gold); border-radius:999px;

  background:var(--gold); box-shadow:0 0 18px rgba(197,160,89,.9);}

.mini{border:1px solid rgba(229,229,229,.09); background:rgba(255,255,255,.025); border-radius:1.1rem; padding:1rem 1.1rem;}

re."},{"band":"ACT III · LEGAL ARCHITECTURE IN OPERATION","band_tag":"architecture preserved","node":"Evidence Path","sub":"source → structured fact","target":"project-walkthrough","why":"Shows how the system preserves source evidence and the factual structure authored by the lawyer."},{"band":"ACT III · LEGAL ARCHITECTURE IN OPERATION","band_tag":"architecture preserved","node":"Legal Testing","sub":"controlled test → limitation","target":"act3-trace","why":"Shows one legal conclusion traced from source through controlled testing and evidence gaps."},{"band":"ACT III · LEGAL ARCHITECTURE IN OPERATION","band_tag":"architecture preserved","node":"Qualified Review","sub":"uncertainty → human judgment","target":"prompt-agent-proof","why":"Shows that unsupported or private facts become review questions instead of automated conclusions."},{"band":"ACT III · LEGAL ARCHITECTURE IN OPERATION","band_tag":"architecture preserved","node":"Handoff","sub":"position → review route","target":"act3-synthesis","why":"Shows the synthesis and review-ready route while preserving the lawyer’s boundary."},{"band":"ACT III · LEGAL ARCHITECTURE IN OPERATION","band_tag":"architecture preserved","node":"Open System","sub":"live supporting proof","target":"sandbox-os","why":"Opens the public-safe diligence workflow after the legal method and architecture are understood."},{"kind":"terminal","label":"Close","sub":"technology & data protection lawyer","target":"contact","why":"Converts the proof into the hiring argument."}]},"act1":{"orientation_line":"This interface runs in two halves. Acts I–II are the law — every AI risk mapped, and the clauses that close it. Act III is the systems I built to do that work automatically. The systems exist to deliver the law.","architecture_diagram":["Risk Map","Clauses","The Systems"],"header":"The Legal Foundation — AI law risks mapped into a working taxonomy.","forward_ref":"→ what the diligence engine later detects on its own.","intro":"Each one stays close to the real legal problem — what creates the exposure, what closes it, what holds up. I built them in AI law: contracts, compliance, privacy, AI liability, diligence, digital business risk. The build is just the delivery — the legal judgment is the point.","lanes":[{"tag":"Lane A","text":"companies building AI products"},{"tag":"Lane B","text":"companies deploying AI internally"}],"reference_layer":{"frame":"The reference layer the systems read from.","spine":["Mechanism","Consequence","Remediation"],"worked_line":"A model is probabilistic (mechanism) → its confident false output creates reliance liability (consequence) → a hallucination-specific waiver + output-authority boundary closes it (remediation).","scope_stat":"98 threats · 10 archetypes · 10 surfaces · 3 jurisdictions — authored solo since October 2025, refined from 81 through forensic-engine runs.","applied_practice":"Applied-practice layer shown frosted, with a count only. No raw corpus, no commercial labels."},"risk_map":{"note":"Classify → trigger. Select an archetype → its surfaces light over the Global Floor → click a lit surface → modal pulls the matching registry rows (authority IN/EU/US + clause). Preset-driven entry; on-hover definitions on every archetype and surface.","global_floor":{"code":"UNI","label":"Global Floor (Universal)","def":"The baseline every AI product is bound by, regardless of what it does — consent, transparency, third-party pass-throughs.","count":37},"archetypes":[{"code":"DOE","name":"Doer","kind":"Action AI","def":"Executes tasks or spends money autonomously (AI SDRs, automated support, agents)."},{"code":"JDG","name":"Judge","kind":"Predictive AI","def":"Scores or screens humans for opportunity (HR screeners, loan approvals)."},{"code":"CMP","name":"Companion","kind":"Social AI","def":"Sustains emotional relationships or roleplay (virtual therapists, conversational agents)."},{"code":"CRT","name":"Creator","kind":"Generative AI","def":"Generates net-new media or code (image generators, voice cloners, copilots)."},{"code":"RDR","name":"Reader","kind":"Ingestion AI","def":"Consumes and vectorizes external data (RAG pipelines, scrapers)."},{"code":"ORC","name":"Orchestrator","kind":"Routing AI","def":"Routes prompts to third-party models (API gateways, model routers)."},{"code":"TRN","name":"Translator","kind":"Conversion AI","def":"Bridges formats, often via physical inputs (meeting note-takers, speech-to-text)."},{"code":"SHD","name":"Shield","kind":"Defense AI","def":"Monitors or audits enterprise environments (AI pen-testing, compliance bots)."},{"code":"OPT","name":"Optimizer","kind":"Systemic AI","def":"Manages critical or financial infrastructure (algorithmic trading, grid control)."},{"code":"MOV","name":"Mover","kind":"Physical AI","def":"Acts on the physical world (warehouse robotics, autonomous drones)."}],"surfaces":[{"name":"PII","def":"Processing identifiable personal data — names, emails, IPs, user text."},{"name":"Sensitive/Biometric","def":"Health, voice, or facial-geometry data — triggers strict biometric regimes."},{"name":"Financial","def":"AI managing trades, credit, or payments."},{"name":"Minors","def":"Users under 18 — triggers age-design and parental-consent regimes."},{"name":"Employment","def":"Screening candidates or employees — triggers bias-audit mandates."},{"name":"Consumer-Public","def":"Mass-market B2C exposure — dark-patterns, takedown, class-action surface."},{"name":"Enterprise-Private","def":"B2B SaaS to large organizations — SLA and wasted-expenditure exposure."},{"name":"Infrastructure","def":"Reliance on foundation-model APIs or critical infrastructure."},{"name":"Content&IP","def":"Generated media, training data, and ownership of output."},{"name":"Safety&Physical","def":"Physical-world action and bodily-safety exposure."}],"presets":[{"key":"customer-chatbot","label":"Customer chatbot","description":"Conversational AI answering customers or users.","underlying_function":"Companion / general conversational interface","likely_surfaces":"Consumer-public · Personal data","archetype":"CMP","surfaces":["Consumer-Public","PII"]},{"key":"ai-support-agent","label":"AI support agent","description":"AI that responds to tickets, handles customer support, or recommends actions.","underlying_function":"Doer / Companion","likely_surfaces":"Consumer-public · Enterprise-private · Personal data","archetype":"DOE","surfaces":["Consumer-Public","Enterprise-Private","PII"]},{"key":"hiring-screening-tool","label":"Hiring / screening tool","description":"AI that screens, ranks, scores, or recommends candidates or employees.","underlying_function":"Judge","likely_surfaces":"Employment · Personal data","archetype":"JDG","surfaces":["Employment","PII"]},{"key":"coding-copilot","label":"Coding copilot","description":"AI that generates, reviews, or assists with code.","underlying_function":"Creator","likely_surfaces":"Content & IP · Enterprise-private","archetype":"CRT","surfaces":["Content&IP","Enterprise-Private"]},{"key":"meeting-note-taker","label":"Meeting note-taker","description":"AI that records, transcribes, summarizes, or analyzes meetings.","underlying_function":"Translator / Reader","likely_surfaces":"Personal data · Sensitive/biometric-adjacent · Enterprise-private","archetype":"TRN","surfaces":["PII","Sensitive/Biometric","Enterprise-Private"]},{"key":"ai-sdr-outbound-agent","label":"AI SDR / outbound agent","description":"AI that sends, sequences, personalizes, or triggers sales/outbound actions.","underlying_function":"Doer / Orchestrator","likely_surfaces":"Personal data · Consumer-public · Enterprise-private","archetype":"DOE","surfaces":["PII","Consumer-Public","Enterprise-Private"]},{"key":"rag-knowledge-bot","label":"RAG knowledge bot","description":"AI that ingests documents and retrieves answers from a knowledge base.","underlying_function":"Reader","likely_surfaces":"Personal data · Infrastructure · Enterprise-private","archetype":"RDR","surfaces":["PII","Infrastructure","Enterprise-Private"]},{"key":"trading-payment-agent","label":"Trading / payment agent","description":"AI that acts on financial signals, payment flows, accounts, or transaction logic.","underlying_function":"Optimizer / Doer","likely_surfaces":"Financial · Infrastructure","archetype":"OPT","surfaces":["Financial","Infrastructure"]}],"diagnostic_format":"Mechanical trigger → Law (IN / US / EU) → Remediation","worked_example":{"title":"The Judge (HR screener)","triggers":["Employment","PII"],"law":{"in":"DPDP (employee data)","eu":"GDPR Art. 22 + AI Act Annex III (high-risk; 2 Dec 2027)","us":"Title VII / EEOC · NYC LL144 · IL HB3773 · TX TRAIGA"},"case":"Mobley v. Workday (ongoing)","remediation":"bias-audit + human-in-the-loop clause"},"title":"The Risk Map — classify the AI, then identify the legal surface.","intro":"The map works in two moves. First, classify what the AI does. Second, identify what legal surface it touches. The output is a triggered risk with authority and remediation.","move1_heading":"Move 1 — Classify what the AI does","move1_explanation":"The first question is functional, not promotional. Ignore the company’s marketing label. Ask what the AI actually does.","preset_instruction":"Select a common AI use case to light the underlying AI function.","move2_heading":"Move 2 — Identify what legal surface it touches","move2_explanation":"The same AI function can trigger different legal risks depending on what it touches: personal data, employment, IP, financial decisions, consumers, infrastructure, or physical safety.","output_heading":"Output — triggered risk → authority → remediation","output_explanation":"Once function and surface combine, the system can identify the legal risk, cite the authority, and route the remediation into the right instrument or workflow.","surface_instruction":"Click a lit surface to see why the risk is triggered.","surface_labels":{"PII":"Personal data","Sensitive/Biometric":"Sensitive / biometric","Financial":"Financial","Minors":"Minors","Employment":"Employment","Consumer-Public":"Consumer-public","Enterprise-Private":"Enterprise-private","Infrastructure":"Infrastructure","Content&IP":"Content & IP","Safety&Physical":"Safety / physical"}},"case_law":[{"name":"Moffatt v. Air Canada","line":"The chatbot speaks with the company's authority; no “separate tool” defence."},{"name":"Thaler v. Perlmutter","tag":"aff'd D.C. Cir. 2025","line":"No copyright for autonomous AI output; forces human-in-the-loop."},{"name":"Mobley v. Workday","tag":"ongoing","line":"AI hiring tools face disparate-impact liability."},{"name":"FTC v. Rite Aid","line":"Algorithmic disgorgement; a regulator can force the model destroyed."}],"connector1":"A taxonomy protects no one on its own. Once the risk can be classified, it must be routed into clauses, policies, playbooks, and review-ready instruments. That is Act II.","orientation_purpose":"The legal work comes first. The systems exist only to deliver it faster, more consistently, and in a reviewable form.","eyebrow":"ACT I · FOUNDATION","subline":"Before I built the tools, I built the legal source layer they would read from: AI physics, legal doctrine, defensive controls, and product/instrument routing.","what_this_proves":"This section shows how technical AI behavior becomes legal risk, how legal risk becomes a control, and how that control is routed into a document, workflow, or system.","first_fork":{"title":"First Fork — where does the AI risk live?","subtitle":"Before the taxonomy, the work splits by legal context. The question is not only what does the AI do? The first question is: is the company building AI for others, or using AI inside its own business?","lanes":[{"key":"lane-a","visible_label":"Build-side AI products","internal_label":"Lane A","who":"Companies building, selling, or exposing AI products to customers, users, APIs, or enterprise buyers.","focus_chips":["product/service classification","hallucination liability","agentic authority","customer data processing","output ownership","enterprise procurement","public-facing terms","downstream API/pass-through risk"],"routes":["ToS","DPA","Privacy Policy","AUP","SLA","Agentic Addendum","Product Playbook"],"explanation":"Lane A asks: if the AI product fails, misleads, processes data, generates output, or acts for a user, what legal architecture protects the company?"},{"key":"lane-b","visible_label":"Internal AI deployment","internal_label":"Lane B","who":"Companies using AI inside the business through employees, contractors, teams, departments, or operational workflows.","focus_chips":["shadow AI","employee tool use","client-data leakage","workplace privacy","AI-assisted work ownership","human review","internal governance","impact assessment"],"routes":["AI Use Handbook","IP Deed","HITL SOP","DPIA","Shadow AI Scanner","Workplace Playbook"],"explanation":"Lane B asks: if employees or teams use AI inside the business, how do we control data, authorship, confidentiality, reliance, and human review?"}],"transition":"Once the lane is clear, the analysis moves into the source layer: what the AI technically does, what legal doctrine that triggers, what defensive control responds, and where the fix must live."},"ai_bible":{"title":"The AI Bible — the source layer behind the taxonomy","intro":"The taxonomy starts from AI behavior, not document templates. The source layer asks four questions: what the system technically does, what legal doctrine that triggers, what control contains the risk, and which instrument or workflow carries the fix.","core_spine":["AI physics","legal doctrine","defensive control","product / instrument routing"],"columns":[{"title":"AI physics","text":"What the system technically does: generate, infer, remember, route, act, score, ingest, or automate."},{"title":"Legal doctrine","text":"The legal exposure triggered by that behavior: reliance, authority, privacy, authorship, consent, discrimination, deletion, or product/service classification."},{"title":"Defensive control","text":"The legal architecture that contains the risk: waiver, boundary, audit, consent gate, human review, cap, pass-through, or prohibition."},{"title":"Product / instrument routing","text":"Where the control lives: ToS, DPA, AUP, SLA, Agentic Addendum, Handbook, IP Deed, SOP, DPIA, Vault intake, diligence engine, or portal workflow."}],"rows":[{"title":"Probabilistic Output","lane":"Both","ai_physics":"Probabilistic output can be confidently wrong.","legal_doctrine":"Reliance, chatbot authority, warranty, misrepresentation, and customer-facing output risk.","defensive_control":"Hallucination waiver, output authority boundary, point-of-interaction warning, and human verification trigger.","routing":"ToS · AUP · diligence engine · product UI warning","why":"Generic AI may be wrong language is not enough. The control must sit where reliance happens and must define what the AI output is legally allowed to be."},{"title":"Agentic Action","lane":"Lane A","ai_physics":"Agentic systems can act, retry, spend, route, trigger workflows, or bind a process without a fresh human click.","legal_doctrine":"Electronic agent attribution, agency risk, authority, automated transaction risk, and operational liability.","defensive_control":"Spend caps, retry limits, loop thresholds, circuit breakers, approval gates, audit logs, and authority boundaries.","routing":"Agentic Addendum · ToS · governance log · Vault intake","why":"Once AI moves from answering to acting, the legal problem changes from wrong output to who is responsible for machine action?"},{"title":"AI Memory / Fine-Tuning","lane":"Both","ai_physics":"Fine-tuned or training-based memory is not cleanly deletable like a database row.","legal_doctrine":"Erasure rights, privacy compliance, model disgorgement, data retention, and subprocessor transparency.","defensive_control":"RAG-only mandate, deletion architecture, training prohibition, subprocessor disclosure, and data-use boundary.","routing":"DPA · Privacy Policy · Vault intake · DPIA","why":"If user data becomes part of model weights, deletion and downstream control become much harder. The legal architecture must be designed around the technical memory model."},{"title":"AI Output / Authorship","lane":"Both","ai_physics":"Autonomous AI output may not carry human authorship by default.","legal_doctrine":"Copyright ownership, assignment failure, authorship evidence, work-product control, and IP-chain risk.","defensive_control":"Human-in-the-loop authorship protocol, prompt/work-product assignment, contributor warranty, authorship evidence trail.","routing":"IP Deed · HITL SOP · ToS output terms · Workplace Handbook","why":"If the business cannot prove a human authorship chain, we own the output may be commercially weak even if the document says it."},{"title":"AI Scoring / Decisioning","lane":"Lane B","ai_physics":"AI systems can score, rank, screen, recommend, or influence access to opportunity.","legal_doctrine":"Bias, discrimination, automated decisioning, employment screening, high-risk decisioning, and explainability risk.","defensive_control":"Bias audit, human review, prohibited-use boundary, appeal/escalation route, and impact assessment.","routing":"DPIA · AUP · Handbook · HITL SOP · diligence engine","why":"The legal issue is not only the model’s output. It is whether the output affects a person’s opportunity, rights, employment, credit, access, or treatment."},{"title":"Consent / Online Terms","lane":"Lane A","ai_physics":"AI products often operate through fast online flows where terms, warnings, notices, and consents are buried or skipped.","legal_doctrine":"Clickwrap enforceability, assent, notice, consent validity, dark-pattern risk, and consumer protection.","defensive_control":"Affirmative consent UI, visible notice architecture, acceptance logs, renewal/cancellation clarity, and point-of-action warning.","routing":"ToS · Privacy Policy · UI mandate · product workflow · portal records","why":"A strong clause is useless if the user never validly assented to it. Legal architecture must reach the interface layer."}]},"taxonomy_bridge":{"title":"From source layer to working taxonomy","intro":"The AI Bible is the reasoning layer. The taxonomy turns that reasoning into units a diligence engine can read.","flow":["AI Bible source layer","98 threat units","10 AI functions + 10 legal surfaces","triggered risk","authority","remediation"],"scope_stat":"98 threat units · 10 AI functions · 10 legal surfaces · 3 jurisdiction bands","explanation":"Each threat unit is structured so the system can ask: what AI behavior is present, what legal surface is touched, what authority is relevant, what consequence follows, and what instrument should respond.","confidentiality_note":"The full source layer and applied-practice notes are not exposed here. The visible layer shows the reasoning architecture, selected examples, and the taxonomy logic."},"worked_examples":{"default":"Select a common AI use case above. The example below will show how the taxonomy turns an AI use case into a legal-risk route.","items":{"customer-chatbot":{"selected_use_case":"Customer chatbot","move1":"Companion — the AI speaks directly to users in a conversational interface.","move2":"Consumer-public + personal data.","output":"Reliance, misleading output, customer-facing disclosure, privacy, and consent risk.","authority":"chatbot authority / consumer notice / privacy consent principles","remediation":"Hallucination waiver, output authority boundary, point-of-interaction warning, privacy notice, and escalation path.","routes_into":"ToS · Privacy Policy · AUP · diligence engine"},"ai-support-agent":{"selected_use_case":"AI support agent","move1":"Doer / Companion — the AI answers customers and may recommend or trigger support actions.","move2":"Consumer-public + enterprise-private + personal data.","output":"Wrong support advice, escalation failure, data exposure, and automated action risk.","authority":"Chatbot authority and reliance principles · data protection notice/processing duties · electronic action risk where workflows are triggered","remediation":"Human escalation route, support-output disclaimer, authority boundary, processing disclosure, and action limits.","routes_into":"ToS · Privacy Policy · AUP · support workflow · portal records"},"hiring-screening-tool":{"selected_use_case":"Hiring / screening tool","move1":"Judge — the AI scores, ranks, screens, or recommends humans.","move2":"Employment + personal data.","output":"Bias, disparate impact, automated decisioning, explainability, and employment-data risk.","authority":"GDPR Art. 22 logic · EU AI Act high-risk employment logic · employment discrimination principles · workplace privacy principles","remediation":"Bias audit, human-in-the-loop review, use restriction, audit log, appeal/escalation path, and impact assessment.","routes_into":"DPIA · AUP · AI Use Handbook · HITL SOP"},"coding-copilot":{"selected_use_case":"Coding copilot","move1":"Creator — the AI generates or materially assists with code.","move2":"Content & IP + enterprise-private.","output":"Ownership uncertainty, open-source contamination, security reliance, and human authorship risk.","authority":"Thaler v. Perlmutter · IP ownership / assignment principles · software warranty and reliance risk","remediation":"HITL authorship protocol, output review, IP assignment boundary, open-source review, and prohibited reliance rule.","routes_into":"IP Deed · HITL SOP · ToS output terms · AUP"},"meeting-note-taker":{"selected_use_case":"Meeting note-taker","move1":"Translator / Reader — the AI records, transcribes, summarizes, or analyzes spoken content.","move2":"Personal data + sensitive/biometric-adjacent + enterprise-private.","output":"Recording consent, biometric/voice risk, confidential information leakage, and privacy disclosure risk.","authority":"privacy notice/consent principles / confidentiality and workplace privacy principles","remediation":"meeting consent notice, recording disclosure, retention limit, processing disclosure, and confidential-data handling rule.","routes_into":"Privacy Policy · DPA · AI Use Handbook · DPIA"},"ai-sdr-outbound-agent":{"selected_use_case":"AI SDR / outbound agent","move1":"Doer / Orchestrator — the AI personalizes, sequences, sends, routes, or triggers outbound actions.","move2":"Personal data + consumer-public + enterprise-private.","output":"automated outreach, consent, spam/dark-pattern, data processing, and action-authority risk.","authority":"consent and marketing law principles · electronic agent/action attribution principles · consumer protection principles","remediation":"audience limits, consent/opt-out routing, human approval for campaigns, authority boundary, and audit logs.","routes_into":"AUP · ToS · Privacy Policy · Agentic Addendum · outbound workflow"},"rag-knowledge-bot":{"selected_use_case":"RAG knowledge bot","move1":"Reader — the AI ingests, indexes, retrieves, and answers from documents or knowledge bases.","move2":"Personal data + infrastructure + enterprise-private.","output":"data ingestion, retention, retrieval leakage, source provenance, and deletion risk.","authority":"FTC v. Rite Aid logic · GDPR/DPDP deletion and processing principles · confidentiality and subprocessor transparency principles","remediation":"RAG-only mandate, source logging, access controls, deletion architecture, and subprocessor disclosure.","routes_into":"DPA · Privacy Policy · Vault intake · DPIA · security workflow"},"trading-payment-agent":{"selected_use_case":"Trading / payment agent","move1":"Optimizer / Doer — the AI manages or triggers financial decisions, payment flows, or transaction actions.","move2":"Financial + infrastructure.","output":"financial reliance, unauthorized transaction, automation error, and high-stakes decision risk.","authority":"electronic agent/action attribution principles · financial reliance and consumer protection principles · service classification risk","remediation":"transaction caps, human approval threshold, prohibited reliance warning, audit logs, and circuit breaker.","routes_into":"Agentic Addendum · ToS · AUP · governance log"}}},"source_rule_spine":{"title":"Authority Examples","intro":"The cases are not citations for decoration. Each source creates a rule that becomes a registry condition, drafting control, or workflow requirement.","rows":[{"source":"Moffatt v. Air Canada","rule":"Chatbot output can bind the company where users reasonably rely on it.","powers":"Output authority boundary · hallucination controls · customer-facing warning design"},{"source":"Thaler v. Perlmutter","rule":"Autonomous AI output may fail human authorship requirements.","powers":"HITL authorship protocol · IP assignment structure · work-product evidence trail"},{"source":"FTC v. Rite Aid","rule":"Regulators can require deletion or destruction of tainted algorithmic systems.","powers":"RAG-only mandate · deletion architecture · model-memory restrictions"},{"source":"Specht v. Netscape / Meyer v. Uber","rule":"Online terms must be visible, affirmative, and reasonably presented to bind users.","powers":"clickwrap design · consent logs · UI mandate · notice architecture"},{"source":"Vernor v. Autodesk","rule":"Contract structure can affect whether software access is treated as a license rather than ownership transfer.","powers":"service/access classification · license boundary · platform-use restrictions"},{"source":"Soteria v. IBM","rule":"Liability wording can preserve or exclude wasted expenditure and major commercial loss categories.","powers":"liability cap architecture · exclusion drafting · enterprise negotiation playbook"}]},"connector_visual":"Risk classified → control selected → instrument routed."},"act2":{"header":"The Legal Matrix — threat IDs converted into clauses, policies, playbooks, and review-ready instruments.","eyebrow":"ACT II · THE LEGAL MATRIX","subline":"Act I classified the risk. Act II shows how that risk becomes legal architecture: a threat ID, an authority, a defensive control, and the instrument that carries the fix.","core_visual_line":"Risk classified → control selected → instrument routed","explanation":"The registry is not a list of legal issues. It is a routing layer: each threat ID carries the risk, authority, control logic, and document destination.","guide_line":"Follow the route: matrix first, instrument map second, clause viewer third.","local_rail":[{"label":"Orientation","target":"act2-orientation"},{"label":"Threat Matrix","target":"act2-threat-matrix"},{"label":"Instrument Architecture","target":"instruments-layer"},{"label":"Living Document","target":"act2-living-document"},{"label":"Vault Router","target":"act2-vault-router"},{"label":"Act III Bridge","target":"act2-act3-bridge"}],"threat_matrix":{"title":"Threat Matrix — the registry behind the instruments","intro":"The threat matrix converts AI-law risk into structured rows: threat ID, lane, AI function, legal surface, authority, tier, and clause route.","proof_line":"98 threat units · 17 fields · Lane A / Lane B routing · IN / EU / US authority mapping","integrity_note":"If a jurisdiction is not mapped, the cell stays blank. The matrix does not invent fake IN/EU/US parallels just to look complete.","guide_text":"Filter the matrix or click a row to see how a threat becomes a document route.","columns":["Threat ID","Threat","Lane","AI function / surface","Authority","Clause / instrument route","Tier"],"rows":[{"id":"UNI_CNS_001","threat":"Browsewrap Invalidity","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Specht v. Netscape Communications Corp. (2d Cir. 2002)"},"clause":"TOS §1.1","tier":"T3"},{"id":"UNI_CNS_002","threat":"Cluttered Mobile Consent","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Meyer v. Uber Technologies, Inc. (2d Cir. 2017)"},"clause":"TOS §1.1","tier":"T3"},{"id":"UNI_CNS_003","threat":"Unconscionable Venue","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"Bragg v. Linden Research, Inc. (E.D. Pa. 2007)"},"clause":"TOS §14.3","tier":"T3"},{"id":"UNI_CNS_004","threat":"Dark Pattern Cancellation","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"FTC Act §5 / ROSCA (15 U.S.C. §8401 et seq.)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_005","threat":"Subscription Price Hike Consent","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"NY General Obligations Law §5-903 (as amended Dec 2025)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_006","threat":"FTC Click-to-Cancel Rule","lane":"A","archetype":"UNI","surface":["Consumer-Public"],"authority":{"in":"—","eu":"—","us":"FTC Negative Option Rule (16 CFR Part 425, rulemaking restarted Jan 30, 2026)"},"clause":"TOS §1.1","tier":"T2"},{"id":"UNI_CNS_007","threat":"Unwaivable Reversal Right","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Uniform Electronic Transactions Act §10(b)"},"clause":"UI Mandate","tier":"T2"},{"id":"UNI_LIA_001","threat":"First Sale Doctrine Trap","lane":"A","archetype":"UNI","surface":["Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Vernor v. Autodesk Inc. (9th Cir. 2010)"},"clause":"TOS §2.2","tier":"T2"},{"id":"UNI_LIA_002","threat":"The Wasted Costs Loophole","lane":"A","archetype":"UNI","surface":["Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Soteria Insurance Ltd v. IBM United Kingdom Ltd [2022] EWHC 2084 (TCC)"},"clause":"TOS §9.2","tier":"T2"},{"id":"UNI_LIA_004","threat":"Inconspicuous Warranty Caps","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"UCC §2-316 and §2-719"},"clause":"TOS §9.2","tier":"T2"},{"id":"UNI_LIA_005","threat":"AI Reclassified as Product","lane":"A","archetype":"UNI","surface":["Enterprise-Private"],"authority":{"in":"CPA 2019 product liability (§82–87)","eu":"Product Liability Directive 2024/2853 (software/AI = product; 9 Dec 2026)","us":"UCC Art. 2 (goods/services line); state product-liability"},"clause":"TOS §2.2","tier":"T1"},{"id":"UNI_LIA_006","threat":"Ban on User Waivers","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"AI LEAD Act (S.2937, pending)"},"clause":"TOS §2.2","tier":"T5"},{"id":"DOE_LIA_007","threat":"Electronic Agent Authority","lane":"A","archetype":"DOE","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Uniform Electronic Transactions Act §14"},"clause":"TOS §9.2","tier":"T1"},{"id":"UNI_HAL_001","threat":"Chatbot Promissory Estoppel","lane":"A","archetype":"UNI","surface":["Consumer-Public","Enterprise-Private"],"authority":{"in":"—","eu":"—","us":"Moffatt v. Air Canada (B.C. Civil Resolution Tribunal, 2024)"},"clause":"TOS §8.2","tier":"T2"}]},"instrument_architecture":{"title":"Instrument Architecture — the document stack is a legal system","intro":"The documents are not standalone files. Each instrument has a role, dependency, and trigger. The stack works because the documents route into each other.","guide_line":"Hover a document to see its role. Click to open the stack logic. Try a route to see which instruments activate together."},"living_document":{"title":"Living Document — how risk becomes an instrument","intro":"Select a threat or commercial trigger. The viewer reveals the clause, connected documents, and the legal logic that makes the instrument work.","guide_line":"Click a trigger to reveal the clause and connected instruments.","watermark":"SAMPLE / EXCERPT / REVIEW-READY STRUCTURE","triggers":[{"label":"Hallucination / Output Authority","group":"AI Risk Trigger","lane":"Lane A",   function buildLivingDoc(m){
    var ld=m.living_document, twrap=document.getElementById('ld-threats'), selectionChip=document.getElementById('ld-selection-chip');
    function triggerByLabel(label){ return (ld.triggers||[]).filter(function(t){return t.label===label;})[0]; }
    twrap.innerHTML=(ld.trigger_groups||[]).map(function(g){
      return '<div class="ld-group-title">'+esc(g.label)+'</div>'+g.triggers.map(function(label){
        var t=triggerByLabel(label)||{label:label};
        return '<button class="ld-btn" type="button" data-trigger-label="'+esc(t.label)+'"><div class="th">'+esc(t.label)+'</div><div class="cl">'+esc(t.lane||'')+' · '+esc(t.mapping_status||t.group||'')+'</div></button>';
      }).join('');
    }).join('');

    var theater=ensureLivingTheater();

    function mainRoute(t, key){
      return ((t.main_reveal_route||[]).filter(function(x){return x.indexOf(key+':')===0;})[0]||'').replace(key+':','').trim();
    }
    function frameTitle(t){
      var display=(t.main_document_display||[]).filter(function(x){return x.indexOf('Document frame title:')===0;})[0];
      return display ? display.replace('Document frame title:','').trim() : (mainRoute(t,'Main document') || t.label || ld.default_note);
    }
    function renderClause(text){
      return String(text||'').split(/\r?\n/).map(function(line){
        var raw=line, s=raw.trim();
        if(!s) return '<div class="doc-spacer" aria-hidden="true"></div>';
        if(/^[A-Z0-9 &;:/().,-]+$/.test(s) && /[A-Z]/.test(s)) return '<div class="doc-section-title">'+esc(s)+'</div>';
        if(/^\d+(\.\d+)*:/.test(s)) return '<div class="doc-clause-heading">'+esc(s)+'</div>';
        if(/^\([a-z]\)\s+/i.test(s)) return '<div class="doc-list-item">'+esc(s).replace(/^(\([a-z]\))\s+/i,'<span class="doc-leadin">$1</span> ')+'</div>';
        if(/^(i{1,3}|iv|v|vi{0,3}|ix|x)\.\s+/i.test(s)) return '<div class="doc-nested-item">'+esc(s).replace(/^((?:i{1,3}|iv|v|vi{0,3}|ix|x)\.)\s+/i,'<span class="doc-leadin">$1</span> ')+'</div>';
        var safe=esc(s).replace(/^([A-Z][A-Za-z /-]{2,48}\.)\s+/, '<span class="doc-leadin">$1</span> ');
        return '<p class="doc-para">'+safe+'</p>';
      }).join('');
    }
    function surroundingBlocks(t){
      var raw=t.raw_markdown||'', m=raw.match(/Surrounding document state:\s*\n\n```text\n([\s\S]*?)\n```/);
      if(!m) return [];
      var lines=m[1].split(/\r?\n/).map(function(x){return x.trim();}).filter(Boolean), blocks=[];
      for(var i=0;i<lines.length;i++){
        if(lines[i].charAt(0)!=='['){
          blocks.push({title:lines[i], state:(lines[i+1]&&lines[i+1].charAt(0)==='[')?lines[i+1]:''});
        }
      }
      return blocks;
    }
    function redacted(title){
      return '<div class="ld-redacted-section"><div class="doc-section-title">'+esc(title||'CONNECTED SECTION')+'</div><div class="ld-blur-line" style="width:92%"></div><div class="ld-blur-line" style="width:76%"></div><div class="ld-blur-line" style="width:64%"></div></div>';

      window.addEventListener('keydown', function(e){

        if(e.key==='Escape'){ closeLivingTheater(); return; }
        var target=currentLivingScrollTarget();
        if(!target) return;
        var step=Math.max(80, Math.floor(target.clientHeight*.85));
        if(e.key==='PageDown'){ target.scrollTop+=step; e.preventDefault(); }
        else if(e.key==='PageUp'){ target.scrollTop-=step; e.preventDefault(); }
